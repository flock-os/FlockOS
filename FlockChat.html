<!DOCTYPE html>
<html lang="en" data-theme="vesper">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FlockChat — Test Build</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ── CSS Variables — Vesper (dark) theme ──────────────────────────────── */
    :root {
      --bg:           #0f1117;
      --bg-raised:    #1a1d27;
      --bg-hover:     #22263a;
      --bg-active:    #2a2f48;
      --line:         #2e3350;
      --ink:          #e2e4f0;
      --ink-muted:    #7b82a6;
      --ink-faint:    #444965;
      --accent:       #7b93ff;
      --accent-soft:  rgba(123,147,255,0.12);
      --gold:         #e8a838;
      --gold-soft:    rgba(232,168,56,0.12);
      --danger:       #ef4444;
      --success:      #22c55e;
      --warn:         #f59e0b;
      --online:       #22c55e;
      --away:         #f59e0b;
      --dnd:          #ef4444;
      --sidebar-w:    260px;
      --details-w:    280px;
      --topbar-h:     52px;
      --composer-h:   80px;
    }

    /* ── Reset ────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }
    button { font-family: inherit; cursor: pointer; }
    input, textarea { font-family: inherit; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

    /* ── Auth Screen ──────────────────────────────────────────────────────── */
    #auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: var(--bg);
    }
    .auth-card {
      background: var(--bg-raised);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 40px 36px;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .auth-logo h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.02em;
    }
    .auth-logo p {
      font-size: 0.8rem;
      color: var(--ink-muted);
      margin-top: 4px;
    }
    .auth-field {
      margin-bottom: 14px;
    }
    .auth-field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--ink-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .auth-field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--ink);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .auth-field input:focus { border-color: var(--accent); }
    .auth-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      margin-top: 6px;
      transition: opacity 0.2s;
    }
    .auth-btn:hover { opacity: 0.88; }
    .auth-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .auth-toggle {
      text-align: center;
      margin-top: 16px;
      font-size: 0.82rem;
      color: var(--ink-muted);
    }
    .auth-toggle a { color: var(--accent); cursor: pointer; }
    .auth-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: var(--danger);
      margin-bottom: 14px;
      display: none;
    }

    /* ── App Shell ────────────────────────────────────────────────────────── */
    #app {
      display: none;
      height: 100vh;
      height: 100dvh;
      flex-direction: column;
    }

    /* ── Top Bar ──────────────────────────────────────────────────────────── */
    .topbar {
      height: var(--topbar-h);
      background: var(--bg-raised);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      padding: 0 16px 0 0;
      flex-shrink: 0;
      z-index: 50;
    }
    .topbar-brand {
      width: var(--sidebar-w);
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-right: 1px solid var(--line);
      height: 100%;
      flex-shrink: 0;
    }
    .topbar-brand .wordmark {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.03em;
    }
    .topbar-brand .build-tag {
      font-size: 0.65rem;
      color: var(--ink-faint);
      background: var(--bg-active);
      border-radius: 4px;
      padding: 2px 6px;
      margin-left: 8px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .topbar-context {
      flex: 1;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar-channel-name {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--ink);
    }
    .topbar-channel-name .sigil {
      color: var(--ink-muted);
      margin-right: 2px;
    }
    .topbar-channel-desc {
      font-size: 0.78rem;
      color: var(--ink-muted);
      border-left: 1px solid var(--line);
      padding-left: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 320px;
    }
    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }
    .topbar-icon-btn {
      background: none;
      border: 1px solid transparent;
      border-radius: 7px;
      color: var(--ink-muted);
      padding: 6px 10px;
      font-size: 0.88rem;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .topbar-icon-btn:hover {
      background: var(--bg-hover);
      color: var(--ink);
      border-color: var(--line);
    }
    .topbar-icon-btn.active { color: var(--accent); }
    .user-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-hover);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 4px 12px 4px 6px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .user-pill:hover { border-color: var(--accent); }
    .user-pill .avatar { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; }
    .user-pill .uname { font-size: 0.82rem; font-weight: 600; color: var(--ink); }
    .presence-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--online);
      border: 2px solid var(--bg-raised);
      margin-left: -4px;
      margin-bottom: -6px;
      position: relative;
      top: 8px;
      left: -2px;
    }

    /* ── Body Layout ──────────────────────────────────────────────────────── */
    .app-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ──────────────────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--bg-raised);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sidebar-search {
      padding: 10px 10px 8px;
      border-bottom: 1px solid var(--line);
    }
    .sidebar-search input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 7px 11px;
      font-size: 0.8rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }
    .sidebar-search input::placeholder { color: var(--ink-faint); }
    .sidebar-search input:focus { border-color: var(--accent); }
    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 12px;
    }
    .sidebar-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 12px 4px;
    }
    .sidebar-section-header .label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-faint);
    }
    .sidebar-add-btn {
      background: none;
      border: none;
      color: var(--ink-faint);
      font-size: 1.1rem;
      line-height: 1;
      padding: 0 2px;
      transition: color 0.15s;
    }
    .sidebar-add-btn:hover { color: var(--accent); }
    .sidebar-item {
      display: flex;
      align-items: center;
      padding: 5px 12px;
      border-radius: 6px;
      margin: 1px 6px;
      cursor: pointer;
      transition: background 0.12s;
      gap: 6px;
      position: relative;
    }
    .sidebar-item:hover { background: var(--bg-hover); }
    .sidebar-item.active { background: var(--bg-active); }
    .sidebar-item .sigil {
      font-size: 0.82rem;
      color: var(--ink-muted);
      width: 14px;
      text-align: center;
      flex-shrink: 0;
    }
    .sidebar-item .ch-name {
      font-size: 0.85rem;
      color: var(--ink-muted);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-item.active .ch-name { color: var(--ink); font-weight: 500; }
    .sidebar-item .unread-badge {
      background: var(--accent);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      min-width: 17px;
      height: 17px;
      border-radius: 9px;
      text-align: center;
      line-height: 17px;
      padding: 0 4px;
      display: none;
    }
    .sidebar-item.has-unread .unread-badge { display: block; }
    .sidebar-item.has-unread .ch-name { color: var(--ink); font-weight: 600; }
    .dm-presence {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--ink-faint);
      flex-shrink: 0;
      border: 2px solid var(--bg-raised);
    }
    .dm-presence.online  { background: var(--online); }
    .dm-presence.away    { background: var(--away); }
    .dm-presence.dnd     { background: var(--dnd); }

    /* ── Message Thread ────────────────────────────────────────────────────── */
    .thread-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .message-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0 8px;
      scroll-behavior: smooth;
    }
    .day-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      margin: 4px 0;
    }
    .day-divider .line {
      flex: 1;
      height: 1px;
      background: var(--line);
    }
    .day-divider .label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--ink-faint);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    .msg-row {
      display: flex;
      gap: 10px;
      padding: 3px 20px;
      position: relative;
      border-radius: 4px;
      transition: background 0.1s;
    }
    .msg-row:hover { background: var(--bg-hover); }
    .msg-row:hover .msg-actions { opacity: 1; }
    .msg-row.grouped { padding-top: 1px; }
    .msg-row.grouped .msg-avatar { visibility: hidden; }
    .msg-row.grouped .msg-meta { display: none; }
    .msg-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--bg-active);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
      margin-top: 2px;
      user-select: none;
    }
    .msg-body { flex: 1; min-width: 0; }
    .msg-meta {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 2px;
    }
    .msg-author {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--ink);
    }
    .msg-time {
      font-size: 0.72rem;
      color: var(--ink-faint);
    }
    .msg-text {
      font-size: 0.88rem;
      color: var(--ink);
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg-text .mention {
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 3px;
      padding: 0 3px;
    }
    .msg-text .mention.self {
      color: var(--gold);
      background: var(--gold-soft);
    }
    .msg-edited {
      font-size: 0.7rem;
      color: var(--ink-faint);
      margin-left: 4px;
    }
    .msg-reactions {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 4px;
    }
    .reaction-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--bg-active);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .reaction-chip:hover,
    .reaction-chip.reacted { border-color: var(--accent); background: var(--accent-soft); }
    .reaction-chip .emoji { font-size: 0.9rem; }
    .reaction-chip .count { color: var(--ink-muted); font-size: 0.75rem; font-weight: 600; }
    .msg-actions {
      position: absolute;
      top: -14px;
      right: 20px;
      display: flex;
      gap: 2px;
      background: var(--bg-raised);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 3px;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
    }
    .msg-action-btn {
      background: none;
      border: none;
      color: var(--ink-muted);
      font-size: 0.88rem;
      padding: 4px 7px;
      border-radius: 5px;
      transition: background 0.12s, color 0.12s;
    }
    .msg-action-btn:hover { background: var(--bg-hover); color: var(--ink); }

    /* ── Typing Indicator ──────────────────────────────────────────────────── */
    .typing-indicator {
      padding: 0 20px 6px;
      font-size: 0.78rem;
      color: var(--ink-muted);
      min-height: 22px;
    }
    .typing-dots {
      display: inline-flex;
      gap: 3px;
      vertical-align: middle;
    }
    .typing-dots span {
      width: 5px; height: 5px;
      background: var(--ink-muted);
      border-radius: 50%;
      animation: typingBounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-4px); opacity: 1; }
    }

    /* ── Composer ──────────────────────────────────────────────────────────── */
    .composer {
      border-top: 1px solid var(--line);
      padding: 10px 16px 12px;
      background: var(--bg);
    }
    .composer-inner {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--bg-raised);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      transition: border-color 0.2s;
    }
    .composer-inner:focus-within { border-color: var(--accent); }
    .composer-toolbar {
      display: flex;
      gap: 2px;
      align-items: center;
    }
    .composer-tool {
      background: none;
      border: none;
      color: var(--ink-muted);
      font-size: 1rem;
      padding: 4px 6px;
      border-radius: 5px;
      transition: background 0.12s, color 0.12s;
    }
    .composer-tool:hover { background: var(--bg-hover); color: var(--ink); }
    textarea#composer-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--ink);
      font-size: 0.88rem;
      resize: none;
      outline: none;
      min-height: 20px;
      max-height: 140px;
      line-height: 1.5;
      padding: 2px 4px;
    }
    textarea#composer-input::placeholder { color: var(--ink-faint); }
    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: 7px;
      color: #fff;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 7px 14px;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Details Pane ──────────────────────────────────────────────────────── */
    .details-pane {
      width: var(--details-w);
      background: var(--bg-raised);
      border-left: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.2s;
    }
    .details-pane.collapsed { width: 0; border-left: none; }
    .details-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--line);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .details-close {
      background: none; border: none;
      color: var(--ink-muted); font-size: 1rem;
      padding: 2px 4px; border-radius: 4px;
      transition: color 0.15s;
    }
    .details-close:hover { color: var(--ink); }
    .details-scroll {
      flex: 1; overflow-y: auto; padding: 12px;
    }
    .details-section {
      margin-bottom: 20px;
    }
    .details-section-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--ink-faint);
      margin-bottom: 8px;
    }
    .member-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
    }
    .member-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--bg-active);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }
    .member-name {
      font-size: 0.83rem;
      color: var(--ink);
    }
    .member-role {
      font-size: 0.68rem;
      color: var(--ink-muted);
      background: var(--bg-active);
      border-radius: 3px;
      padding: 1px 5px;
      margin-left: auto;
      text-transform: capitalize;
    }

    /* ── Empty State ───────────────────────────────────────────────────────── */
    .empty-thread {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--ink-faint);
      padding: 40px;
      text-align: center;
    }
    .empty-thread .icon { font-size: 3rem; }
    .empty-thread h3 { font-size: 1rem; color: var(--ink-muted); }
    .empty-thread p { font-size: 0.82rem; }

    /* ── No Channel Selected ────────────────────────────────────────────────── */
    #no-channel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--ink-faint);
    }
    #no-channel .icon { font-size: 3.5rem; }
    #no-channel h2 { font-size: 1.1rem; color: var(--ink-muted); }
    #no-channel p { font-size: 0.83rem; }

    /* ── Modals ────────────────────────────────────────────────────────────── */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal-card {
      background: var(--bg-raised);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 28px 28px 24px;
      width: 400px;
      max-width: calc(100vw - 32px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-card h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--ink);
    }
    .modal-field {
      margin-bottom: 12px;
    }
    .modal-field label {
      display: block;
      font-size: 0.76rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--ink-muted);
      margin-bottom: 5px;
    }
    .modal-field input,
    .modal-field textarea,
    .modal-field select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 9px 12px;
      color: var(--ink);
      font-size: 0.87rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .modal-field input:focus,
    .modal-field textarea:focus { border-color: var(--accent); }
    .modal-field select { cursor: pointer; }
    .modal-field select option { background: var(--bg-raised); }
    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 18px;
    }
    .btn-secondary {
      background: none;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--ink-muted);
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-secondary:hover { border-color: var(--ink-muted); color: var(--ink); }
    .btn-primary {
      background: var(--accent);
      border: none;
      border-radius: 7px;
      color: #fff;
      padding: 8px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.85; }

    /* ── Emoji Picker ──────────────────────────────────────────────────────── */
    #emoji-picker {
      display: none;
      position: fixed;
      z-index: 300;
      background: var(--bg-raised);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      width: 260px;
    }
    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 2px;
    }
    .emoji-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      padding: 5px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .emoji-btn:hover { background: var(--bg-hover); }

    /* ── Toast Notifications ────────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 500;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--bg-raised);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.83rem;
      color: var(--ink);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      animation: slideInToast 0.25s ease;
      max-width: 300px;
    }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error   { border-color: var(--danger);  color: var(--danger); }
    @keyframes slideInToast {
      from { transform: translateX(40px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    /* ── Spinner ────────────────────────────────────────────────────────────── */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--line);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Loading overlay ────────────────────────────────────────────────────── */
    #loading-overlay {
      display: flex;
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    #loading-overlay .wordmark {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gold);
    }
    #loading-overlay p { font-size: 0.83rem; color: var(--ink-muted); }

    /* ── Responsive ─────────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      :root {
        --sidebar-w: 220px;
        --details-w: 0px;
      }
      .details-pane { display: none; }
    }
    @media (max-width: 500px) {
      .sidebar { position: fixed; left: -var(--sidebar-w); z-index: 60; transition: left 0.2s; }
      .sidebar.open { left: 0; }
    }
  </style>
</head>
<body>

<!-- ─── Loading Overlay ─────────────────────────────────────────────────── -->
<div id="loading-overlay">
  <div class="wordmark">FlockChat</div>
  <div class="spinner"></div>
  <p>Connecting…</p>
</div>

<!-- ─── Auth Screen ─────────────────────────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>FlockChat</h1>
      <p id="auth-subtitle">Sign in to your workspace</p>
    </div>
    <div class="auth-error" id="auth-error"></div>
    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="you@church.org" autocomplete="email">
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input type="password" id="auth-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="auth-field" id="auth-name-field" style="display:none">
      <label>Display Name</label>
      <input type="text" id="auth-name" placeholder="Pastor John">
    </div>
    <button class="auth-btn" id="auth-submit-btn">Sign In</button>
    <div class="auth-toggle">
      <span id="auth-toggle-text">No account?</span>
      <a id="auth-toggle-link">Create one</a>
    </div>
  </div>
</div>

<!-- ─── App Shell ───────────────────────────────────────────────────────── -->
<div id="app">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-brand">
      <span class="wordmark">FlockChat</span>
      <span class="build-tag">Test</span>
    </div>
    <div class="topbar-context">
      <span class="topbar-channel-name" id="topbar-channel-name">
        <span class="sigil">#</span><span id="topbar-channel-label">general</span>

      <span class="topbar-channel-desc" id="topbar-channel-desc"></span>

      </div>
      <button class="topbar-icon-btn" id="btn-signout" title="Sign Out">Sign Out</button>
    </div>
  </div>

  <!-- Body -->
  <div class="app-body">

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-search">
        <input type="text" id="sidebar-search" placeholder="Search channels & people…">
      </div>
      <div class="sidebar-scroll">

        <!-- Channels -->
        <div class="sidebar-section-header">
          <span class="label">Channels</span>
          <button class="sidebar-add-btn" id="btn-new-channel" title="New Channel">＋</button>
        </div>
        <div id="channel-list"></div>

        <!-- Direct Messages -->
        <div class="sidebar-section-header" style="margin-top:8px">
          <span class="label">Direct Messages</span>
          <button class="sidebar-add-btn" id="btn-new-dm" title="New DM">＋</button>
        </div>
        <div id="dm-list"></div>

      </div>
    </div>

    <!-- Thread Pane (hidden until channel selected) -->
    <div id="no-channel">
      <div class="icon">💬</div>
      <h2>Select a channel or DM</h2>
      <p>Your messages will appear here.</p>
    </div>

    <div class="thread-pane" id="thread-pane" style="display:none">
      <div class="message-list" id="message-list"></div>
      <div class="typing-indicator" id="typing-indicator"></div>
      <div class="composer">
        <div class="composer-inner">
          <div class="composer-toolbar">
            <button class="composer-tool" id="btn-emoji" title="Emoji">😊</button>
            <button class="composer-tool" id="btn-attach" title="Attach file" disabled>📎</button>
          </div>
          <textarea id="composer-input" rows="1" placeholder="Message #general…"></textarea>
          <button class="send-btn" id="send-btn" disabled>Send</button>
        </div>
      </div>
    </div>

    <!-- Details Pane -->
    <div class="details-pane collapsed" id="details-pane">
      <div class="details-header">
        <span id="details-title">Channel Details</span>
        <button class="details-close" id="btn-details-close">✕</button>
      </div>
      <div class="details-scroll" id="details-scroll">
        <div class="details-section">
          <div class="details-section-label">Description</div>
          <p id="details-desc" style="font-size:0.83rem;color:var(--ink-muted)">—</p>
        </div>
        <div class="details-section">
          <div class="details-section-label">Members</div>
          <div id="details-members"></div>
        </div>
      </div>
    </div>

  </div><!-- /app-body -->
</div><!-- /app -->

<!-- ─── New Channel Modal ─────────────────────────────────────────────── -->
<div class="modal-backdrop" id="modal-new-channel">
  <div class="modal-card">
    <h2>Create a Channel</h2>
    <div class="modal-field">
      <label>Channel Name</label>
      <input type="text" id="new-ch-name" placeholder="worship-team">
    </div>
    <div class="modal-field">
      <label>Description</label>
      <input type="text" id="new-ch-desc" placeholder="What's this channel for?">
    </div>
    <div class="modal-field">
      <label>Type</label>
      <select id="new-ch-type">
        <option value="public">Public — anyone can join</option>
        <option value="private">Private — invite only</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="btn-cancel-channel">Cancel</button>
      <button class="btn-primary" id="btn-create-channel">Create Channel</button>
    </div>
  </div>
</div>

<!-- ─── New DM Modal ─────────────────────────────────────────────────── -->
<div class="modal-backdrop" id="modal-new-dm">
  <div class="modal-card">
    <h2>New Direct Message</h2>
    <div class="modal-field">
      <label>Select User</label>
      <select id="dm-user-select">
        <option value="">— Loading users… —</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="btn-cancel-dm">Cancel</button>
      <button class="btn-primary" id="btn-open-dm">Open DM</button>
    </div>
  </div>
</div>

<!-- ─── Emoji Picker ──────────────────────────────────────────────────── -->
<div id="emoji-picker">
  <div class="emoji-grid" id="emoji-grid"></div>
</div>

<!-- ─── Toast Container ───────────────────────────────────────────────── -->
<div id="toast-container"></div>
