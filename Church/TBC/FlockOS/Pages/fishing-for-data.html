<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FlockOS — Firestore Explorer</title>
  <link rel="icon" type="image/png" href="../Images/FlockOS_Angels.png">
  <link rel="apple-touch-icon" href="../Images/FlockOS_Angels.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&family=Noto+Mono&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg:          #1a1a2e;
      --bg-raised:   #16213e;
      --bg-card:     #0f172a;
      --bg-hover:    #1e2d4a;
      --line:        rgba(255,255,255,0.08);
      --line-strong: rgba(255,255,255,0.15);
      --ink:         #e0e0e0;
      --ink-muted:   #8899aa;
      --ink-faint:   #556677;
      --accent:      #7eaacc;
      --accent-soft: rgba(126,170,204,0.12);
      --gold:        #e8a838;
      --gold-soft:   rgba(232,168,56,0.12);
      --danger:      #f87171;
      --success:     #4ade80;
      --warn:        #fb923c;
      --topbar-h:    56px;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 100%; }
    body {
      font-family: 'Noto Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--ink); line-height: 1.6; min-height: 100vh;
    }

    /* ── Topbar ─────────────────────────────────────────────────────── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0;
      background: var(--bg-raised); border-bottom: 1px solid var(--line);
      display: flex; align-items: center; padding: 0 16px; z-index: 100; gap: 10px;
      min-height: var(--topbar-h);
    }
    .topbar-brand { font-size: 1.05rem; font-weight: 700; color: var(--accent); letter-spacing: .04em; white-space: nowrap; }
    .topbar-brand span { color: var(--gold); font-weight: 400; font-size: .78rem; margin-left: 8px; }
    .topbar-spacer { flex: 1; }
    .back-link {
      background: none; border: 1px solid var(--line); border-radius: 6px;
      color: var(--ink-muted); font-size: .78rem; padding: 5px 12px;
      cursor: pointer; font-family: inherit; text-decoration: none;
      transition: all .2s; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
    }
    .back-link:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Layout ─────────────────────────────────────────────────────── */
    .page { padding: calc(var(--topbar-h) + 16px) 16px 80px; max-width: 1200px; margin: 0 auto; }

    /* ── Connection Card ────────────────────────────────────────────── */
    .conn-card {
      background: var(--bg-raised); border: 1px solid var(--line);
      border-radius: 12px; padding: 20px; margin-bottom: 16px;
    }
    .conn-card h2 { font-size: .88rem; color: var(--accent); margin-bottom: 12px; }
    .conn-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
    .conn-row label { display: block; font-size: .68rem; color: var(--ink-muted); text-transform: uppercase; letter-spacing: .07em; font-weight: 700; margin-bottom: 4px; }
    .conn-row select, .conn-row input {
      background: var(--bg-card); border: 1px solid var(--line-strong); border-radius: 8px;
      color: var(--ink); font: inherit; font-size: .84rem; padding: 8px 12px; min-width: 180px;
    }
    .conn-row input { min-width: 220px; }
    .conn-row select:focus, .conn-row input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 18px; border-radius: 8px; border: 0;
      font: inherit; font-size: .78rem; font-weight: 700; cursor: pointer;
      transition: opacity .15s, transform .12s; white-space: nowrap;
    }
    .btn:hover:not(:disabled) { opacity: .85; transform: translateY(-1px); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-accent { background: var(--accent); color: #0f172a; }
    .btn-gold { background: var(--gold); color: #0f172a; }
    .btn-danger { background: var(--danger); color: #0f172a; }
    .btn-sm { padding: 4px 10px; font-size: .72rem; }

    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .72rem; font-weight: 700; padding: 4px 12px;
      border-radius: 20px; margin-left: 8px;
    }
    .status-pill.off { background: rgba(255,255,255,.06); color: var(--ink-muted); }
    .status-pill.on { background: rgba(74,222,128,.15); color: var(--success); }
    .status-pill.err { background: rgba(248,113,113,.15); color: var(--danger); }
    .status-pill .dot { width: 7px; height: 7px; border-radius: 50%; }
    .status-pill.off .dot { background: var(--ink-faint); }
    .status-pill.on .dot { background: var(--success); }
    .status-pill.err .dot { background: var(--danger); }

    /* ── Explorer ───────────────────────────────────────────────────── */
    .explorer {
      background: var(--bg-raised); border: 1px solid var(--line);
      border-radius: 12px; overflow: hidden;
    }
    .explorer-head {
      padding: 12px 18px; background: var(--bg-card); border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .explorer-head h2 { font-size: .88rem; color: var(--accent); flex: 1; }
    .breadcrumb { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; font-size: .76rem; }
    .breadcrumb .bc-seg { color: var(--ink-muted); cursor: pointer; transition: color .15s; }
    .breadcrumb .bc-seg:hover { color: var(--accent); }
    .breadcrumb .bc-sep { color: var(--ink-faint); }
    .breadcrumb .bc-cur { color: var(--gold); font-weight: 700; }

    .tree { padding: 0; }
    .tree-empty { padding: 24px; text-align: center; color: var(--ink-muted); font-size: .82rem; }

    /* Collection row */
    .tree-row {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-bottom: 1px solid var(--line);
      cursor: pointer; transition: background .12s; font-size: .82rem;
    }
    .tree-row:hover { background: var(--bg-hover); }
    .tree-row:last-child { border-bottom: none; }
    .tree-icon { font-size: .9rem; flex-shrink: 0; width: 20px; text-align: center; }
    .tree-label { flex: 1; font-weight: 600; color: var(--ink); word-break: break-all; }
    .tree-meta { font-size: .70rem; color: var(--ink-faint); white-space: nowrap; }
    .tree-arrow { color: var(--ink-faint); font-size: .7rem; }

    /* Document view */
    .doc-view { padding: 18px; }
    .doc-id { font-size: .82rem; color: var(--gold); font-weight: 700; margin-bottom: 12px; word-break: break-all; }
    .doc-fields { border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .field-row {
      display: flex; gap: 12px; padding: 8px 14px; border-bottom: 1px solid var(--line);
      font-size: .80rem; align-items: baseline;
    }
    .field-row:last-child { border-bottom: none; }
    .field-row:nth-child(even) { background: rgba(255,255,255,.02); }
    .field-key { color: var(--accent); font-weight: 700; min-width: 140px; flex-shrink: 0; word-break: break-all; font-family: 'Noto Mono', monospace; font-size: .76rem; }
    .field-type { color: var(--ink-faint); font-size: .68rem; min-width: 60px; flex-shrink: 0; text-transform: uppercase; font-weight: 600; }
    .field-val { color: var(--ink); word-break: break-all; flex: 1; font-family: 'Noto Mono', monospace; font-size: .76rem; }
    .field-val.null { color: var(--ink-faint); font-style: italic; }
    .field-val.bool-true { color: var(--success); }
    .field-val.bool-false { color: var(--danger); }
    .field-val.number { color: var(--warn); }
    .field-val.timestamp { color: #c084fc; }

    .subcol-row {
      display: flex; align-items: center; gap: 8px; padding: 8px 14px;
      border-top: 1px solid var(--line); cursor: pointer; transition: background .12s;
    }
    .subcol-row:hover { background: var(--bg-hover); }
    .subcol-label { font-size: .78rem; color: var(--gold); font-weight: 600; }

    /* Loading */
    .loading { padding: 32px; text-align: center; color: var(--ink-muted); font-size: .82rem; }
    @keyframes pulse { 0%,100% { opacity: .4; } 50% { opacity: 1; } }
    .loading::before { content: '⟳ '; animation: pulse 1.2s ease-in-out infinite; }

    /* Responsive */
    @media (max-width: 600px) {
      .conn-row select, .conn-row input { min-width: 100%; }
      .field-row { flex-direction: column; gap: 2px; }
      .field-key { min-width: unset; }
      .field-type { min-width: unset; }
    }

    /* ── Collection stats bar ──────────────────────────────────────── */
    .stats-bar {
      padding: 8px 18px; background: rgba(126,170,204,.06);
      border-bottom: 1px solid var(--line); display: flex; gap: 16px;
      font-size: .72rem; color: var(--ink-muted); flex-wrap: wrap;
    }
    .stats-bar strong { color: var(--ink); }
  </style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <span class="topbar-brand">FlockOS<span>Firestore Explorer</span></span>
  <span class="topbar-spacer"></span>
  <a class="back-link" href="index.html">← Dashboard</a>
</div>

<div class="page">

  <!-- Connection Card -->
  <div class="conn-card">
    <h2>🔥 Connect to a Firebase Project</h2>
    <div class="conn-row">
      <div>
        <label>Project</label>
        <select id="projSelect">
          <option value="">— Select a project —</option>
        </select>
      </div>
      <div>
        <label>Email</label>
        <input type="email" id="authEmail" placeholder="admin@church.org" autocomplete="email">
      </div>
      <div>
        <label>Password</label>
        <input type="password" id="authPass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-accent" id="btnConnect">Connect</button>
      <button class="btn btn-danger btn-sm" id="btnDisconnect" style="display:none;">Disconnect</button>
      <span class="status-pill off" id="statusPill"><span class="dot"></span> <span id="statusText">Disconnected</span></span>
    </div>
  </div>

  <!-- Explorer -->
  <div class="explorer" id="explorer" style="display:none;">
    <div class="explorer-head">
      <h2>📂 Explorer</h2>
      <div class="breadcrumb" id="breadcrumb"></div>
    </div>
    <div id="statsBar" class="stats-bar" style="display:none;"></div>
    <div class="tree" id="treeView">
      <div class="tree-empty">Connect to a project to begin exploring.</div>
    </div>
  </div>

</div>

<script>
(function() {
  'use strict';

  /* ── Project Registry ──────────────────────────────────────────────── */
  var PROJECTS = [
    {
      id: 'flockos-trinity',
      name: 'Trinity Baptist Church',
      shortName: 'TBC',
      config: {
        apiKey: 'AIzaSyDIJD_nOWkIWTwtFgNrfwTSr8BjAWDxKtQ',
        authDomain: 'flockos-trinity.firebaseapp.com',
        projectId: 'flockos-trinity',
        storageBucket: 'flockos-trinity.firebasestorage.app',
        messagingSenderId: '1068495552013',
        appId: '1:1068495552013:web:36b868b29367cf65d45f44'
      }
    },
    {
      id: 'flockos-theforest',
      name: 'The Forest',
      shortName: 'TheForest',
      config: {
        apiKey: 'AIzaSyCnIbShg2ra1t4EiP3CffsivwvIK-bNu8M',
        authDomain: 'flockos-theforest.firebaseapp.com',
        projectId: 'flockos-theforest',
        storageBucket: 'flockos-theforest.firebasestorage.app',
        messagingSenderId: '476522944133',
        appId: '1:476522944133:web:29ad5d19cf5a84c11b7bec'
      }
    },
    {
      id: 'flockos-truth',
      name: 'FlockOS Truth (Seed DB)',
      shortName: 'Truth',
      config: {
        apiKey: 'AIzaSyBZIZpYixNDpeRagDF_SozCvC8lJKTubHY',
        authDomain: 'flockos-truth.firebaseapp.com',
        projectId: 'flockos-truth',
        storageBucket: 'flockos-truth.firebasestorage.app',
        messagingSenderId: '102743161422',
        appId: '1:102743161422:web:a81ca3c70b13546962611f'
      }
    }
  ];

  /* Known root collection names (Firestore client SDK can't list collections) */
  var KNOWN_COLLECTIONS = [
    'attendance', 'broadcasts', 'calendarEvents', 'careAssignments',
    'careCases', 'careInteractions', 'checkinSessions', 'compassionLogs',
    'compassionRequests', 'compassionResources', 'conversations',
    'discipleshipPaths', 'events', 'giving', 'groups', 'journal',
    'memberCards', 'members', 'ministries', 'notifications',
    'outreachCampaigns', 'outreachContacts', 'outreachFollowUps',
    'permissions', 'pledges', 'prayers', 'quarterlyPlans', 'rsvps',
    'sermonReviews', 'sermonSeries', 'sermons', 'servicePlans',
    'settings', 'songArrangements', 'songs', 'templates', 'todos',
    'users', 'volunteers'
  ];

  /* Known subcollections per parent collection */
  var KNOWN_SUBCOLLECTIONS = {
    conversations: ['messages', 'typing'],
    groups: ['members']
  };

  /* ── State ─────────────────────────────────────────────────────────── */
  var _app = null;
  var _db = null;
  var _auth = null;
  var _currentProject = null;
  var _navStack = [];  // [{type:'root'}, {type:'collection',name:'...'}, {type:'doc',name:'...',id:'...'}, ...]

  /* ── DOM refs ──────────────────────────────────────────────────────── */
  var $proj   = document.getElementById('projSelect');
  var $email  = document.getElementById('authEmail');
  var $pass   = document.getElementById('authPass');
  var $btnC   = document.getElementById('btnConnect');
  var $btnD   = document.getElementById('btnDisconnect');
  var $pill   = document.getElementById('statusPill');
  var $status = document.getElementById('statusText');
  var $explorer = document.getElementById('explorer');
  var $tree   = document.getElementById('treeView');
  var $bread  = document.getElementById('breadcrumb');
  var $stats  = document.getElementById('statsBar');

  /* ── Populate project dropdown ─────────────────────────────────────── */
  PROJECTS.forEach(function(p) {
    var opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.name + ' (' + p.shortName + ')';
    $proj.appendChild(opt);
  });

  /* ── Status helpers ────────────────────────────────────────────────── */
  function setStatus(cls, text) {
    $pill.className = 'status-pill ' + cls;
    $status.textContent = text;
  }

  /* ── Connect ───────────────────────────────────────────────────────── */
  $btnC.addEventListener('click', async function() {
    var projId = $proj.value;
    var email = $email.value.trim();
    var pass = $pass.value;

    if (!projId) { alert('Select a project.'); return; }
    if (!email || !pass) { alert('Enter email and password.'); return; }

    var proj = PROJECTS.find(function(p) { return p.id === projId; });
    if (!proj) return;

    $btnC.disabled = true;
    setStatus('off', 'Connecting…');

    try {
      // Tear down previous if exists
      await teardown();

      // Initialize Firebase app with unique name
      _app = firebase.initializeApp(proj.config, 'explorer-' + Date.now());
      _db = _app.firestore();
      _auth = _app.auth();

      // Sign in
      await _auth.signInWithEmailAndPassword(email, pass);

      _currentProject = proj;
      setStatus('on', 'Connected — ' + proj.shortName);
      $btnD.style.display = '';
      $explorer.style.display = '';

      // Navigate to root
      _navStack = [{ type: 'root' }];
      renderRoot();

    } catch(e) {
      setStatus('err', 'Error: ' + (e.message || e));
      await teardown();
    }
    $btnC.disabled = false;
  });

  /* ── Disconnect ────────────────────────────────────────────────────── */
  $btnD.addEventListener('click', async function() {
    await teardown();
    setStatus('off', 'Disconnected');
    $btnD.style.display = 'none';
    $explorer.style.display = 'none';
    $tree.innerHTML = '<div class="tree-empty">Connect to a project to begin exploring.</div>';
    $bread.innerHTML = '';
    $stats.style.display = 'none';
  });

  async function teardown() {
    try {
      if (_auth) await _auth.signOut();
      if (_app) await _app.delete();
    } catch(e) { /* ignore */ }
    _app = null; _db = null; _auth = null; _currentProject = null;
    _navStack = [];
  }

  /* ── Breadcrumb ────────────────────────────────────────────────────── */
  function renderBreadcrumb() {
    $bread.innerHTML = '';
    _navStack.forEach(function(seg, i) {
      if (i > 0) {
        var sep = document.createElement('span');
        sep.className = 'bc-sep'; sep.textContent = ' › ';
        $bread.appendChild(sep);
      }
      var el = document.createElement('span');
      var isLast = (i === _navStack.length - 1);
      el.className = isLast ? 'bc-cur' : 'bc-seg';
      el.textContent = seg.type === 'root' ? ('🔥 ' + _currentProject.shortName) : seg.name;
      if (!isLast) {
        el.dataset.idx = i;
        el.addEventListener('click', function() { navigateTo(parseInt(this.dataset.idx)); });
      }
      $bread.appendChild(el);
    });
  }

  function navigateTo(stackIdx) {
    _navStack = _navStack.slice(0, stackIdx + 1);
    var top = _navStack[_navStack.length - 1];
    if (top.type === 'root') renderRoot();
    else if (top.type === 'collection') loadCollection(top.name, buildRef());
    else if (top.type === 'doc') loadDocument(top.id, buildRef());
  }

  /* Build a Firestore reference from the current nav stack */
  function buildRef() {
    var ref = _db;
    for (var i = 1; i < _navStack.length; i++) {
      var seg = _navStack[i];
      if (seg.type === 'collection') ref = ref.collection(seg.name);
      else if (seg.type === 'doc') ref = ref.doc(seg.id);
    }
    return ref;
  }

  /* ── Render Root (list known collections) ──────────────────────────── */
  function renderRoot() {
    renderBreadcrumb();
    $stats.style.display = 'none';
    $tree.innerHTML = '<div class="loading">Scanning collections…</div>';

    // Probe each known collection for at least one doc
    var promises = KNOWN_COLLECTIONS.map(function(name) {
      return _db.collection(name).limit(1).get()
        .then(function(snap) { return { name: name, exists: !snap.empty, size: snap.size }; })
        .catch(function() { return { name: name, exists: false, size: 0 }; });
    });

    Promise.all(promises).then(function(results) {
      var existing = results.filter(function(r) { return r.exists; });
      $tree.innerHTML = '';

      if (!existing.length) {
        $tree.innerHTML = '<div class="tree-empty">No data found in known collections.</div>';
        return;
      }

      $stats.style.display = '';
      $stats.innerHTML = '<strong>' + existing.length + '</strong> collections with data &nbsp;·&nbsp; ' +
        '<strong>' + KNOWN_COLLECTIONS.length + '</strong> scanned';

      existing.forEach(function(col) {
        var row = document.createElement('div');
        row.className = 'tree-row';
        row.innerHTML = '<span class="tree-icon">📁</span>' +
          '<span class="tree-label">' + esc(col.name) + '</span>' +
          '<span class="tree-arrow">›</span>';
        row.addEventListener('click', function() {
          _navStack.push({ type: 'collection', name: col.name });
          loadCollection(col.name, _db.collection(col.name));
        });
        $tree.appendChild(row);
      });
    });
  }

  /* ── Load Collection ───────────────────────────────────────────────── */
  function loadCollection(name, colRef) {
    renderBreadcrumb();
    $tree.innerHTML = '<div class="loading">Loading ' + esc(name) + '…</div>';
    $stats.style.display = 'none';

    colRef.orderBy(firebase.firestore.FieldPath.documentId()).limit(200).get()
      .then(function(snap) {
        $tree.innerHTML = '';
        $stats.style.display = '';
        $stats.innerHTML = '<strong>' + snap.size + '</strong> document' + (snap.size !== 1 ? 's' : '') +
          (snap.size >= 200 ? ' (showing first 200)' : '');

        if (snap.empty) {
          $tree.innerHTML = '<div class="tree-empty">Collection is empty.</div>';
          $stats.style.display = 'none';
          return;
        }

        snap.forEach(function(doc) {
          var data = doc.data();
          var preview = docPreview(data);
          var row = document.createElement('div');
          row.className = 'tree-row';
          row.innerHTML = '<span class="tree-icon">📄</span>' +
            '<span class="tree-label">' + esc(doc.id) + '</span>' +
            '<span class="tree-meta">' + esc(preview) + '</span>' +
            '<span class="tree-arrow">›</span>';
          row.addEventListener('click', function() {
            _navStack.push({ type: 'doc', name: doc.id, id: doc.id });
            loadDocument(doc.id, colRef.doc(doc.id));
          });
          $tree.appendChild(row);
        });
      })
      .catch(function(e) {
        $tree.innerHTML = '<div class="tree-empty" style="color:var(--danger);">Error: ' + esc(e.message) + '</div>';
        $stats.style.display = 'none';
      });
  }

  /* ── Load Document ─────────────────────────────────────────────────── */
  function loadDocument(docId, docRef) {
    renderBreadcrumb();
    $tree.innerHTML = '<div class="loading">Loading document…</div>';
    $stats.style.display = 'none';

    docRef.get().then(function(snap) {
      $tree.innerHTML = '';
      if (!snap.exists) {
        $tree.innerHTML = '<div class="tree-empty">Document does not exist.</div>';
        return;
      }

      var data = snap.data();
      var div = document.createElement('div');
      div.className = 'doc-view';

      // Doc ID header
      var idEl = document.createElement('div');
      idEl.className = 'doc-id';
      idEl.textContent = '📄 ' + docId;
      div.appendChild(idEl);

      // Fields table
      var fields = document.createElement('div');
      fields.className = 'doc-fields';

      var keys = Object.keys(data).sort();
      if (!keys.length) {
        fields.innerHTML = '<div class="field-row"><span class="field-val null">No fields</span></div>';
      } else {
        keys.forEach(function(key) {
          var val = data[key];
          var info = formatValue(val);
          var row = document.createElement('div');
          row.className = 'field-row';
          row.innerHTML = '<span class="field-key">' + esc(key) + '</span>' +
            '<span class="field-type">' + info.type + '</span>' +
            '<span class="field-val ' + info.cls + '">' + info.html + '</span>';
          fields.appendChild(row);
        });
      }
      div.appendChild(fields);

      // Subcollections
      var parentColName = _navStack.length >= 2 ? _navStack[_navStack.length - 2].name : null;
      var subs = KNOWN_SUBCOLLECTIONS[parentColName] || [];
      if (subs.length) {
        var subHead = document.createElement('div');
        subHead.style.cssText = 'margin-top:16px;font-size:.76rem;color:var(--ink-muted);font-weight:700;text-transform:uppercase;letter-spacing:.07em;';
        subHead.textContent = 'Subcollections';
        div.appendChild(subHead);

        subs.forEach(function(subName) {
          var subRow = document.createElement('div');
          subRow.className = 'subcol-row';
          subRow.innerHTML = '<span class="tree-icon">📁</span><span class="subcol-label">' + esc(subName) + '</span><span class="tree-arrow">›</span>';
          subRow.addEventListener('click', function() {
            _navStack.push({ type: 'collection', name: subName });
            loadCollection(subName, docRef.collection(subName));
          });
          div.appendChild(subRow);
        });
      }

      $tree.appendChild(div);
    }).catch(function(e) {
      $tree.innerHTML = '<div class="tree-empty" style="color:var(--danger);">Error: ' + esc(e.message) + '</div>';
    });
  }

  /* ── Value formatting ──────────────────────────────────────────────── */
  function formatValue(val) {
    if (val === null || val === undefined)
      return { type: 'null', cls: 'null', html: 'null' };
    if (typeof val === 'boolean')
      return { type: 'bool', cls: val ? 'bool-true' : 'bool-false', html: String(val) };
    if (typeof val === 'number')
      return { type: 'num', cls: 'number', html: String(val) };
    if (typeof val === 'string') {
      var display = val.length > 300 ? val.substring(0, 300) + '…' : val;
      return { type: 'str', cls: '', html: esc(display) };
    }
    // Firestore Timestamp
    if (val && typeof val.toDate === 'function') {
      try {
        var d = val.toDate();
        return { type: 'time', cls: 'timestamp', html: esc(d.toLocaleString()) };
      } catch(e) {
        return { type: 'time', cls: 'timestamp', html: '(timestamp)' };
      }
    }
    // GeoPoint
    if (val && typeof val.latitude === 'number' && typeof val.longitude === 'number')
      return { type: 'geo', cls: '', html: esc(val.latitude + ', ' + val.longitude) };
    // Reference
    if (val && val.path)
      return { type: 'ref', cls: '', html: esc(val.path) };
    // Array
    if (Array.isArray(val)) {
      var items = val.map(function(v) { return formatValue(v).html; });
      var arrStr = items.length <= 5 ? items.join(', ') : items.slice(0, 5).join(', ') + ' … +' + (items.length - 5);
      return { type: 'arr[' + val.length + ']', cls: '', html: arrStr };
    }
    // Object / Map
    if (typeof val === 'object') {
      var k = Object.keys(val);
      var preview = k.slice(0, 4).map(function(key) { return esc(key) + ': ' + formatValue(val[key]).html; }).join(', ');
      if (k.length > 4) preview += ' … +' + (k.length - 4);
      return { type: 'map{' + k.length + '}', cls: '', html: preview };
    }
    return { type: '?', cls: '', html: esc(String(val)) };
  }

  function docPreview(data) {
    // Show a short preview: first recognizable field
    var tryFields = ['name', 'displayName', 'title', 'email', 'subject', 'type', 'label', 'text'];
    for (var i = 0; i < tryFields.length; i++) {
      if (data[tryFields[i]] && typeof data[tryFields[i]] === 'string') {
        var v = data[tryFields[i]];
        return v.length > 40 ? v.substring(0, 40) + '…' : v;
      }
    }
    var keys = Object.keys(data);
    return keys.length + ' field' + (keys.length !== 1 ? 's' : '');
  }

  /* ── HTML escaping ─────────────────────────────────────────────────── */
  var _escEl;
  function esc(str) {
    if (!_escEl) _escEl = document.createElement('div');
    _escEl.textContent = str;
    return _escEl.innerHTML;
  }

})();
</script>
</body>
