  <!--
    MODULE PRELOAD — boot + home-view graph
    Without these hints the browser fetches ES modules serially: download
    the_ark.js → parse → discover 7 imports → download each → parse → discover
    their imports → … (4–5 round trips before leaf modules start loading).
    With modulepreload every file in the tree starts fetching AND compiling in
    parallel the moment the HTML is parsed, collapsing N waterfalls into 1.
  -->

  <link rel="modulepreload" href="Scripts/the_ark.js">

  <!-- Flash prevention only — the_adornment.js applies data-theme after boot. -->
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root { --bg: #f7f8fb; --bg-raised: #ffffff; --ink: #1b264f; --line: #e5e7ef; }
    /* html/body share the page background so the iOS PWA safe-area at the
       bottom (home indicator) flows seamlessly with the page — no visible
       seam between content and the safe-area band. The topbar paints its
       own dark over the notch via padding-top: safe-top. */
    html { height: 100%; overflow: hidden; background: var(--bg); }
    body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); height: 100%; overflow: hidden; }
    .veil-wrap {
      display: grid;
      grid-template-areas: "top top" "side main";
      grid-template-columns: 256px 1fr;
      grid-template-rows: 60px 1fr;
      height: 100%;
      min-height: 100vh;
      position: relative;
    }
    #the-veil-top   { grid-area: top; }
    #the-veil-side  { grid-area: side; overflow-y: auto; overflow-x: hidden; }
    #the-holy-place { grid-area: main; min-width: 0; overflow-y: auto; }
    #the-veil-foot  { grid-area: foot; }
    @media (max-width: 860px) {
      .veil-wrap {
        grid-template-columns: 1fr;
        grid-template-areas: "top" "main" "foot";
      }
      #the-veil-side { display: none; }
    }
  </style>
</head>
<body>
  <!--
    THE SHELL CONTRACT (per A-Instructions.md §4)
    No view markup, no inline JS beyond flash-prevention above, no third
    structural element. Everything else is mounted by the_ark.js → the_veil.
  -->
  <div class="veil-wrap">
    <header id="the-veil-top"   class="veil-top"   role="banner"></header>
    <nav    id="the-veil-side"  class="veil-side"  role="navigation" aria-label="Primary"></nav>
    <main   id="the-holy-place" class="veil-main"  role="main"></main>
    <footer id="the-veil-foot"  class="veil-foot"  role="contentinfo"></footer>
    <div    id="the-staff-host" class="staff-host" aria-live="polite" aria-atomic="true"></div>
  </div>

  <!--
    Auto-start the new shell. the_ark.js gates auto-start on ?covenant=new,
    so during the transition both old and new shells coexist; here we are
    inside the New_Covenant tree so we always start.
  -->
  <script>
    if (!new URLSearchParams(location.search).has('covenant')) {
      const u = new URL(location.href);
      u.searchParams.set('covenant', 'new');
      history.replaceState(null, '', u);
    }
  </script>
