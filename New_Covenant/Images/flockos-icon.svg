<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient: deep navy → indigo -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#0c1445"/>
      <stop offset="100%" stop-color="#1a0e3c"/>
    </linearGradient>
    <!-- Outer radial glow halo (gold) -->
    <radialGradient id="halo-gold" cx="50%" cy="62%" r="44%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#e8a838" stop-opacity="0.38"/>
      <stop offset="60%"  stop-color="#e8a838" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#e8a838" stop-opacity="0"/>
    </radialGradient>
    <!-- Outer radial glow (violet) -->
    <radialGradient id="halo-violet" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <!-- Main flame gradient (top=white, bottom=burnt orange) -->
    <linearGradient id="flame-main" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse"
                    y1="108" y2="410">
      <stop offset="0%"   stop-color="#fffef0"/>
      <stop offset="28%"  stop-color="#ffd24a"/>
      <stop offset="62%"  stop-color="#e88820"/>
      <stop offset="100%" stop-color="#b84d10"/>
    </linearGradient>
    <!-- Inner bright core -->
    <linearGradient id="flame-inner" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse"
                    y1="160" y2="390">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="45%"  stop-color="#fff5c0" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#ffd24a" stop-opacity="0.25"/>
    </linearGradient>
    <!-- Base glow blur filter -->
    <filter id="flame-blur" x="-40%" y="-20%" width="180%" height="160%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="glow-sm" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Violet ambient halo (behind flame) -->
  <ellipse cx="256" cy="290" rx="230" ry="190" fill="url(#halo-violet)"/>

  <!-- Gold glow halo (close to flame base) -->
  <ellipse cx="256" cy="345" rx="160" ry="100" fill="url(#halo-gold)"/>

  <!-- Blurred glow copy of flame (depth) -->
  <path filter="url(#flame-blur)"
    d="M256 108
       C272 136, 316 158, 318 204
       C320 236, 340 254, 332 292
       C322 338, 296 372, 282 392
       C272 406, 262 414, 256 416
       C250 414, 240 406, 230 392
       C216 372, 190 338, 180 292
       C172 254, 192 236, 194 204
       C196 158, 240 136, 256 108 Z"
    fill="#e8a838" opacity="0.55"/>

  <!-- Main flame body -->
  <path
    d="M256 108
       C272 136, 316 158, 318 204
       C320 236, 340 254, 332 292
       C322 338, 296 372, 282 392
       C272 406, 262 414, 256 416
       C250 414, 240 406, 230 392
       C216 372, 190 338, 180 292
       C172 254, 192 236, 194 204
       C196 158, 240 136, 256 108 Z"
    fill="url(#flame-main)"/>

  <!-- Swirl / secondary sub-flame (left lean) -->
  <path
    d="M256 160
       C246 180, 220 196, 218 224
       C216 246, 228 258, 222 278
       C230 300, 244 314, 250 330
       C253 340, 255 350, 256 360
       C252 344, 246 328, 240 310
       C232 288, 218 268, 220 246
       C222 218, 240 198, 256 160 Z"
    fill="#ffd24a" opacity="0.35"/>

  <!-- Inner bright core -->
  <path
    d="M256 166
       C264 192, 286 210, 284 238
       C282 260, 292 276, 286 302
       C278 330, 264 350, 256 362
       C248 350, 234 330, 226 302
       C220 276, 230 260, 228 238
       C226 210, 248 192, 256 166 Z"
    fill="url(#flame-inner)"/>

  <!-- Tip glow (small bright dot at top) -->
  <ellipse cx="256" cy="132" rx="18" ry="26" fill="#fffef0" opacity="0.82" filter="url(#glow-sm)"/>
  <ellipse cx="256" cy="130" rx="8" ry="14" fill="#ffffff" opacity="0.95"/>

  <!-- Lampstand base -->
  <rect x="238" y="408" width="36" height="52" rx="8" fill="#e8a838" opacity="0.80"/>
  <!-- Horizontal arm/crosspiece -->
  <rect x="192" y="444" width="128" height="14" rx="7" fill="#e8a838" opacity="0.55"/>
  <!-- Feet -->
  <rect x="192" y="452" width="38" height="10" rx="5" fill="#e8a838" opacity="0.40"/>
  <rect x="282" y="452" width="38" height="10" rx="5" fill="#e8a838" opacity="0.40"/>

  <!-- Thin horizontal "ground" line for context -->
  <rect x="152" y="462" width="208" height="3" rx="1.5" fill="#e8a838" opacity="0.25"/>
</svg>
