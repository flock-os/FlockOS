<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FlockOS — Smoke Tests</title>
<style>
  :root { --bg: #0f1117; --bg2: #1a1d26; --ink: #e8e8ed; --ink2: #8b8fa0; --pass: #22c55e; --fail: #ef4444; --warn: #f59e0b; --accent: #6366f1; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--ink); padding: 20px; max-width: 800px; margin: 0 auto; }
  h1 { font-size: 1.3rem; margin-bottom: 4px; }
  .subtitle { color: var(--ink2); font-size: 0.82rem; margin-bottom: 20px; }
  .stats { display: flex; gap: 16px; margin-bottom: 20px; }
  .stat { background: var(--bg2); padding: 12px 18px; border-radius: 10px; text-align: center; min-width: 80px; }
  .stat .num { font-size: 1.6rem; font-weight: 800; }
  .stat .label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink2); margin-top: 2px; }
  .group { margin-bottom: 20px; }
  .group-title { font-size: 0.85rem; font-weight: 700; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em; }
  .test-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; margin-bottom: 4px; font-size: 0.84rem; background: var(--bg2); }
  .test-row .icon { font-size: 1rem; flex-shrink: 0; }
  .test-row .name { flex: 1; }
  .test-row .ms { font-size: 0.72rem; color: var(--ink2); }
  .pass .icon { color: var(--pass); }
  .fail .icon { color: var(--fail); }
  .skip .icon { color: var(--warn); }
  .pending .icon { color: var(--ink2); }
  .err-detail { font-size: 0.75rem; color: var(--fail); margin-top: 4px; padding-left: 28px; }
  .run-btn { background: var(--accent); color: #fff; border: none; padding: 10px 24px; border-radius: 10px; font-size: 0.9rem; font-weight: 700; cursor: pointer; margin-bottom: 20px; }
  .run-btn:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>

<h1>&#128300; FlockOS Smoke Tests</h1>
<p class="subtitle" id="statusMsg">Loading FlockOS scripts…</p>
<button class="run-btn" id="runBtn" onclick="runAll()" disabled>&#9654;  Run All Tests</button>

<div class="stats" id="stats"></div>
<div id="results"></div>

<!-- ═══ Bootstrap: Load FlockOS scripts when opened standalone ═══ -->
<script>
(function() {
  // Path from Tools/Development Scripts/ up to FlockOS/
  var BASE = '../../';
  var SCRIPTS_BASE = BASE + 'Scripts/';

  // Provide default Firebase config so UpperRoom can initialize
  if (!window.FLOCK_FIREBASE_CONFIG) {
    window.FLOCK_FIREBASE_CONFIG = {
      apiKey: 'AIzaSyBA-fkxjABbwIHn0i6MPiXbGwahfJmuJeo',
      authDomain: 'flockos-notify.firebaseapp.com',
      projectId: 'flockos-notify'
    };
  }

  // If key globals already exist (injected into a live page), skip loading
  if (typeof Modules !== 'undefined' && typeof TheVine !== 'undefined') {
    document.getElementById('statusMsg').textContent = 'Globals detected — running in embedded mode.';
    document.getElementById('runBtn').disabled = false;
    return;
  }

  var FIREBASE_SCRIPTS = [
    'https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js',
    'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js',
    'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js'
  ];

  // Order matters — dependencies loaded first
  var APP_SCRIPTS = [
    'the_upper_room.js',
    'fine_linen.js',
    'the_true_vine.js',
    'the_wellspring.js',
    'the_well.js',
    'firm_foundation.js',
    'the_tabernacle.js',
    'the_truth.js',
    'the_seasons.js',
    'the_life.js',
    'the_scrolls.js',
    'the_shepherd.js',
    'the_fold.js',
    'the_way.js',
    'the_harvest.js',
    'the_shofar.js',
    'the_trumpet.js'
  ];

  var loadQ = FIREBASE_SCRIPTS.concat(APP_SCRIPTS.map(function(s) { return SCRIPTS_BASE + s; }));
  var idx = 0;
  var status = document.getElementById('statusMsg');

  function loadNext() {
    if (idx >= loadQ.length) {
      status.innerHTML = 'All scripts loaded. <strong>Run tests below.</strong><br>'
        + '<span style="font-size:0.75rem;color:var(--ink2);">Note: Auth-dependent tests require a logged-in session. '
        + 'For full results, open from a deployed FlockOS page console:<br>'
        + '<code>window.open("../../Tools/Development%20Scripts/smoke_test.html")</code></span>';
      document.getElementById('runBtn').disabled = false;
      return;
    }
    var src = loadQ[idx];
    var name = src.split('/').pop();
    status.textContent = 'Loading ' + name + ' (' + (idx + 1) + '/' + loadQ.length + ')…';
    var s = document.createElement('script');
    s.src = src;
    s.onload = function() { idx++; loadNext(); };
    s.onerror = function() {
      status.textContent = 'Warning: Failed to load ' + name + ' — continuing…';
      idx++;
      setTimeout(loadNext, 200);
    };
    document.head.appendChild(s);
  }

  loadNext();
})();
</script>

<script>
/* ══════════════════════════════════════════════════════════════════════
   FlockOS Smoke Test Harness — vanilla JS, zero dependencies
   ══════════════════════════════════════════════════════════════════════ */

var _results = [];
var _groups = {};

function test(group, name, fn) {
  if (!_groups[group]) _groups[group] = [];
  _groups[group].push({ name: name, fn: fn, status: 'pending', ms: 0, error: null });
}

// ── Test Definitions ──────────────────────────────────────────────────

// 1. Script Loading — global names per IIFE const/var at top of each file
test('Script Loading', 'the_tabernacle.js → Modules', function() {
  if (typeof Modules === 'undefined') throw new Error('Modules not defined');
  if (typeof Modules.render !== 'function') throw new Error('Modules.render not a function');
});

test('Script Loading', 'the_true_vine.js → TheVine', function() {
  if (typeof TheVine === 'undefined') throw new Error('TheVine not defined');
  if (typeof TheVine.session !== 'function') throw new Error('TheVine.session not a function');
});

test('Script Loading', 'the_life.js → TheLife', function() {
  if (typeof TheLife === 'undefined') throw new Error('TheLife not defined');
});

test('Script Loading', 'the_upper_room.js → UpperRoom', function() {
  if (typeof UpperRoom === 'undefined') throw new Error('UpperRoom not defined');
  if (typeof UpperRoom.init !== 'function') throw new Error('UpperRoom.init not a function');
});

test('Script Loading', 'the_truth.js → TheTruth', function() {
  if (typeof TheTruth === 'undefined') throw new Error('TheTruth not defined');
});

test('Script Loading', 'the_harvest.js → TheHarvest', function() {
  if (typeof TheHarvest === 'undefined') throw new Error('TheHarvest not defined');
});

test('Script Loading', 'the_seasons.js → TheSeason', function() {
  if (typeof TheSeason === 'undefined') throw new Error('TheSeason not defined');
});

test('Script Loading', 'fine_linen.js → Adornment', function() {
  if (typeof Adornment === 'undefined') throw new Error('Adornment not defined — theme engine missing');
});

test('Script Loading', 'the_wellspring.js → TheWellspring', function() {
  if (typeof TheWellspring === 'undefined') throw new Error('TheWellspring not defined — offline layer missing');
});

test('Script Loading', 'firm_foundation.js → Nehemiah', function() {
  if (typeof Nehemiah === 'undefined') throw new Error('Nehemiah not defined — auth guard missing');
});

test('Script Loading', 'the_fold.js → TheFold', function() {
  if (typeof TheFold === 'undefined') throw new Error('TheFold not defined');
});

test('Script Loading', 'the_shepherd.js → TheShepherd', function() {
  if (typeof TheShepherd === 'undefined') throw new Error('TheShepherd not defined');
});

test('Script Loading', 'the_scrolls.js → TheScrolls', function() {
  if (typeof TheScrolls === 'undefined') throw new Error('TheScrolls not defined');
});

test('Script Loading', 'the_way.js → TheWay', function() {
  if (typeof TheWay === 'undefined') throw new Error('TheWay not defined');
});

// 2. Service Worker
test('Service Worker', 'Registration supported', function() {
  if (!('serviceWorker' in navigator)) throw new Error('Service worker not supported');
});

test('Service Worker', 'Active registration', async function() {
  var reg = await navigator.serviceWorker.getRegistration();
  if (!reg) throw new Error('No active service worker registration');
  if (!reg.active) throw new Error('Service worker registered but not active');
});

// 3. Auth & Session
test('Auth & Session', 'TheVine session exists', function() {
  if (typeof TheVine === 'undefined') throw new Error('TheVine not loaded');
  var s = typeof TheVine.session === 'function' ? TheVine.session() : null;
  if (!s) throw new Error('No session — user not logged in');
  if (!s.email) throw new Error('Session exists but no email');
});

test('Auth & Session', 'Nehemiah guard loaded', function() {
  if (typeof Nehemiah === 'undefined') throw new Error('Nehemiah not defined');
});

test('Auth & Session', 'UpperRoom auth state', function() {
  if (typeof UpperRoom === 'undefined') throw new Error('UpperRoom not loaded');
  if (typeof UpperRoom.isReady !== 'function') throw new Error('UpperRoom.isReady not a function');
});

// 4. API Connectivity
test('API Connectivity', 'TheVine endpoints configured', function() {
  if (typeof TheVine === 'undefined') throw new Error('TheVine not loaded');
  // TheVine uses internal _HOSTS; just verify .app namespace exists
  if (!TheVine.app) throw new Error('TheVine.app namespace missing');
});

test('API Connectivity', 'Public content API (books)', async function() {
  if (typeof TheVine === 'undefined') throw new Error('TheVine not loaded');
  var rows = await TheVine.app.books();
  if (!rows) throw new Error('books() returned null');
  var arr = Array.isArray(rows) ? rows : (rows.rows || []);
  if (!arr.length) throw new Error('books() returned 0 rows');
});

// 5. Firebase / UpperRoom
test('Firebase', 'Firebase SDK loaded', function() {
  if (typeof firebase === 'undefined') throw new Error('Firebase SDK not loaded');
  if (!firebase.firestore) throw new Error('Firestore not available');
});

test('Firebase', 'UpperRoom ready', function() {
  if (typeof UpperRoom === 'undefined') throw new Error('UpperRoom not loaded');
  if (typeof UpperRoom.isReady === 'function' && !UpperRoom.isReady()) throw new Error('UpperRoom not ready — Firebase auth may have failed');
});

// 6. DOM Structure (only meaningful when run inside the_good_shepherd.html)
test('DOM Structure', 'Main content area exists', function() {
  var el = document.getElementById('main') || document.getElementById('content') || document.querySelector('[role="main"]') || document.querySelector('main');
  if (!el) throw new Error('No main content area found (#main, #content, <main>, or [role=main]) — run inside the_good_shepherd.html');
});

test('DOM Structure', 'Offline banner exists', function() {
  if (!document.getElementById('offlineBanner')) throw new Error('#offlineBanner not found — run inside the_good_shepherd.html');
});

// 7. Module System
test('Module System', 'Modules.render callable', function() {
  if (typeof Modules === 'undefined') throw new Error('Modules not loaded');
  if (typeof Modules.render !== 'function') throw new Error('Modules.render not a function');
});

test('Module System', 'navigate() is global', function() {
  if (typeof navigate !== 'function') throw new Error('navigate() not on window');
});

// 8. Offline / Connectivity
test('Offline Support', 'navigator.onLine available', function() {
  if (typeof navigator.onLine !== 'boolean') throw new Error('navigator.onLine not available');
});

test('Offline Support', 'Connectivity banner API exposed', function() {
  if (typeof window._showConnBanner !== 'function') throw new Error('_showConnBanner not defined');
  if (typeof window._hideConnBanner !== 'function') throw new Error('_hideConnBanner not defined');
});

// ── Runner ────────────────────────────────────────────────────────────

async function runAll() {
  var btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = 'Running…';

  var passed = 0, failed = 0, skipped = 0;
  var html = '';

  var groupKeys = Object.keys(_groups);
  for (var gi = 0; gi < groupKeys.length; gi++) {
    var gk = groupKeys[gi];
    var tests = _groups[gk];
    html += '<div class="group"><div class="group-title">' + gk + '</div>';

    for (var ti = 0; ti < tests.length; ti++) {
      var t = tests[ti];
      var start = performance.now();
      try {
        var result = t.fn();
        if (result && typeof result.then === 'function') {
          await Promise.race([
            result,
            new Promise(function(_, rej) { setTimeout(function() { rej(new Error('Timed out after 10s')); }, 10000); })
          ]);
        }
        t.status = 'pass';
        t.ms = Math.round(performance.now() - start);
        passed++;
      } catch (e) {
        t.status = 'fail';
        t.ms = Math.round(performance.now() - start);
        t.error = e.message || String(e);
        failed++;
      }

      var cls = t.status === 'pass' ? 'pass' : 'fail';
      var icon = t.status === 'pass' ? '&#10004;' : '&#10006;';
      html += '<div class="test-row ' + cls + '">';
      html += '<span class="icon">' + icon + '</span>';
      html += '<span class="name">' + t.name + '</span>';
      html += '<span class="ms">' + t.ms + 'ms</span>';
      html += '</div>';
      if (t.error) html += '<div class="err-detail">' + t.error + '</div>';
    }
    html += '</div>';
  }

  var total = passed + failed + skipped;
  document.getElementById('stats').innerHTML =
    '<div class="stat"><div class="num" style="color:var(--ink);">' + total + '</div><div class="label">Total</div></div>' +
    '<div class="stat"><div class="num" style="color:var(--pass);">' + passed + '</div><div class="label">Passed</div></div>' +
    '<div class="stat"><div class="num" style="color:' + (failed ? 'var(--fail)' : 'var(--pass)') + ';">' + failed + '</div><div class="label">Failed</div></div>';
  document.getElementById('results').innerHTML = html;
  btn.disabled = false;
  btn.textContent = '&#9654;  Run Again';
}
</script>
</body>
</html>
