<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FlockOS — Great Commission</title>
  <link rel="icon" type="image/png" href="../Images/FlockOS_Camo.png">
  <link rel="apple-touch-icon" href="../Images/FlockOS_Camo.png">
  <link rel="manifest" href="../../manifest.json">
  <meta name="theme-color" content="#e8a838">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --topbar-h: 56px;
      /* Fallback values — overridden by Fine Linen theme system */
      --bg: #1a1a2e;
      --bg-raised: #16213e;
      --ink: #e0e0e0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 100%; -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
      min-height: 100vh;
      min-height: 100dvh;
    }

    /* ── Top Bar ─────────────────────────────────────────────────────────── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      background: var(--bg-raised);
      border-bottom: 1px solid var(--line, rgba(255,255,255,0.08));
      display: flex; align-items: center; padding: 0 20px;
      z-index: 100; gap: 12px;
    }
    .topbar-brand {
      font-size: 1.05rem; font-weight: 700;
      color: var(--accent, #7eaacc); letter-spacing: 0.04em;
      margin-right: auto;
    }
    .topbar-brand span {
      color: var(--gold, #e8a838); font-weight: 400;
      font-size: 0.78rem; margin-left: 8px;
    }
    .topbar-user { display: flex; align-items: center; gap: 12px; }
    .topbar-user .name { color: var(--ink); font-size: 0.85rem; font-weight: 500; }
    .back-link {
      background: none; border: 1px solid var(--line, rgba(255,255,255,0.08));
      border-radius: 6px; color: var(--ink-muted, #999); font-size: 0.78rem;
      padding: 5px 12px; cursor: pointer; font-family: inherit;
      text-decoration: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px;
    }
    .back-link:hover { border-color: var(--accent, #7eaacc); color: var(--accent, #7eaacc); }
    .logout-btn {
      background: none; border: 1px solid var(--line, rgba(255,255,255,0.08));
      border-radius: 6px; color: var(--ink-muted, #999); font-size: 0.78rem;
      padding: 5px 12px; cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--danger, #f87171); color: var(--danger, #f87171); }

    /* ── Main Content ──────────────────────────────────────────────────── */
    .main {
      margin-top: var(--topbar-h);
      padding: 32px 24px 120px;
      max-width: 1200px;
      margin-left: auto; margin-right: auto;
    }
    @media (max-width: 600px) { .main { padding: 20px 12px 80px; } }

    /* ── Page Header ──────────────────────────────────────────────────── */
    .page-header {
      margin-bottom: 28px; padding-bottom: 18px;
      border-bottom: 1px solid var(--line, rgba(255,255,255,0.08));
      display: flex; flex-wrap: wrap; justify-content: space-between;
      align-items: flex-start; gap: 16px;
    }
    .page-header h1 { color: var(--accent, #7eaacc); font-weight: 700; font-size: 1.5rem; }
    .page-header p { color: var(--ink-muted, #999); margin-top: 4px; font-size: 0.88rem; }
    .header-actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }

    /* ── Buttons ──────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: 8px; font-size: 0.84rem;
      font-family: inherit; font-weight: 600; cursor: pointer;
      border: 1px solid var(--accent, #7eaacc);
      background: var(--accent-soft, rgba(126,170,204,0.1));
      color: var(--accent, #7eaacc);
      transition: all 0.2s; text-decoration: none;
    }
    .btn:hover {
      background: var(--accent, #7eaacc);
      color: var(--bg, #1a1a2e);
    }
    .btn-primary {
      background: var(--accent, #7eaacc);
      color: var(--bg, #1a1a2e);
    }
    .btn-primary:hover { opacity: 0.88; color: var(--bg, #1a1a2e); }
    .btn-gold {
      border-color: var(--gold, #e8a838);
      background: rgba(232,168,56,0.1);
      color: var(--gold, #e8a838);
    }
    .btn-gold:hover { background: var(--gold, #e8a838); color: var(--bg, #1a1a2e); }
    .btn-danger { border-color: var(--danger, #f87171); background: rgba(248,113,113,0.08); color: var(--danger, #f87171); }
    .btn-danger:hover { background: var(--danger, #f87171); color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: 0.76rem; border-radius: 5px; }

    /* ── Cards ────────────────────────────────────────────────────────── */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px; margin-bottom: 28px;
    }
    .stat-card {
      background: var(--bg-raised, #16213e);
      border: 1px solid var(--line, rgba(255,255,255,0.08));
      border-radius: 10px; padding: 18px 20px; text-align: center;
    }
    .stat-card .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent, #7eaacc); }
    .stat-card .stat-label { font-size: 0.75rem; color: var(--ink-muted, #999); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }

    /* ── Info Banner ─────────────────────────────────────────────────── */
    .seed-banner {
      background: rgba(232,168,56,0.08);
      border: 1px solid rgba(232,168,56,0.25);
      border-radius: 8px; padding: 10px 16px;
      font-size: 0.82rem; color: var(--gold, #e8a838);
      margin-bottom: 24px; display: flex; align-items: center; gap: 8px;
    }

    /* ── Data Table ─────────────────────────────────────────────────── */
    .table-wrap {
      background: var(--bg-raised, #16213e);
      border: 1px solid var(--line, rgba(255,255,255,0.08));
      border-radius: 10px; overflow: hidden;
    }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th, .data-table td {
      text-align: left; padding: 11px 16px;
      border-bottom: 1px solid var(--line, rgba(255,255,255,0.08));
      font-size: 0.85rem;
    }
    .data-table th {
      color: var(--accent, #7eaacc); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      background: rgba(0,0,0,0.15); font-size: 0.73rem;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tbody tr { cursor: pointer; transition: background 0.12s; }
    .data-table tbody tr:hover td { background: rgba(126,170,204,0.05); }
    @media (max-width: 768px) {
      .data-table .col-db, .data-table .col-created { display: none; }
    }

    /* ── Badges ──────────────────────────────────────────────────────── */
    .badge {
      display: inline-block; padding: 2px 9px; border-radius: 5px;
      font-size: 0.71rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .badge-success { background: rgba(74,222,128,0.12); color: var(--success, #4ade80); }
    .badge-warn    { background: rgba(251,191,36,0.12);  color: var(--warning, #fbbd24); }
    .badge-danger  { background: rgba(248,113,113,0.12); color: var(--danger,  #f87171); }
    .badge-info    { background: var(--accent-soft, rgba(126,170,204,0.1)); color: var(--accent, #7eaacc); }

    /* ── Loading / Empty ─────────────────────────────────────────────── */
    .loading { text-align: center; padding: 48px 20px; color: var(--ink-muted, #999); }
    .loading .spin {
      display: inline-block; width: 26px; height: 26px;
      border: 3px solid var(--line, rgba(255,255,255,0.08));
      border-top-color: var(--accent, #7eaacc);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--ink-muted, #999); }
    .empty-state .icon { font-size: 2rem; margin-bottom: 12px; opacity: 0.4; }
    .empty-state h3 { color: var(--ink); margin-bottom: 6px; }

    /* ── Modal ───────────────────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.65); display: flex;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-box {
      background: var(--bg-raised, #16213e);
      border: 1px solid var(--line, rgba(255,255,255,0.08));
      border-radius: 12px; width: 100%; max-width: 540px;
      max-height: calc(100vh - 80px); display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 22px 14px; border-bottom: 1px solid var(--line, rgba(255,255,255,0.08));
    }
    .modal-title { font-weight: 700; font-size: 1rem; color: var(--accent, #7eaacc); }
    .modal-close {
      background: none; border: none; color: var(--ink-muted, #999);
      font-size: 1.3rem; cursor: pointer; line-height: 1; padding: 2px 6px;
    }
    .modal-close:hover { color: var(--danger, #f87171); }
    .modal-body { padding: 18px 22px; overflow-y: auto; flex: 1; }
    .modal-footer {
      padding: 14px 22px 18px;
      border-top: 1px solid var(--line, rgba(255,255,255,0.08));
      display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end;
    }

    /* ── Form Fields ─────────────────────────────────────────────────── */
    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 0.78rem; font-weight: 600;
      color: var(--ink-muted, #999); margin-bottom: 5px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .field input, .field select, .field textarea {
      width: 100%; padding: 9px 12px; border-radius: 7px;
      border: 1px solid var(--line, rgba(255,255,255,0.08));
      background: var(--bg, #1a1a2e); color: var(--ink);
      font-size: 0.85rem; font-family: inherit; outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--accent, #7eaacc);
    }
    .field input[type="color"] { height: 38px; padding: 3px 6px; cursor: pointer; }
    .field textarea { resize: vertical; min-height: 72px; }

    /* ── Toast ───────────────────────────────────────────────────────── */
    #gc-toast-wrap {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
    }
    .gc-toast {
      background: var(--bg-raised, #16213e);
      border: 1px solid var(--line, rgba(255,255,255,0.08));
      border-radius: 8px; padding: 10px 18px;
      font-size: 0.83rem; color: var(--ink);
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
      animation: toast-in 0.25s ease;
      pointer-events: auto;
    }
    .gc-toast.success { border-left: 3px solid var(--success, #4ade80); }
    .gc-toast.warn    { border-left: 3px solid var(--warning, #fbbd24); }
    .gc-toast.danger  { border-left: 3px solid var(--danger,  #f87171); }
    @keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Section ─────────────────────────────────────────────────────── */
    .section-label {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--ink-muted, #999);
      margin: 28px 0 12px; display: flex; align-items: center; gap: 10px;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px;
      background: var(--line, rgba(255,255,255,0.08));
    }

    /* ── Controls cell ───────────────────────────────────────────────── */
    .ctrl-cell { display: flex; gap: 6px; flex-wrap: wrap; }

    /* ── Tab bar ─────────────────────────────────────────────── */
    .gc-tabs {
      display: flex; flex-wrap: wrap; gap: 4px;
      background: var(--bg-raised, #16213e);
      border: 1px solid var(--line, rgba(255,255,255,0.08));
      border-radius: 10px; padding: 4px; margin-bottom: 28px;
    }
    .gc-tab {
      padding: 8px 16px; border-radius: 7px; border: none;
      background: none; color: var(--ink-muted, #888);
      font-size: 0.82rem; font-weight: 600; font-family: inherit;
      cursor: pointer; white-space: nowrap; transition: all 0.15s;
    }
    .gc-tab:hover { color: var(--ink, #e0e0e0); }
    .gc-tab.active { background: var(--accent, #7eaacc); color: var(--bg, #1a1a2e); }
    .gc-tab-panel { display: none; }
    .gc-tab-panel.active { display: block; }

    /* ── Health grid ─────────────────────────────────────────── */
    .gc-health-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px; margin-bottom: 24px;
    }
    .gc-health-card {
      background: var(--bg-raised, #16213e);
      border: 1px solid var(--line, rgba(255,255,255,0.08));
      border-radius: 10px; padding: 16px 18px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .gc-health-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .gc-health-name { font-weight: 700; font-size: 0.95rem; color: var(--ink, #e0e0e0); }
    .gc-health-id   { font-size: 0.71rem; color: var(--ink-muted, #888); text-transform: uppercase; letter-spacing: 0.05em; }
    .gc-pill { padding: 3px 9px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
    .gc-pill-checking { background: rgba(255,255,255,0.07); color: var(--ink-muted, #888); }
    .gc-pill-ok       { background: rgba(74,222,128,0.15);  color: #4ade80; }
    .gc-pill-down     { background: rgba(248,113,113,0.15); color: #f87171; }
    .gc-pill-warn     { background: rgba(251,191,36,0.15);  color: #fbbd24; }
    .gc-health-meta { display: flex; flex-direction: column; gap: 4px; font-size: 0.78rem; }
    .gc-meta-row { display: flex; gap: 6px; align-items: baseline; }
    .gc-meta-lbl { color: var(--ink-muted, #888); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; min-width: 60px; }
    .gc-meta-val { color: var(--ink, #e0e0e0); font-family: monospace; font-size: 0.76rem; word-break: break-all; }
    .gc-health-foot { display: flex; gap: 6px; flex-wrap: wrap; padding-top: 8px; border-top: 1px solid var(--line, rgba(255,255,255,0.08)); }

    /* ── Probe tool ──────────────────────────────────────────── */
    .probe-response {
      background: var(--bg, #1a1a2e);
      border: 1px solid var(--line, rgba(255,255,255,0.08));
      border-radius: 8px; padding: 14px 16px;
      font-size: 0.78rem; font-family: monospace;
      max-height: 420px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
      color: var(--ink, #e0e0e0); line-height: 1.7;
    }
    .probe-hist-item {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 12px; border-radius: 7px; cursor: pointer; transition: background 0.12s;
    }
    .probe-hist-item:hover { background: rgba(255,255,255,0.04); }

    /* ── Config Audit ────────────────────────────────────────── */
    .audit-matrix { overflow-x: auto; margin-bottom: 24px; }
    .audit-table { border-collapse: collapse; font-size: 0.78rem; min-width: 100%; }
    .audit-table th, .audit-table td {
      padding: 8px 12px; border-bottom: 1px solid var(--line, rgba(255,255,255,0.08));
      text-align: left; white-space: nowrap;
    }
    .audit-table th {
      background: rgba(0,0,0,0.15); color: var(--accent, #7eaacc);
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700;
    }
    .audit-table td.key-col { font-family: monospace; color: var(--ink, #e0e0e0); min-width: 180px; }
    .audit-cell-ok   { color: #4ade80; font-weight: 700; text-align: center; }
    .audit-cell-miss { color: #f87171; font-weight: 700; text-align: center; }
  </style>
</head>

<div class="topbar">
  <div class="topbar-brand">FlockOS <span>Great Commission</span></div>
  <div class="topbar-user">
    <span class="name" id="gc-user-name"></span>

    <button class="logout-btn" onclick="Nehemiah.logout()">Sign Out</button>

</div>

<!-- ─── MAIN ──────────────────────────────────────────────────────────── -->

</div>

<!-- ─── TOAST CONTAINER ───────────────────────────────────────────────── -->

<script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

<script>
// ══════════════════════════════════════════════════════════════════════════
// THE GREAT COMMISSION — Church Command Center (seed admin only)
// ══════════════════════════════════════════════════════════════════════════

const _PROVISIONER_URL = 'https://script.google.com/macros/s/AKfycbwngAJULbve_-WBeZTS9MQLkdPohdlhTKI1ARJxqU9wu28vTpfQem8gSxFeSHr2k2jX/exec';

let _churches = [];
let _gcSession = null;

// ── Utilities ─────────────────────────────────────────────────────────────

function _e(str) {
  return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function _toast(msg, type) {
  type = type || 'success';
  var wrap = document.getElementById('gc-toast-wrap');
  if (!wrap) return;
  var t = document.createElement('div');
  t.className = 'gc-toast ' + type;
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(function() { t.style.opacity = '0'; t.style.transition = 'opacity 0.4s'; setTimeout(function() { t.remove(); }, 400); }, 3500);
}

function _statusBadge(status, locked) {
  if (locked || (status || '').toLowerCase() === 'locked') {
    return '<span class="badge badge-danger">&#128274; Locked</span>';
  }
  var s = (status || 'Active').toLowerCase();
  if (s === 'active')   return '<span class="badge badge-success">' + _e(status) + '</span>';
  if (s === 'inactive') return '<span class="badge badge-warn">'    + _e(status) + '</span>';
  if (s === 'suspended' || s === 'disabled') return '<span class="badge badge-danger">' + _e(status) + '</span>';
  return '<span class="badge badge-info">' + _e(status) + '</span>';
}

// ── Modal ─────────────────────────────────────────────────────────────────

/**
 * Render a form modal.
 * @param {string}   title
 * @param {Array}    fields   — [{name, label, type, value, required, options, html}]
 * @param {Function} onSave   — async fn(data)
 * @param {Function} [onDelete] — async fn() — shows Delete button when provided
 * @param {string}   [saveLabel]
 */
function _gcModal(title, fields, onSave, onDelete, saveLabel) {
  var existing = document.getElementById('gc-modal');
  if (existing) existing.remove();

  var bodyHtml = '';
  fields.forEach(function(f) {
    if (f.type === 'html') {
      bodyHtml += f.html || '';
      return;
    }
    var req = f.required ? ' required' : '';
    var val = _e(f.value !== undefined ? f.value : '');
    var id  = 'gcf-' + f.name;

    bodyHtml += '<div class="field"><label for="' + id + '">' + _e(f.label || '') + (f.required ? ' *' : '') + '</label>';
    if (f.type === 'select') {
      var opts = (f.options || []).map(function(o) {
        var v = typeof o === 'object' ? o.value : o;
        var l = typeof o === 'object' ? o.label : o;
        var sel = String(v) === String(f.value || '') ? ' selected' : '';
        return '<option value="' + _e(v) + '"' + sel + '>' + _e(l) + '</option>';
      }).join('');
      bodyHtml += '<select id="' + id + '" name="' + f.name + '"' + req + '>' + opts + '</select>';
    } else if (f.type === 'textarea') {
      bodyHtml += '<textarea id="' + id + '" name="' + f.name + '"' + req + '>' + val + '</textarea>';
    } else {
      bodyHtml += '<input id="' + id + '" name="' + f.name + '" type="' + (f.type || 'text') + '" value="' + val + '"' + req + '>';
    }
    bodyHtml += '</div>';
  });

  var footerHtml = '';
  if (onDelete) {
    footerHtml += '<button type="button" class="btn btn-danger" id="gc-modal-delete">Delete</button>';
    footerHtml += '<span style="flex:1"></span>';
  }
  footerHtml += '<button type="button" class="btn" id="gc-modal-cancel">Cancel</button>';
  footerHtml += '<button type="button" class="btn btn-primary" id="gc-modal-save">' + _e(saveLabel || 'Save') + '</button>';

  var el = document.createElement('div');
  el.className = 'modal-backdrop';
  el.id = 'gc-modal';
  el.innerHTML =
    '<div class="modal-box" role="dialog" aria-modal="true">'
    + '<div class="modal-header">'
    +   '<span class="modal-title">' + _e(title) + '</span>'
    +   '<button class="modal-close" id="gc-modal-x">&#10005;</button>'
    + '</div>'
    + '<div class="modal-body">' + bodyHtml + '</div>'
    + '<div class="modal-footer">' + footerHtml + '</div>'
    + '</div>';

  document.body.appendChild(el);

  function _close() { el.remove(); }
  function _collect() {
    var data = {};
    fields.forEach(function(f) {
      if (f.type === 'html') return;
      var input = document.getElementById('gcf-' + f.name);
      if (input) data[f.name] = input.value;
    });
    return data;
  }

  document.getElementById('gc-modal-x').onclick      = _close;
  document.getElementById('gc-modal-cancel').onclick  = _close;
  el.addEventListener('click', function(ev) { if (ev.target === el) _close(); });

  document.getElementById('gc-modal-save').onclick = async function() {
    var data = _collect();
    try {
      document.getElementById('gc-modal-save').disabled = true;
      await onSave(data);
      _close();
    } catch (e) {
      _toast(e.message || 'An error occurred.', 'danger');
      var btn = document.getElementById('gc-modal-save');
      if (btn) btn.disabled = false;
    }
  };

  if (onDelete) {
    document.getElementById('gc-modal-delete').onclick = async function() {
      try {
        await onDelete();
        _close();
      } catch (e) {
        _toast(e.message || 'Delete failed.', 'danger');
      }
    };
  }

  // Focus first input
  setTimeout(function() {
    var first = el.querySelector('input, select, textarea');
    if (first) first.focus();
  }, 80);
}

var _gcActiveTab = 'overview';

function _gcTab(id) {
  _gcActiveTab = id;
  document.querySelectorAll('.gc-tab').forEach(function(b) { b.classList.toggle('active', b.dataset.tab === id); });
  document.querySelectorAll('.gc-tab-panel').forEach(function(p) { p.classList.toggle('active', p.dataset.tab === id); });
  // Lazy-render tab content on first visit
  var panel = document.querySelector('.gc-tab-panel[data-tab="' + id + '"]');
  if (panel && !panel.dataset.rendered) {
    panel.dataset.rendered = '1';
    if      (id === 'overview') _gcRenderOverview();
    else if (id === 'churches') _gcRenderChurches();
    else if (id === 'health')   _gcRenderHealthMonitor();
    else if (id === 'probe')    _gcRenderProbe();
    else if (id === 'audit')    _gcRenderConfigAudit();
    else if (id === 'appconfig') _gcRenderAppConfigTab();
    else if (id === 'provisioner') _gcRenderProvisioner();
  }
}

// ── Health pinger (shared by Overview and Health tab, prefix = 'ov' or 'hm') ──

function _gcRunHealthMonitor(prefix) {
  prefix = prefix || 'hm';
  var results = { ok: 0, down: 0, total: _churches.length };

  function _updateSummary() {
    var el = document.getElementById('health-summary');
    if (el && results.ok + results.down === results.total) {
      el.textContent = results.ok + ' online, ' + results.down + ' offline';
    }
  }

  _churches.forEach(function(church) {
    if (!church.databaseUrl) {
      var pillEl = document.getElementById(prefix + '-pill-' + church.churchId);
      var latEl  = document.getElementById(prefix + '-lat-'  + church.churchId);
      if (pillEl) { pillEl.className = 'gc-pill gc-pill-warn'; pillEl.textContent = '\u25CF No URL'; }
      if (latEl)  latEl.textContent = '\u2014';
      results.down++; _updateSummary(); return;
    }

    var pillEl = document.getElementById(prefix + '-pill-' + church.churchId);
    var latEl  = document.getElementById(prefix + '-lat-'  + church.churchId);
    var t0 = Date.now();
    var url = church.databaseUrl + '?action=health&_nc=' + t0;
    var controller = new AbortController();
    var timer = setTimeout(function() { controller.abort(); }, 9000);

    fetch(url, { method:'GET', mode:'no-cors', cache:'no-store', signal: controller.signal })
      .then(function() {
        clearTimeout(timer);
        var ms = Date.now() - t0;
        results.ok++;
        if (pillEl) { pillEl.className = 'gc-pill gc-pill-ok'; pillEl.textContent = '\u25CF Online'; }
        if (latEl)  latEl.textContent = ms + 'ms';
        _updateSummary();
      })
      .catch(function() {
        clearTimeout(timer);
        results.down++;
        if (pillEl) { pillEl.className = 'gc-pill gc-pill-down'; pillEl.textContent = '\u25CF Offline'; }
        if (latEl)  latEl.textContent = 'Unreachable';
        _updateSummary();
      });
  });
}

async function _gcRunProbe() {
  var urlEl    = document.getElementById('probe-url');
  var actEl    = document.getElementById('probe-action');
  var toEl     = document.getElementById('probe-timeout');
  var parEl    = document.getElementById('probe-params');
  var statusEl = document.getElementById('probe-status');
  var respWrap = document.getElementById('probe-response-wrap');
  var respEl   = document.getElementById('probe-response');
  var timEl    = document.getElementById('probe-timing');
  var btn      = document.getElementById('probe-run-btn');

  var url     = (urlEl  && urlEl.value.trim())  || '';
  var action  = (actEl  && actEl.value.trim())  || 'health';
  var timeout = parseInt((toEl && toEl.value) || '10000') || 10000;
  var rawPar  = (parEl  && parEl.value.trim()) || '';

  if (!url) { _toast('Enter a URL first.', 'warn'); return; }

  var extraParams = {};
  if (rawPar) {
    try { extraParams = JSON.parse(rawPar); }
    catch(e) { _toast('Extra params is not valid JSON.', 'warn'); return; }
  }

  if (btn) btn.disabled = true;
  if (statusEl) statusEl.textContent = 'Running\u2026';
  if (respWrap) respWrap.style.display = 'none';

  var qs = new URLSearchParams({ action: action });
  Object.keys(extraParams).forEach(function(k) { qs.set(k, extraParams[k]); });
  qs.set('_nc', Date.now());
  var fullUrl = url + (url.indexOf('?') >= 0 ? '&' : '?') + qs.toString();

  var t0 = Date.now();
  var controller = new AbortController();
  var timer = setTimeout(function() { controller.abort(); }, timeout);

  try {
    var resp = await fetch(fullUrl, { method:'GET', cache:'no-store', signal: controller.signal });
    clearTimeout(timer);
    var ms   = Date.now() - t0;
    var text = '';
    try { text = await resp.text(); } catch(_) {}

    var display = text;
    try { display = JSON.stringify(JSON.parse(text), null, 2); } catch(_) {}

    if (statusEl) statusEl.textContent = 'HTTP ' + resp.status + ' \u2014 ' + ms + 'ms';
    if (timEl)    timEl.textContent    = 'HTTP ' + resp.status + ' \u2014 ' + ms + 'ms';
    if (respEl)   respEl.textContent   = display || '(empty response)';
    if (respWrap) respWrap.style.display = '';

    _addProbeHistory({ url: url, action: action, status: resp.status, ms: ms, response: display });

  } catch(e) {
    clearTimeout(timer);
    var ms = Date.now() - t0;
    var msg = e && e.message ? e.message : String(e);
    var isCors = msg.indexOf('Failed to fetch') >= 0 || msg.indexOf('NetworkError') >= 0 || msg.indexOf('CORS') >= 0;

    if (isCors) {
      // Retry with no-cors to at least confirm reachability
      var t1 = Date.now();
      try {
        await fetch(fullUrl, { method:'GET', mode:'no-cors', cache:'no-store' });
        var ms2 = Date.now() - t1;
        if (statusEl) statusEl.textContent = 'Reachable (CORS block) \u2014 ' + ms2 + 'ms';
        if (timEl)    timEl.textContent    = 'Reachable (CORS block) \u2014 ' + ms2 + 'ms';
        if (respEl)   respEl.textContent   = 'CORS policy blocked the response body.\n\nThe endpoint IS reachable (opaque response received in ' + ms2 + 'ms).\n'
          + 'This is normal for GAS endpoints when called cross-origin without CORS headers.\n\n'
          + 'To read the response body, test from a server-side context (e.g. the Provisioner) or '
          + 'open the URL directly in a browser tab:\n\n' + fullUrl;
        if (respWrap) respWrap.style.display = '';
        _addProbeHistory({ url: url, action: action, status: 'CORS', ms: ms2, response: 'CORS (reachable)' });
      } catch(_) {
        if (statusEl) statusEl.textContent = 'Unreachable \u2014 ' + (Date.now()-t1) + 'ms';
        if (respEl)   respEl.textContent   = 'Network error: endpoint unreachable.\n\n' + msg;
        if (respWrap) respWrap.style.display = '';
      }
    } else {
      var aborted = e && e.name === 'AbortError';
      if (statusEl) statusEl.textContent = aborted ? 'Timeout (' + timeout + 'ms)' : 'Error';
      if (respEl)   respEl.textContent   = aborted ? 'Request timed out after ' + timeout + 'ms.' : msg;
      if (respWrap) respWrap.style.display = '';
    }
  }

  if (btn) btn.disabled = false;
}

function _addProbeHistory(entry) {
  _probeHistory.unshift(entry);
  if (_probeHistory.length > 8) _probeHistory.pop();

  var wrap = document.getElementById('probe-history-wrap');
  var hist = document.getElementById('probe-history');
  if (!wrap || !hist) return;
  wrap.style.display = '';

  var html = '';
  _probeHistory.forEach(function(h, i) {
    var statusColor = (h.status === 200 || h.status === 'CORS') ? '#4ade80' : '#f87171';
    html += '<div class="probe-hist-item" onclick="_gcRestoreProbe(' + i + ')">'
      + '<span style="font-family:monospace;font-size:0.79rem;color:var(--accent,#7eaacc);min-width:120px;">' + _e(h.action) + '</span>'
      + '<span style="font-size:0.75rem;color:var(--ink-muted,#888);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + _e(h.url) + '</span>'
      + '<span style="font-size:0.72rem;color:' + statusColor + ';white-space:nowrap;font-weight:700;">' + _e(String(h.status)) + '</span>'
      + '<span style="font-size:0.72rem;color:var(--ink-faint,#666);white-space:nowrap;">' + h.ms + 'ms</span>'
      + '</div>';
  });
  hist.innerHTML = html;
}

function _gcRestoreProbe(i) {
  var h = _probeHistory[i];
  if (!h) return;
  var urlEl  = document.getElementById('probe-url');
  var actEl  = document.getElementById('probe-action');
  var respEl = document.getElementById('probe-response');
  var timEl  = document.getElementById('probe-timing');
  var wrap   = document.getElementById('probe-response-wrap');
  if (urlEl)  urlEl.value  = h.url;
  if (actEl)  actEl.value  = h.action;
  if (respEl) respEl.textContent = h.response || '';
  if (timEl)  timEl.textContent  = 'HTTP ' + h.status + ' \u2014 ' + h.ms + 'ms';
  if (wrap)   wrap.style.display = '';
}

function _gcCopyProbeResponse() {

async function _gcRunConfigAudit() {
  var keysRaw   = (document.getElementById('audit-keys') || { value: '' }).value;
  var keys      = keysRaw.split(/[\n,]+/).map(function(k) { return k.trim(); }).filter(Boolean);
  var cbs       = document.querySelectorAll('.audit-church-cb:checked');
  var churchIds = Array.from(cbs).map(function(cb) { return cb.value; });
  var statusEl  = document.getElementById('audit-status');
  var matrixWrap = document.getElementById('audit-matrix-wrap');

  if (!keys.length)      { _toast('Enter at least one key to audit.', 'warn'); return; }
  if (!churchIds.length) { _toast('Select at least one church.', 'warn'); return; }

  if (statusEl) statusEl.textContent = 'Loading\u2026';
  if (matrixWrap) matrixWrap.innerHTML = '<div class="loading"><div class="spin"></div>&nbsp; Fetching configs\u2026</div>';

  _auditData = {};

  // Load config for each selected church in parallel
  await Promise.all(churchIds.map(async function(cid) {
    try {
      var res = await TheVine.flock.call('church.config.list', { churchId: cid });
      _auditData[cid] = Array.isArray(res) ? res : ((res && res.rows) ? res.rows : []);
    } catch(e) {
      _auditData[cid] = null; // error marker
    }
  }));

  // Build matrix
  var churches = churchIds.map(function(cid) {
    return _churches.find(function(c) { return String(c.churchId) === String(cid); }) || { churchId: cid, shortName: cid };
  });

  var html = '<div class="audit-matrix"><table class="audit-table"><thead><tr>'
    + '<th class="key-col">Config Key</th>';
  churches.forEach(function(c) {
    html += '<th>' + _e(c.shortName || c.churchName || c.churchId) + '</th>';
  });
  html += '</tr></thead><tbody>';

  var missCount = 0;
  keys.forEach(function(key) {
    html += '<tr><td class="key-col">' + _e(key) + '</td>';
    churches.forEach(function(c) {
      var rows = _auditData[c.churchId];
      if (rows === null) {
        html += '<td style="color:var(--ink-muted,#888);text-align:center;" title="Load error">\u2014</td>';
        return;
      }
      var row = (rows || []).find(function(r) { return (r.key||r.configKey) === key; });
      if (row && row.value !== undefined && row.value !== '') {
        var display = String(row.value);
        if (display.length > 20) display = display.substring(0, 18) + '\u2026';
        html += '<td class="audit-cell-ok" title="' + _e(String(row.value)) + '">\u2713 <span style="font-size:0.7rem;color:var(--ink-muted,#888);font-weight:400;">' + _e(display) + '</span></td>';
      } else {
        missCount++;
        html += '<td class="audit-cell-miss">\u2717</td>';
      }
    });
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  if (matrixWrap) matrixWrap.innerHTML = html;

  var total = keys.length * churches.length;
  if (statusEl) statusEl.textContent = (total - missCount) + '/' + total + ' keys set — ' + missCount + ' missing';
}

function _gcExportAuditCsv() {
  var keysRaw   = (document.getElementById('audit-keys') || { value: '' }).value;
  var keys      = keysRaw.split(/[\n,]+/).map(function(k) { return k.trim(); }).filter(Boolean);
  var cbs       = document.querySelectorAll('.audit-church-cb:checked');
  var churchIds = Array.from(cbs).map(function(cb) { return cb.value; });

  if (!Object.keys(_auditData).length) { _toast('Run the audit first.', 'warn'); return; }

  var churches = churchIds.map(function(cid) {
    return _churches.find(function(c) { return String(c.churchId) === String(cid); }) || { churchId: cid, shortName: cid };
  });

  var lines = ['Key,' + churches.map(function(c) { return '"' + (c.shortName||c.churchId) + '"'; }).join(',')];
  keys.forEach(function(key) {
    var row = ['"' + key + '"'];
    churches.forEach(function(c) {
      var rows = _auditData[c.churchId] || [];
      var found = rows.find(function(r) { return (r.key||r.configKey) === key; });
      row.push(found && found.value ? '"' + String(found.value).replace(/"/g,'""') + '"' : '""');
    });
    lines.push(row.join(','));
  });

  var blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  var a    = document.createElement('a');
  a.href   = URL.createObjectURL(blob);
  a.download = 'config-audit-' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

async function _gcTestProvisionerUrl() {
  var input  = document.getElementById('provisioner-test-url');
  var result = document.getElementById('provisioner-test-result');
  var url    = (input && input.value || '').trim();

  function _showResult(state, icon, title, detail, finalUrl) {
    // state: 'success' | 'warn' | 'danger' | 'info'
    var colors = {
      success: { bg: 'rgba(40,180,80,0.12)', border: 'rgba(40,180,80,0.35)', icon: '#4c4', title: '#6e6' },
      warn:    { bg: 'rgba(255,160,0,0.12)', border: 'rgba(255,160,0,0.35)',  icon: '#f90', title: '#fb3' },
      danger:  { bg: 'rgba(200,50,50,0.12)', border: 'rgba(200,50,50,0.35)', icon: '#d44', title: '#e66' },
      info:    { bg: 'rgba(80,140,255,0.10)', border: 'rgba(80,140,255,0.30)', icon: '#6af', title: '#8cf' },
    };
    var c = colors[state] || colors.info;
    var urlRow = finalUrl
      ? '<div style="margin-top:6px;font-size:0.76rem;font-family:monospace;color:var(--ink-muted);word-break:break-all;">'
        + '&#8618; ' + _e(finalUrl) + '</div>'
      : '';
    result.style.display = '';
    result.innerHTML =
      '<div style="display:flex;gap:12px;align-items:flex-start;padding:14px 16px;'
      + 'background:' + c.bg + ';border:1px solid ' + c.border + ';border-radius:8px;">'
      + '<div style="font-size:1.5rem;line-height:1;color:' + c.icon + ';flex-shrink:0;">' + icon + '</div>'
      + '<div style="flex:1;">'
      + '<div style="font-size:0.85rem;font-weight:600;color:' + c.title + ';margin-bottom:3px;">' + title + '</div>'
      + '<div style="font-size:0.78rem;color:var(--ink-muted);line-height:1.6;">' + detail + '</div>'
      + urlRow
      + '</div>'
      + '</div>';
  }

  if (!url) {
    _showResult('warn', '&#9888;', 'No URL entered', 'Enter a URL in the field above before testing.');
    return;
  }

  result.style.display = '';
  result.innerHTML =
    '<div style="display:flex;gap:12px;align-items:center;padding:14px 16px;'
    + 'background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;">'
    + '<div class="spin" style="width:18px;height:18px;border-width:2px;"></div>'
    + '<div style="font-size:0.82rem;color:var(--ink-muted);">Testing&nbsp;<span style="font-family:monospace;color:var(--accent);">' + _e(url) + '</span>…</div>'
    + '</div>';

  // Append a ping param to verify query-string forwarding
  var testUrl = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'action=ping';

  try {
    var resp = await fetch(testUrl, { method: 'GET', redirect: 'follow' });
    var finalUrl = resp.url || '';
    var text = '';
    try { text = await resp.text(); } catch (_) {}

    var paramsPreserved = finalUrl.indexOf('action=ping') >= 0 || text.indexOf('ping') >= 0;
    var wasRedirected   = finalUrl && finalUrl !== testUrl;

    if (resp.ok || resp.status === 200) {
      if (paramsPreserved) {
        _showResult('success', '&#10003;', 'Reachable — Query params forwarded',
          'The URL resolved and query parameters survived the redirect. Provisioning will work correctly.',
          wasRedirected ? finalUrl : null);
      } else if (wasRedirected) {
        _showResult('warn', '&#9888;', 'Reachable — Query params dropped',
          'The URL resolved but query parameters were stripped by the redirect. Provisioning will fail — enable “Forward with query string” in your DNS settings.',
          finalUrl);
      } else {
        _showResult('success', '&#10003;', 'Reachable (HTTP ' + resp.status + ')',
          'The URL responded successfully. Query param forwarding could not be verified — test with a real provision run to confirm.',
          null);
      }
    } else {
      _showResult('warn', '&#9888;', 'HTTP ' + resp.status + ' response',
        'The server responded but returned a non-success status code.',
        wasRedirected ? finalUrl : null);
    }
  } catch (err) {
    // CORS / network error — if CORS, the URL resolved (good sign)
    var msg = err && err.message ? err.message : String(err);
    var isCors = msg.indexOf('CORS') >= 0 || msg.indexOf('NetworkError') >= 0 || msg.indexOf('Failed to fetch') >= 0;
    if (isCors) {
      _showResult('info', '&#8505;', 'URL resolved (CORS block)',
        'The server responded but the browser blocked the response due to CORS. This is normal for GAS endpoints. '
        + 'Query param forwarding cannot be auto-confirmed — open the URL manually in a new tab to verify.',
        null);
    } else {
      _showResult('danger', '&#10007;', 'Unreachable', _e(msg), null);
    }
  }
}

  });

  // Add new key row
  html += '<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--line,rgba(255,255,255,0.08));">'
    + '<div style="font-size:0.82rem;color:var(--ink-muted);margin-bottom:8px;">Add / Override Key</div>'
    + '<div style="display:grid;grid-template-columns:220px 1fr auto;gap:8px;align-items:start;">'
    + '<input id="ac-new-key" type="text" placeholder="KEY_NAME"'
    + ' style="font-size:0.82rem;font-family:monospace;background:var(--bg,#1a1a2e);'
    + 'border:1px solid var(--line,rgba(255,255,255,0.12));border-radius:6px;padding:6px 9px;color:var(--ink);outline:none;" />'
    + '<input id="ac-new-val" type="text" placeholder="Value"'
    + ' style="font-size:0.82rem;font-family:monospace;background:var(--bg,#1a1a2e);'
    + 'border:1px solid var(--line,rgba(255,255,255,0.12));border-radius:6px;padding:6px 9px;color:var(--ink);outline:none;" />'
    + '<button onclick="_gcAddAppConfigKey()" style="background:var(--accent);color:var(--ink-inverse);'
    + 'border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:0.78rem;font-weight:600;white-space:nowrap;">Add</button>'
    + '</div>'
    + '<div id="ac-new-result" style="margin-top:6px;font-size:0.78rem;min-height:16px;"></div>'
    + '</div>';

  body.innerHTML = html;
}

async function _gcSaveAppConfigRow(key, rowId) {
  var input  = document.getElementById(rowId + '-val');
  var btn    = input && input.parentElement && input.parentElement.querySelector('button');
  var value  = input ? input.value : '';
  if (!_acChurch) return;

  if (btn) { btn.disabled = true; btn.textContent = '…'; }

  try {
    await TheVine.flock.call('church.config.set', { churchId: _acChurch, key: key, value: value });
    if (btn) { btn.disabled = false; btn.textContent = '✓'; btn.style.background = 'var(--success,#4ade80)'; btn.style.color = '#000'; }
    setTimeout(function() { if (btn) { btn.textContent = 'Save'; btn.style.background = ''; btn.style.color = ''; btn.disabled = false; } }, 1800);
    // update local cache
    _acRows.forEach(function(r) { if (r.key === key) r.value = value; });
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = '✗'; btn.style.background = 'var(--danger,#f87171)'; btn.style.color = '#fff'; }
    setTimeout(function() { if (btn) { btn.textContent = 'Save'; btn.style.background = ''; btn.style.color = ''; btn.disabled = false; } }, 2500);
  }
}

async function _gcAddAppConfigKey() {
  var keyIn   = document.getElementById('ac-new-key');
  var valIn   = document.getElementById('ac-new-val');
  var resDiv  = document.getElementById('ac-new-result');
  var key     = keyIn ? keyIn.value.trim() : '';
  var value   = valIn ? valIn.value : '';
  if (!key)       { if (resDiv) resDiv.innerHTML = '<span style="color:var(--warn,#fbbd24);">Enter a key name.</span>'; return; }
  if (!_acChurch) { if (resDiv) resDiv.innerHTML = '<span style="color:var(--warn,#fbbd24);">Select a church first.</span>'; return; }

  if (resDiv) resDiv.innerHTML = '<span style="color:var(--ink-muted);">Saving…</span>';
  try {
    await TheVine.flock.call('church.config.set', { churchId: _acChurch, key: key, value: value });
    if (resDiv) resDiv.innerHTML = '<span style="color:var(--success,#4ade80);">&#10003; Saved. Reloading…</span>';
    if (keyIn) keyIn.value = '';
    if (valIn) valIn.value = '';
    setTimeout(_gcLoadAppConfig, 900);
  } catch (e) {
    if (resDiv) resDiv.innerHTML = '<span style="color:var(--danger,#f87171);">&#10007; ' + _e(e && e.message ? e.message : String(e)) + '</span>';
  }
}

// ── Data Loading ──────────────────────────────────────────────────────────

async function _gcLoad() {
  var main = document.getElementById('gc-main');
  main.innerHTML = '<div class="loading"><div class="spin"></div>&nbsp; Loading churches…</div>';
  try {
    var res = await TheVine.flock.church.list({ limit: 200 });
    _churches = Array.isArray(res) ? res : (res && res.data ? res.data : (res && res.rows ? res.rows : []));
    _renderPage();
  } catch (e) {
    main.innerHTML = '<div class="empty-state"><div class="icon">&#9888;</div><h3>Failed to load</h3><p>' + _e(e.message) + '</p>'
      + '<button class="btn" onclick="_gcLoad()" style="margin-top:16px;">Retry</button></div>';
  }
}

// ── Register Church ───────────────────────────────────────────────────────

function _gcRegisterChurch() {
  _gcModal('Register Church', [
    { name: 'churchName',  label: 'Church Full Name',                     type: 'text',   required: true },
    { name: 'shortName',   label: 'Short Name — URL slug (e.g. TBC)',     type: 'text',   required: true },
    { name: 'brandName',   label: 'Brand Name (shown in app)',             type: 'text',   value: 'FlockOS' },
    { name: 'tagline',     label: 'Tagline',                               type: 'text',   value: 'Ministry Operating System — Free. Offline-capable. Built for every church.' },
    { name: 'themeColor',  label: 'Theme Color',                           type: 'color',  value: '#e8a838' },
    { name: 'bgColor',     label: 'Background Color',                      type: 'color',  value: '#1a1a2e' },
    { name: 'databaseUrl', label: 'Database URL (GAS Web App)',            type: 'url',    value: '' },
    { name: 'adminEmail',  label: 'Admin / Notification Email',            type: 'email',  value: '' },
    { name: 'favicon',     label: 'Favicon filename',                      type: 'text',   value: 'FlockOS_Camo.png' },
    { name: 'portrait',    label: 'Portrait / Logo filename',              type: 'text',   value: 'FlockOS_Camo.png' },
    { name: 'analyticsId',   label: 'Google Analytics ID (G-…)',         type: 'text',     value: '' },
    { name: 'version',       label: 'Version',                           type: 'text',     value: '1.0' },
    { name: 'firebaseConfig', label: 'Firebase Config (JSON — paste from Firebase Console → Project Settings)',
                                                                          type: 'textarea', value: '' },
  ], async function(data) {
    await TheVine.flock.church.create(data);
    _toast('Church registered. Open it to set up the database when ready.', 'success');
    await _gcLoad();
  }, null, 'Register');
}

// ── Edit Church ───────────────────────────────────────────────────────────

function _gcEditChurch(churchId) {
  var c = _churches.find(function(r) { return String(r.churchId) === String(churchId); }) || {};

  var lockedBanner = c.locked
    ? { type: 'html', html: '<div style="background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.3);border-radius:7px;padding:10px 14px;margin-bottom:4px;font-size:0.82rem;color:var(--danger,#f87171);">&#128274; <strong>This church is LOCKED.</strong> Members cannot log in until unlocked.</div>' }
    : { type: 'html', html: '' };

  _gcModal('Edit Church — ' + (c.churchName || churchId), [
    lockedBanner,
    { name: 'churchName',  label: 'Church Full Name',              type: 'text',   value: c.churchName  || '' },
    { name: 'shortName',   label: 'Short Name (URL slug)',          type: 'text',   value: c.shortName   || '' },
    { name: 'brandName',   label: 'Brand Name',                     type: 'text',   value: c.brandName   || 'FlockOS' },
    { name: 'tagline',     label: 'Tagline',                        type: 'text',   value: c.tagline     || '' },
    { name: 'themeColor',  label: 'Theme Color',                    type: 'color',  value: c.themeColor  || '#e8a838' },
    { name: 'bgColor',     label: 'Background Color',               type: 'color',  value: c.bgColor     || '#1a1a2e' },
    { name: 'databaseUrl', label: 'Database URL (GAS Web App)',     type: 'url',    value: c.databaseUrl || '' },
    { name: 'photosUrl',   label: 'Photos Album URL',               type: 'url',    value: c.photosUrl   || '' },
    { name: 'adminEmail',  label: 'Admin / Notification Email',     type: 'email',  value: c.adminEmail  || '' },
    { name: 'analyticsId',   label: 'Google Analytics ID',          type: 'text',     value: c.analyticsId    || '' },
    { name: 'favicon',       label: 'Favicon filename',             type: 'text',     value: c.favicon        || 'FlockOS_Camo.png' },
    { name: 'portrait',      label: 'Portrait / Logo filename',    type: 'text',     value: c.portrait       || 'FlockOS_Camo.png' },
    { name: 'version',       label: 'Version',                     type: 'text',     value: c.version        || '1.0' },
    { name: 'firebaseConfig', label: 'Firebase Config (JSON — paste from Firebase Console → Project Settings)',
                                                                    type: 'textarea', value: c.firebaseConfig  ? JSON.stringify(c.firebaseConfig) : '' },
    { name: 'status',      label: 'Status',                         type: 'select', value: c.status || 'Active',
      options: [
        { value: 'Active',    label: 'Active' },
        { value: 'Inactive',  label: 'Inactive' },
        { value: 'Locked',    label: 'Locked' },
        { value: 'Suspended', label: 'Suspended' },
      ]
    },
    { type: 'html', html:
        '<div style="padding:12px 0 2px;border-top:1px solid var(--line,rgba(255,255,255,0.08));margin-top:6px;display:flex;flex-wrap:wrap;gap:8px;">'
      + '<button type="button" onclick="document.getElementById(\'gc-modal\').remove();_gcProvisionChurch(\'' + _e(String(churchId)) + '\')" '
      +   'class="btn btn-gold btn-sm">&#9889; Provision</button>'
      + '<button type="button" onclick="document.getElementById(\'gc-modal\').remove();_gcLockChurch(\'' + _e(String(churchId)) + '\',' + (!c.locked) + ')" '
      +   'class="btn btn-sm btn-danger">'
      +   (c.locked ? '&#128275; Unlock Church' : '&#128274; Lock Church') + '</button>'
      + '</div>'
      + '<div style="font-size:0.72rem;color:var(--ink-muted);margin-top:6px;line-height:1.6;">'
      + 'Lock immediately blocks all member logins. Provision generates the CRM sheet and deployment guide.</div>'
    },
  ], async function(data) {
    delete data[''];
    data.churchId = churchId;
    await TheVine.flock.church.update(data);
    _toast('Church updated.', 'success');
    await _gcLoad();
  }, async function() {
    if (!confirm('Remove "' + (c.churchName || churchId) + '" from the registry?\n\nThis marks it as Deleted. The spreadsheet and its data are NOT affected.')) return;
    await TheVine.flock.church.delete({ churchId: churchId });
    _toast('Church removed from registry.', 'success');
    await _gcLoad();
  }, 'Save Changes');
}

// ── Lock / Unlock ─────────────────────────────────────────────────────────

async function _gcLockChurch(churchId, lock) {
  var c    = _churches.find(function(r) { return String(r.churchId) === String(churchId); }) || {};
  var name = c.churchName || churchId;
  var msg  = lock
    ? 'Lock "' + name + '"?\n\nThis will immediately block all members from logging in until unlocked.'
    : 'Unlock "' + name + '"?\n\nThis restores full member access.';
  if (!confirm(msg)) return;
  try {
    await TheVine.flock.church.update({
      churchId: churchId,
      locked:   lock,
      status:   lock ? 'Locked' : 'Active',
    });
    _toast('Church ' + (lock ? 'locked' : 'unlocked') + '.', lock ? 'warn' : 'success');
    await _gcLoad();
  } catch (e) {
    _toast((e.message || 'Failed to ' + (lock ? 'lock' : 'unlock') + ' church.'), 'danger');
  }
}

// ── Provision — select church picker ─────────────────────────────────────

function _gcProvisionNew() {
  if (!_churches.length) {
    _toast('Register a church first, then provision it.', 'warn');
    return;
  }
  _gcModal('Provision Church', [
    { name: 'churchId', label: 'Select Church', type: 'select', required: true,
      options: _churches.map(function(r) {
        return { value: r.churchId, label: (r.churchName || r.churchId) + ' (' + (r.shortName || r.churchId) + ')' };
      })
    },
    { type: 'html', html: '<div style="font-size:0.78rem;color:var(--ink-muted);">Select a registered church to configure and launch the Provisioner.</div>' },
  ], async function(data) {
    var m = document.getElementById('gc-modal');
    if (m) m.remove();
    _gcProvisionChurch(data.churchId);
  }, null, 'Continue');
}

// ── Provision — configure + launch ───────────────────────────────────────

function _gcProvisionChurch(churchId) {
  var c = _churches.find(function(r) { return String(r.churchId) === String(churchId); }) || {};

  _gcModal('Provision — ' + (c.churchName || churchId), [
    { name: 'connectionType', label: 'Connection Type', type: 'select', required: true, value: 'D',
      options: [
        { value: 'A', label: 'A — GAS Only' },
        { value: 'B', label: 'B — GAS + Firestore Backup' },
        { value: 'C', label: 'C — Firebase Primary + GAS Auth' },
        { value: 'D', label: 'D — Full Real-Time Sync (recommended)' },
      ]
    },
    { name: 'timezone',   label: 'Timezone (IANA)',              type: 'text',  value: 'America/Los_Angeles', required: true },
    { name: 'adminEmail', label: 'Admin / Notification Email',   type: 'email', value: c.adminEmail || '' },
    { type: 'html', html:
        '<div style="font-size:0.79rem;color:var(--ink-muted);background:var(--bg,#1a1a2e);'
      + 'border:1px solid var(--line,rgba(255,255,255,0.08));border-radius:6px;padding:12px 14px;'
      + 'line-height:1.75;margin-top:4px;">'
      + '<strong style="color:var(--gold,#e8a838);">&#9889; The Provisioner will:</strong><br>'
      + '&bull; Create the church CRM Google Sheet in the shared Drive folder<br>'
      + '&bull; Write a step-by-step Deployment Guide to Sheet1<br>'
      + '&bull; Pre-fill Code.gs, FirestoreSync.gs, and SyncHandler.gs tabs<br>'
      + '&bull; Seed Firestore with church registry data and sync config<br>'
      + '&bull; Open the result in a new tab — follow the guide to finish GAS setup'
      + '</div>'
    },
  ], async function(data) {
    var params = new URLSearchParams({
      action:          'provision',
      churchName:      c.churchName      || churchId,
      churchShortId:   c.shortName       || churchId,
      brandName:       c.brandName       || c.churchName || '',
      tagline:         c.tagline         || 'Ministry Operating System — Free. Offline-capable. Built for every church.',
      timezone:        data.timezone     || 'America/Los_Angeles',
      adminEmail:      data.adminEmail   || c.adminEmail || '',
      themeColor:      c.themeColor      || '#e8a838',
      backgroundColor: c.bgColor         || '#1a1a2e',
      favicon:         c.favicon         || 'FlockOS_Angels.png',
      portrait:        c.portrait        || 'FlockOS_Angels.png',
      connectionType:  data.connectionType || 'D',
      version:         c.version         || '1.0',
    });
    window.open(_PROVISIONER_URL + '?' + params.toString(), '_blank');
    _toast('Provisioner launched in new tab. Follow the result page for GAS setup steps.', 'success');
  }, null, 'Launch Provisioner');
}

// ── Boot ──────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', function() {
  // Theme init (fine_linen.js)
  if (typeof Adornment !== 'undefined') Adornment.init();

  // Auth guard — redirect to login if no session
  var session = Nehemiah.guard();
  if (!session) return;
  _gcSession = session;

  // Seed-admin gate — only the first registered user may access this page
  if (!session.isSeed) {
    window.location.replace('the_good_shepherd.html');
    return;
  }

  // Populate top bar
  var nameEl = document.getElementById('gc-user-name');
  if (nameEl) nameEl.textContent = (session.displayName || '').split(' ')[0] || session.email || '';

  // Load church data
  _gcLoad();
});
</script>
</body>
</html>
