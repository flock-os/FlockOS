  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root { --bg: #f7f8fb; --bg-raised: #ffffff; --ink: #1b264f; --line: #e5e7ef; }

    html { height: 100%; overflow: hidden; background: var(--bg); }
    body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); height: 100%; overflow: hidden; }

    .veil-wrap {
      display: grid;
      grid-template-areas: "top top" "side main";
      grid-template-columns: 256px 1fr;
      grid-template-rows: 60px 1fr;
      height: 100%;
      min-height: 100vh;
      position: relative;
    }
    #the-veil-top   { grid-area: top; }
    #the-veil-side  { grid-area: side; overflow-y: auto; overflow-x: hidden; }
    #the-holy-place { grid-area: main; min-width: 0; overflow-y: auto; }
    #the-veil-foot  { grid-area: foot; }

    @media (max-width: 860px) {
      .veil-wrap {
        grid-template-columns: 1fr;
        grid-template-areas: "top" "main" "foot";
      }
      #the-veil-side { display: none; }
    }
  </style>
</head>
<body>
  <div class="veil-wrap">
    <header id="the-veil-top"   class="veil-top"   role="banner"></header>
    <nav    id="the-veil-side"  class="veil-side"  role="navigation" aria-label="Primary"></nav>
    <main   id="the-holy-place" class="veil-main"  role="main"></main>
    <footer id="the-veil-foot"  class="veil-foot"  role="contentinfo"></footer>
    <div    id="the-staff-host" class="staff-host" aria-live="polite" aria-atomic="true"></div>
  </div>

  <!-- Ensure the ?covenant=new param is set so the_ark.js boots the new shell -->
  <script>
    if (!new URLSearchParams(location.search).has('covenant')) {
      var u = new URL(location.href);
      u.searchParams.set('covenant', 'new');
      history.replaceState(null, '', u);
    }
  </script>
