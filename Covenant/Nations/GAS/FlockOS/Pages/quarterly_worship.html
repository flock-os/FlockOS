    /* ── Firestore save / load ──────────────────────────────────────── */
    function draftKey() {
      return 'flockos_qwp_' + document.getElementById('qQ').value + '_' + document.getElementById('qY').value;
    }
    function planRef() {
      return firebase.firestore().collection('quarterlyPlans').doc(draftKey());
    }
    function fmtTs(iso) {
      if (!iso) return '';
      try { return new Date(iso).toLocaleString(undefined, {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }
      catch(e) { return ''; }
    }

    /* ── localStorage fallback ─────────────────────────────────────── */
    function _localKey() { return 'flockos_qwp_local_' + draftKey(); }
    function _saveLocal() {
      try {
        var payload = {
          q:   document.getElementById('qQ').value,
          y:   document.getElementById('qY').value,
          st:  document.getElementById('qST').value,
          fs:  document.getElementById('qFS').value,
          at:  new Date().toISOString(),
          rows: S.rows,
          importedIds: S.importedIds
        };
        localStorage.setItem(_localKey(), JSON.stringify(payload));
      } catch(e) { /* storage full — non-fatal */ }
    }
    function _loadLocal() {
      try {
        var raw = localStorage.getItem(_localKey());
        return raw ? JSON.parse(raw) : null;
      } catch(e) { return null; }
    }
    function _clearLocal() {
      try { localStorage.removeItem(_localKey()); } catch(e) { /* non-fatal */ }
    }

    /* ── Save status tracking ─────────────────────────────────────── */
    var _saveAttempts = 0;
    var _MAX_RETRIES = 3;
    var _lastSavedTs = null;

    function markDirty() {
      S.dirty = true; setStatus('pending', 'Unsaved changes');
      _saveLocal(); /* always persist locally immediately */
      clearTimeout(S.saveTimer); S.saveTimer = setTimeout(function(){ saveToFirestore(true); }, 1400);
    }

    async function saveToFirestore(auto, _retryCount) {
      _retryCount = _retryCount || 0;
      if (!isFB()) {
        setStatus('pending', 'Connecting…');
        try { await ensureFB(); } catch(e) {
          setStatus('error', 'Cloud unavailable — saved locally');
          _saveLocal();
          if (!auto) toast('Firestore unavailable. Your work is saved locally and will sync when connection restores.', 'warning', 5000);
          return;
        }
      }
      try {
        setStatus('pending', 'Saving…');
        var ts = new Date().toISOString();
        await planRef().set({
          q:   document.getElementById('qQ').value,
          y:   document.getElementById('qY').value,
          st:  document.getElementById('qST').value,
          fs:  document.getElementById('qFS').value,
          at:  ts,
          rows: S.rows,
          importedIds: S.importedIds
        });
        S.dirty = false;
        _saveAttempts = 0;
        _lastSavedTs = ts;
        _clearLocal(); /* Firestore has the data — clear local backup */
        setStatus('ready', '✓ Saved · ' + fmtTs(ts));
        if (!auto) toast('Saved to Firestore ✓', 'success');
      } catch(e) {
        /* Permission errors often mean custom claims expired — re-auth once */
        if (_retryCount === 0 && typeof UpperRoom !== 'undefined' && UpperRoom.authenticate) {
          setStatus('pending', 'Re-authenticating…');
          try { await UpperRoom.authenticate(); return saveToFirestore(auto, 1); }
          catch(_) { /* fall through to retry */ }
        }
        /* Retry with exponential backoff */
        if (_retryCount < _MAX_RETRIES) {
          var delay = Math.pow(2, _retryCount) * 1000; /* 1s, 2s, 4s */
          setStatus('pending', 'Retrying save (' + (_retryCount + 1) + '/' + _MAX_RETRIES + ')…');
          await new Promise(function(r){ setTimeout(r, delay); });
          return saveToFirestore(auto, _retryCount + 1);
        }
        /* All retries exhausted */
        _saveLocal();
        setStatus('error', '✗ Save failed — saved locally');
        toast('Firestore save failed after ' + _MAX_RETRIES + ' attempts. Your work is saved locally.', 'error', 6000);
      }
    }
    function applyPlanData(p) {
      if (p.q)  document.getElementById('qQ').value  = p.q;
      if (p.y)  document.getElementById('qY').value  = p.y;
      if (p.st) document.getElementById('qST').value = p.st;
      document.getElementById('qFS').value = p.fs || '';
      S.rows = (p.rows || []).map(function(r){
        var nr = mkRow(r.date); Object.assign(nr, r);
        if (!nr.id) nr.id = uid(); return nr;
      });
      S.importedIds = p.importedIds || {};
      render(); S.dirty = false;
    }

    /* ── Push core (no UI dependency) ───────────────────────────────── */
    /* ── Build service plan payload from a quarterly row ────────────── */
    function buildPayload(row, svcType, isUpdate) {
      var p = {
        serviceDate:     row.date,
        serviceType:     svcType,
        status:          'Scheduled'
      };
      /* Map quarterly row fields → service plan fields.
         When updating an existing plan, only include fields that have
         actual content so we don't overwrite dashboard-entered values
         with blanks. When creating, include everything. */
      var map = {
        serviceTime: 'serviceTime',
        notes:     'theme',
        psalm:     'psalmReader',
        scripture: 'scriptureFocus',
        worship:   'worshipLeader',
        preacher:  'preacher',
        announce:  'announcements',
        prayer:    'prayer',
        proverb:   'proverb'
      };
      Object.keys(map).forEach(function(rowKey) {
        var val = (row[rowKey] || '').trim();
        if (val || !isUpdate) p[map[rowKey]] = val;
      });
      return p;
    }

    async function doPush(rows, dupMode, svcType, onProgress) {
      /* load existing plans once to detect duplicates */
      var byDate = {};
      try {
        /* Query only plans in the current quarter's date range instead of all 500 */
        var q    = document.getElementById('qQ').value;
        var year = parseInt(document.getElementById('qY').value, 10) || new Date().getFullYear();
        var months = qMonths(q);
        var qStart = year + '-' + String(months[0] + 1).padStart(2,'0') + '-01';
        var lastM  = months[months.length - 1];
        var lastDay = new Date(year, lastM + 1, 0).getDate();
        var qEnd   = year + '-' + String(lastM + 1).padStart(2,'0') + '-' + String(lastDay).padStart(2,'0');
        var existing = await UpperRoom.listServicePlans({ startDate: qStart, endDate: qEnd, limit: 200 });
        (existing || []).forEach(function(p){
          var d = p.serviceDate || p.date || ''; if (d) byDate[d] = p;
        });
      } catch(e) { /* non-fatal */ }

      var created = 0, updated = 0, skipped = 0, failed = 0;

      for (var i = 0; i < rows.length; i++) {
        var row = rows[i];
        if (onProgress) onProgress(i, rows.length, row);

        try {
          var ex = byDate[row.date];
          if (ex) {
            if (dupMode === 'skip') {
              skipped++; S.importedIds[row.id] = ex.id;
            } else {
              var payload = buildPayload(row, svcType, true);
              payload.id = ex.id;
              await UpperRoom.updateServicePlan(payload);
              updated++; S.importedIds[row.id] = ex.id;
            }
          } else {
            var payload = buildPayload(row, svcType, false);
            var res = await UpperRoom.createServicePlan(payload);
            created++; S.importedIds[row.id] = res.id;
          }
        } catch(err) {
          failed++;
        }
      }
      return { created: created, updated: updated, skipped: skipped, failed: failed };
    }

    /* ── Push to Service Plans (manual button — shows overlay) ──────── */
    async function pushPlans() {
      /* collect only checked rows */
      var checkedIds = {};
      document.querySelectorAll('#gridBody .push-ck:checked').forEach(function(cb) {
        checkedIds[cb.dataset.id] = true;
      });
      var rows = S.rows.filter(function(r){ return r.date && checkedIds[r.id]; });

      }
      fbNote.style.display = 'none';

      var dupMode  = document.getElementById('optDup').value;
      var svcType  = document.getElementById('qST').value;

      var overlay  = document.getElementById('push-overlay');
      var logDiv   = document.getElementById('po-log');
      var prog     = document.getElementById('po-prog');

      function log(msg, cls) {
        var d = document.createElement('div'); d.className = cls||''; d.textContent = msg;
        logDiv.appendChild(d); logDiv.scrollTop = logDiv.scrollHeight;
      }

      var result = await doPush(rows, dupMode, svcType, function(i, total, row) {
        prog.style.width = Math.round(((i + 1) / total) * 100) + '%';
        log((S.importedIds[row.id] ? '✎ ' : '✓ ') + friendlyDate(row.date), 'ok');
      });

      prog.style.width = '100%';
      document.getElementById('po-title').textContent = 'Done';
      document.getElementById('po-sub').textContent =
        result.created + ' created, ' + result.updated + ' updated, ' + result.skipped + ' skipped, ' + result.failed + ' failed.';

      render(); updateSummary();
      setStatus('ready', 'Pushed ' + (result.created + result.updated) + ' plans');
      toast('Pushed ' + (result.created + result.updated) + ' service plan(s)', 'success');

    }

    /* ── Pull from Service Plans ─────────────────────────────────────── */
    async function pullPlans() {
      var pullNote = document.getElementById('pullNote');
      pullNote.style.display = 'block'; pullNote.textContent = '';

      if (!isFB()) {
        try { pullNote.textContent = 'Connecting…'; await ensureFB(); }
        catch(e) { pullNote.style.display='none'; toast('Firestore not available.', 'error'); return; }
      }
      pullNote.textContent = 'Loading service plans…';

      var mergeMode = document.getElementById('optPullMerge').value;
      var q    = document.getElementById('qQ').value;
      var year = parseInt(document.getElementById('qY').value, 10) || new Date().getFullYear();

      /* quarter date range */
      var months = qMonths(q);
      var qStart = year + '-' + String(months[0] + 1).padStart(2,'0') + '-01';
      var lastM  = months[months.length - 1];
      var lastDay = new Date(year, lastM + 1, 0).getDate();
      var qEnd   = year + '-' + String(lastM + 1).padStart(2,'0') + '-' + String(lastDay).padStart(2,'0');

      var plans = [];
      try {
        var res = await UpperRoom.listServicePlans({ startDate: qStart, endDate: qEnd, limit: 200 });
        plans = (res || []).filter(function(p) {
          var d = p.serviceDate || p.date || '';
          return d >= qStart && d <= qEnd;
        });
      } catch(e) {
        pullNote.style.display = 'none';
        toast('Could not load service plans: ' + (e.message || e), 'error');
        return;
      }

      if (!plans.length) {
        pullNote.style.display = 'none';
        toast('No service plans found for ' + q + ' ' + year, 'info');
        return;
      }

      /* build lookup of existing sheet rows by date */
      var byDate = {};
      S.rows.forEach(function(r){ if (r.date) byDate[r.date] = r; });

      function applyField(row, key, val, mode) {
        if (!val) return;
        if (mode === 'overwrite')         row[key] = val;
        else if (mode === 'fill' && !row[key]) row[key] = val;
        /* skip: do nothing */
      }

      var added = 0, merged = 0, skipped = 0;

      plans.forEach(function(p) {
        var date = p.serviceDate || p.date || '';
        if (!date) return;

        var existing = byDate[date];
        if (existing) {
          if (mergeMode === 'skip') { skipped++; return; }
          applyField(existing, 'notes',     p.theme           || '', mergeMode);
          applyField(existing, 'psalm',     p.psalmReader     || '', mergeMode);
          applyField(existing, 'scripture', p.scriptureFocus  || '', mergeMode);
          applyField(existing, 'worship',   p.worshipLeader   || '', mergeMode);
          applyField(existing, 'preacher',  p.preacher        || '', mergeMode);
          applyField(existing, 'announce',  p.announcements   || '', mergeMode);
          applyField(existing, 'prayer',    p.prayer          || '', mergeMode);
          applyField(existing, 'proverb',   p.proverb         || '', mergeMode);
          merged++;
        } else {
          var nr = mkRow(date);
          nr.notes     = p.theme           || '';
          nr.psalm     = p.psalmReader     || '';
          nr.scripture = p.scriptureFocus  || '';
          nr.worship   = p.worshipLeader   || '';
          nr.preacher  = p.preacher        || '';
          nr.announce  = p.announcements   || '';
          nr.prayer    = p.prayer          || '';
          nr.proverb   = p.proverb         || '';
          S.rows.push(nr);
          byDate[date] = nr;
          added++;
        }
      });

      /* re-sort rows by date */
      S.rows.sort(function(a, b) { return (a.date || '') < (b.date || '') ? -1 : (a.date || '') > (b.date || '') ? 1 : 0; });

      render(); markDirty();
      pullNote.style.display = 'none';

      var msg = [];
      if (added)   msg.push(added   + ' new row' + (added   !== 1 ? 's' : '') + ' added');
      if (merged)  msg.push(merged  + ' row' + (merged  !== 1 ? 's' : '') + ' merged');
      if (skipped) msg.push(skipped + ' skipped');
      toast('Pull complete: ' + (msg.join(', ') || 'nothing to do'), 'success');
    }

    /* ── CSV Import ──────────────────────────────────────────────────── */
    function normalizeHeader(h) {
      h = (h || '').trim().toLowerCase();
      if (/^date|service\s*date|sunday/i.test(h))              return 'date';
      if (/psalm|introit|call.?to.?worship/i.test(h))          return 'psalm';
      if (/worship|song\s*lead|music/i.test(h))                return 'worship';
      if (/announc|mc|emcee|host/i.test(h))                    return 'announce';
      if (/prayer|pray|intercessi/i.test(h))                   return 'prayer';
      if (/preach|speak|serm|pastor|minister/i.test(h))        return 'preacher';
      if (/scripture|text|reading|passage|bible/i.test(h))     return 'scripture';
      if (/proverb/i.test(h))                                  return 'proverb';
      if (/note|theme|topic|title|subject/i.test(h))           return 'notes';
      return null;
    }

    function parseCSV(text) {
      var raw = text.trim().split(/\r?\n/);
      if (raw.length < 2) return null;
      var sep = raw[0].includes('\t') ? '\t' : ',';

      function splitLine(line) {
        if (sep === '\t') return line.split('\t').map(function(c){ return c.trim(); });
        var cells = [], cell = '', inQ = false;
        for (var i = 0; i < line.length; i++) {
          var ch = line[i];
          if (ch === '"' && !inQ) { inQ = true; continue; }
          if (ch === '"' && inQ)  {
            if (line[i+1] === '"') { cell += '"'; i++; } else { inQ = false; }
            continue;
          }
          if (ch === ',' && !inQ) { cells.push(cell.trim()); cell = ''; continue; }
          cell += ch;
        }
        cells.push(cell.trim());
        return cells;
      }

      var headers = splitLine(raw[0]).map(normalizeHeader);
      if (!headers.includes('date') && !headers.some(function(h){ return h && h !== null; })) {
        return null;
      }
      var rows = [];
      for (var i = 1; i < raw.length; i++) {
        if (!raw[i].trim()) continue;
        var cells = splitLine(raw[i]);
        var row = mkRow('');
        headers.forEach(function(field, idx) {
          if (!field) return;
          var val = (cells[idx] || '').replace(/^"|"$/g, '').trim();
          if (field === 'date') {
            /* normalise common date formats to YYYY-MM-DD */
            if (/^\d{4}-\d{2}-\d{2}$/.test(val)) { row.date = val; return; }
            var dt = new Date(val);
            if (!isNaN(dt)) { row.date = isoDate(dt); } else { row.date = val; }
          } else if (FIELDS.indexOf(field) !== -1) {
            row[field] = val;
          }
        });
        if (row.date || FIELDS.some(function(f){ return row[f]; })) rows.push(row);
      }
      return rows;
    }

    /* ── Parse xlsx via SheetJS ───────────────────────────────────────── */
    function parseXLSX(arrayBuffer) {
      if (typeof XLSX === 'undefined') { toast('XLSX library not loaded.', 'error'); return null; }
      var wb = XLSX.read(arrayBuffer, { type: 'array', cellDates: true });
      var ws = wb.Sheets[wb.SheetNames[0]];
      var json = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, dateNF: 'yyyy-mm-dd' });
      if (!json || json.length < 2) return null;
      var headers = json[0].map(normalizeHeader);
      if (!headers.includes('date') && !headers.some(function(h){ return h; })) return null;
      var rows = [];
      for (var i = 1; i < json.length; i++) {
        var cells = json[i]; if (!cells || !cells.length) continue;
        var row = mkRow('');
        headers.forEach(function(field, idx) {
          if (!field) return;
          var val = String(cells[idx] || '').trim();
          if (field === 'date') {
            if (/^\d{4}-\d{2}-\d{2}/.test(val)) { row.date = val.slice(0,10); return; }
            var dt = new Date(val);
            if (!isNaN(dt)) { row.date = isoDate(dt); } else { row.date = val; }
          } else if (FIELDS.indexOf(field) !== -1) { row[field] = val; }
        });
        if (row.date || FIELDS.some(function(f){ return row[f]; })) rows.push(row);
      }
      return rows;
    }

    /* ── Google Sheets URL → CSV export ─────────────────────────────── */
    function importGoogleSheet() {
      var url = prompt('Paste the Google Sheets URL:');
      if (!url) return;
      var m = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
      if (!m) { toast('Not a valid Google Sheets URL.', 'error'); return; }
      var sheetId = m[1];
      var gid = url.match(/gid=(\d+)/);
      /* Two endpoints — gviz is more reliable for public sheets */
      var gvizUrl = 'https://docs.google.com/spreadsheets/d/' + sheetId +
                    '/gviz/tq?tqx=out:csv' + (gid ? '&gid=' + gid[1] : '');
      var exportUrl = 'https://docs.google.com/spreadsheets/d/' + sheetId +
                      '/export?format=csv' + (gid ? '&gid=' + gid[1] : '');

      function tryFetchCSV(csvUrl) {
        return fetch(csvUrl).then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          var ct = (r.headers.get('content-type') || '').toLowerCase();
          if (ct.indexOf('html') !== -1) throw new Error('Got HTML instead of CSV');
          return r.text();
        }).then(function(text) {
          /* Guard: if Google returned an HTML page despite content-type */
          var trimmed = text.trim();
          if (trimmed.charAt(0) === '<' || /^<!doctype/i.test(trimmed))
            throw new Error('Got HTML instead of CSV');
          return text;
        });
      }

      setStatus('pending', 'Fetching sheet…');
      tryFetchCSV(gvizUrl).catch(function() {
        /* fallback to export endpoint */
        return tryFetchCSV(exportUrl);
      }).then(function(text) {
        var rows = parseCSV(text);
        if (!rows || !rows.length) { toast('No data rows found in sheet.', 'error'); setStatus('', ''); return; }
        mergeImportedRows(rows);
        setStatus('ready', 'Sheet imported');
      }).catch(function(e) {
        toast('Could not fetch sheet — make sure it\'s shared as "Anyone with the link".', 'error');
        setStatus('', '');
      });
    }

    /* ── Common import merge logic ──────────────────────────────────── */
    function mergeImportedRows(rows) {
      var byDate = {};
      S.rows.forEach(function(r){ if (r.date) byDate[r.date] = r; });
      var added = 0, updated = 0;
      rows.forEach(function(r) {
        if (r.date && byDate[r.date]) {
          FIELDS.forEach(function(f){ if (r[f]) byDate[r.date][f] = r[f]; });
          updated++;
        } else {
          S.rows.push(r);
          if (r.date) byDate[r.date] = r;
          added++;
        }
      });
      render(); markDirty();
      toast('Imported: ' + added + ' new row' + (added !== 1 ? 's' : '') +
            (updated ? ', ' + updated + ' updated' : ''), 'success');
    }

    function handleImportFile(inp) {
      var file = inp.files[0];
      if (!file) return;
      var ext = file.name.split('.').pop().toLowerCase();

      if (ext === 'xlsx' || ext === 'xls') {
        var reader = new FileReader();
        reader.onload = function(e) {
          var rows = parseXLSX(e.target.result);
          if (!rows || !rows.length) { toast('No data rows found in file.', 'error'); return; }
          mergeImportedRows(rows);
        };
        reader.readAsArrayBuffer(file);
      } else {
        var reader2 = new FileReader();
        reader2.onload = function(e) {
          var rows = parseCSV(e.target.result);
          if (!rows || !rows.length) { toast('No data rows found in file.', 'error'); return; }
          mergeImportedRows(rows);
        };
        reader2.readAsText(file);
      }
      inp.value = '';
    }

    /* ── Manual Save ────────────────────────────────────────────────── */
    async function manualSave() {
      var btn = document.getElementById('btnSave');
      btn.disabled = true; btn.textContent = '…Saving';
      _saveLocal();
      await saveToFirestore(false);
      btn.disabled = false; btn.textContent = '💾 Save';
    }

    /* ── Export to Google Drive ───────────────────────────────────────── */
    async function exportToDrive() {
      var btn = document.getElementById('btnExportDrive');
      btn.disabled = true; btn.textContent = '…Exporting';

      var q    = document.getElementById('qQ').value;
      var year = document.getElementById('qY').value;
      var svcType = document.getElementById('qST').value;

      /* Build CSV content */
      var headers = ['Date','Psalm / Introit','Worship Leader','Announcements','Prayer','Preacher','Scripture','Proverb','Notes / Theme'];
      var csvRows = [headers.join(',')];
      S.rows.forEach(function(row) {
        var cells = [
          row.date,
          row.psalm, row.worship, row.announce, row.prayer,
          row.preacher, row.scripture, row.proverb, row.notes
        ].map(function(v) {
          var s = (v || '').replace(/"/g, '""');
          return '"' + s + '"';
        });
        csvRows.push(cells.join(','));
      });
      var csvContent = csvRows.join('\n');
      var blob = new Blob([csvContent], { type: 'text/csv' });

      /* Try Google Drive Picker / gapi if available, otherwise fallback to download */
      var fileName = 'FlockOS_' + q + '_' + year + '_' + svcType.replace(/\s+/g,'_') + '.csv';

      /* Check for Google Identity Services */
      if (typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
        try {
          await _uploadToDrive(blob, fileName);
          btn.disabled = false; btn.textContent = '📤 Export to Drive';
          return;
        } catch(e) {
          /* Fall through to download */
        }
      }

      /* Fallback: direct download as CSV (user can upload to Drive manually) */
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = fileName; a.style.display = 'none';
      document.body.appendChild(a); a.click();
      setTimeout(function() { URL.revokeObjectURL(url); a.remove(); }, 500);
      toast('Downloaded ' + fileName + ' — upload to Google Drive or open with Sheets.', 'success', 5000);
      btn.disabled = false; btn.textContent = '📤 Export to Drive';
    }

    /* Google Drive upload via access token */
    async function _uploadToDrive(blob, fileName) {
      /* Use tokenClient if gapi is loaded */
      var tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: (typeof FLOCKOS_GOOGLE_CLIENT_ID !== 'undefined') ? FLOCKOS_GOOGLE_CLIENT_ID : '',
        scope: 'https://www.googleapis.com/auth/drive.file',
        callback: function() {} /* set below */
      });

      var accessToken = await new Promise(function(resolve, reject) {
        tokenClient.callback = function(resp) {
          if (resp.error) reject(new Error(resp.error));
          else resolve(resp.access_token);
        };
        tokenClient.requestAccessToken();
      });

      /* Multipart upload */
      var metadata = { name: fileName, mimeType: 'application/vnd.google-apps.spreadsheet' };
      var form = new FormData();
      form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
      form.append('file', blob);

      var resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&convert=true', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + accessToken },
        body: form
      });
      if (!resp.ok) throw new Error('Drive upload failed: ' + resp.status);
      var data = await resp.json();
      toast('Exported to Google Drive as Spreadsheet ✓', 'success', 4000);
      /* Open in new tab */
      window.open('https://docs.google.com/spreadsheets/d/' + data.id, '_blank');
    }

    /* ── Init + bindings ─────────────────────────────────────────────── */
    function init() {
      /* Set quarter from today */
      var now = new Date();
      var m   = now.getMonth();
      var q   = m < 3 ? 'Q1' : m < 6 ? 'Q2' : m < 9 ? 'Q3' : 'Q4';
      document.getElementById('qQ').value = q;
      document.getElementById('qY').value = now.getFullYear();
      updateQNavLabel();

      /* Quarter navigation */
      document.getElementById('btnPrevQ').addEventListener('click', function(){ navigateQuarter(-1); });
      document.getElementById('btnNextQ').addEventListener('click', function(){ navigateQuarter(1); });
      /* Update label when dropdowns change manually */
      document.getElementById('qQ').addEventListener('change', updateQNavLabel);
      document.getElementById('qY').addEventListener('change', updateQNavLabel);

      /* Validate first-sunday picker */
      document.getElementById('qFS').addEventListener('change', function () {
        var v = this.value; if (!v) return;
        var d = new Date(v + 'T00:00:00');
        if (d.getDay() !== 0) {
          toast('That is a ' + ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()] + ' — please pick a Sunday.', 'error');
          this.value = '';
        }
      });

      document.getElementById('btnGen').addEventListener('click', generate);
      document.getElementById('btnAdd').addEventListener('click', function(){ addRow(); });
      document.getElementById('btnDup').addEventListener('click', dupLast);
      document.getElementById('btnReset').addEventListener('click', function(){
        if (!confirm('Clear all rows?')) return;
        S.rows=[]; S.importedIds={}; render(); markDirty();
      });
      document.getElementById('btnPush').addEventListener('click', pushPlans);
      document.getElementById('btnPull').addEventListener('click', pullPlans);
      document.getElementById('ckAll').addEventListener('change', function() {
        var on = this.checked;
        document.querySelectorAll('#gridBody .push-ck').forEach(function(cb){ cb.checked = on; });
      });
      document.getElementById('btnSave').addEventListener('click', manualSave);
      document.getElementById('btnImport').addEventListener('click', function(){ document.getElementById('importFile').click(); });
      document.getElementById('importFile').addEventListener('change', function(){ handleImportFile(this); });
      if (document.getElementById('btnGSheet')) document.getElementById('btnGSheet').addEventListener('click', importGoogleSheet);
      document.getElementById('btnExportDrive').addEventListener('click', exportToDrive);
      document.getElementById('po-close').addEventListener('click', function(){
        document.getElementById('push-overlay').classList.remove('open');
      });

      function getDashboardUrl() {
        if (document.referrer && document.referrer.indexOf('the_good_shepherd') !== -1) return document.referrer;
        return 'the_good_shepherd.html';
      }
      async function saveAndClose() {
        var btn1 = document.getElementById('btnSaveCloseTop');
        var btn2 = document.getElementById('btnSaveCloseBot');
        btn1.disabled = btn2.disabled = true;

        /* 1 — save draft (local backup first, then Firestore) */
        btn1.textContent = btn2.textContent = '…Saving';
        setStatus('pending', 'Saving…');
        _saveLocal();
        try { await saveToFirestore(false); } catch(e) { /* error already shown, local backup is safe */ }

        /* 2 — navigate back (use top-level window so iframe doesn't load the shell inside itself) */
        window.top.location.href = getDashboardUrl();
      }
      document.getElementById('btnSaveCloseTop').addEventListener('click', saveAndClose);
      document.getElementById('btnSaveCloseBot').addEventListener('click', saveAndClose);

      window.addEventListener('beforeunload', function(e){
        if (S.dirty) _saveLocal(); /* last-chance local save */
        if (!S.dirty) return; e.preventDefault(); e.returnValue='';
      });

      /* Periodic Firestore reconnect — if we're in "saved locally" state, retry every 30s */
      setInterval(function() {
        if (!S.dirty) return;
        if (isFB()) saveToFirestore(true);
      }, 30000);

      /* auto-load from Firestore for current quarter, with localStorage fallback */
      setStatus('pending', 'Loading…');
      (async function loadPlan() {
        var localData = _loadLocal();
        try {
          await ensureFB();
          var snap = await planRef().get();
          if (snap && snap.exists) {
            var fbData = snap.data();
            /* If local backup is newer than Firestore, prefer local */
            if (localData && localData.at && fbData.at && localData.at > fbData.at) {
              applyPlanData(localData);
              setStatus('pending', 'Recovered unsaved changes — syncing…');
              toast('Recovered unsaved local changes. Saving to cloud…', 'info', 4000);
              await saveToFirestore(true);
            } else {
              applyPlanData(fbData);
              _clearLocal();
              setStatus('ready', '✓ Saved · ' + fmtTs(fbData.at));
            }
          } else if (localData && localData.rows && localData.rows.length) {
            /* No Firestore doc but we have local data */
            applyPlanData(localData);
            setStatus('pending', 'Recovered local data — syncing…');
            toast('Loaded from local backup. Saving to cloud…', 'info', 4000);
            await saveToFirestore(true);
          } else {
            generate(true);
            setStatus('', 'Not yet saved');
          }
        } catch(e) {
          /* Firestore unavailable — use local backup or generate fresh */
          if (localData && localData.rows && localData.rows.length) {
            applyPlanData(localData);
            setStatus('error', 'Offline — loaded from local backup');
            toast('Working offline. Changes will save locally until Firestore reconnects.', 'warning', 5000);
          } else {
            generate(true);
            setStatus('error', 'Offline — working locally');
            toast('Firestore unavailable. Your edits are saved locally.', 'warning', 4000);
          }
        }
      })();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();

  /* ── Matrix mode toggle ─────────────────────────────────────────────── */
  (function () {
    var PREF    = 'flockos_qwp_matrix';
    var html    = document.documentElement;
    var canvas  = document.getElementById('matrixCanvas');
    var ctx     = canvas.getContext('2d');
    var raf     = null;
    var drops   = [];
    var CHARS   = 'ﾆｺｿﾃﾀｼｶｱﾊﾖﾙﾄﾁｻｵｷｺｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$&*()[]{}';
    var FS      = 14;

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      var cols = Math.floor(canvas.width / FS);
      /* keep existing drops, pad/trim to match col count */
      while (drops.length < cols) drops.push(Math.floor(Math.random() * -80));
      drops.length = cols;
    }

    function rain() {
      ctx.fillStyle = 'rgba(0,0,0,0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#00ff41';
      ctx.font = FS + 'px "Share Tech Mono", monospace';
      for (var i = 0; i < drops.length; i++) {
        if (drops[i] * FS > 0) {
          var ch = CHARS[Math.floor(Math.random() * CHARS.length)];
          ctx.fillStyle = Math.random() > 0.96 ? '#ffffff' : '#00ff41';
          ctx.fillText(ch, i * FS, drops[i] * FS);
        }
        if (drops[i] * FS > canvas.height && Math.random() > 0.975) drops[i] = Math.floor(Math.random() * -40);
        drops[i]++;
      }
      raf = requestAnimationFrame(rain);
    }

    function start() { resize(); if (raf) cancelAnimationFrame(raf); raf = requestAnimationFrame(rain); }
    function stop()  { if (raf) { cancelAnimationFrame(raf); raf = null; } ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function setMatrix(on) {
      html.setAttribute('data-matrix', on ? '1' : '0');
      localStorage.setItem(PREF, on ? '1' : '0');
      if (on) { start(); } else { stop(); }
    }

    document.getElementById('matrixToggle').addEventListener('click', function () {
      setMatrix(html.getAttribute('data-matrix') !== '1');
    });

    window.addEventListener('resize', function () {
      if (html.getAttribute('data-matrix') === '1') resize();
    });

    /* restore saved pref */
    if (localStorage.getItem(PREF) === '1') setMatrix(true);
  })();
  </script>
