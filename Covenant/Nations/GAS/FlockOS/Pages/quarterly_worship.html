<!DOCTYPE html>
<html lang="en" data-matrix="0">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FlockOS — Quarterly Worship Planner</title>
    <link rel="manifest" href="../../manifest.json">

  <link rel="icon" type="image/png" href="../Images/FlockOS_Orange.png">
  <link rel="apple-touch-icon" href="../Images/FlockOS_Orange.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&family=Noto+Serif:wght@700&family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../Styles/american_garments.css">
  <!-- Firebase + UpperRoom (same stack as the rest of FlockOS) -->
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script defer src="../Scripts/the_upper_room.js"></script>
  <script defer src="../Scripts/fine_linen.js"></script>
  <script defer src="../Scripts/the_true_vine.js"></script>
  <script defer src="../Scripts/the_wellspring.js"></script>
  <script defer src="../Scripts/firm_foundation.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --topbar-h: 58px;
      --bg:            #f0f4ff;
      --bg-raised:     #ffffff;
      --bg-sunken:     #eaeffc;
      --bg-hover:      #dfe6fa;
      --bg-card:       #eaeffc;
      --ink:           #1e1b4b;
      --ink-muted:     #4338ca;
      --ink-faint:     #a5b4fc;
      --ink-inverse:   #ffffff;
      --accent:        #4f46e5;
      --accent-hover:  #4338ca;
      --accent-soft:   rgba(79,70,229,0.12);
      --gold:          #d97706;
      --gold-soft:     rgba(217,119,6,0.14);
      --success:       #059669;
      --success-soft:  rgba(5,150,105,0.12);
      --danger:        #dc2626;
      --danger-soft:   rgba(220,38,38,0.12);
      --warning:       #d97706;
      --warning-soft:  rgba(217,119,6,0.12);
      --warn:          #d97706;
      --warn-soft:     rgba(217,119,6,0.12);
      --line:          rgba(79,70,229,0.10);
      --line-strong:   rgba(79,70,229,0.20);
      --shadow-sm:     0 1px 8px rgba(30,27,75,0.08);
      --shadow-md:     0 4px 24px rgba(30,27,75,0.14);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { font-size:100%; -webkit-text-size-adjust:100%; }
    body {
      font-family: 'Noto Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--ink); line-height: 1.6; min-height: 100vh;
    }

    /* ── Accent bar ─────────────────────────────────────────────────────── */
    #rainbowBar {
      height: 3px;
      background: linear-gradient(90deg, #4f46e5, #7c3aed, #2563eb);
    }

    /* ── Topbar ─────────────────────────────────────────────────────────── */
    .topbar {
      position: sticky; top:0; left:0; right:0;
      height: var(--topbar-h);
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
      box-shadow: 0 2px 14px rgba(30,27,75,0.30);
      display: flex; align-items: center; padding: 0 18px; z-index:100; gap:10px;
    }
    .topbar-brand {
      font-size: 1.0rem; font-weight: 800; color: #e0e7ff;
      letter-spacing: .05em; white-space: nowrap;
    }
    .topbar-brand span {
      font-size: .74rem; font-weight: 400; color: rgba(199,210,254,.65); margin-left:6px;
    }
    .topbar-sep { color: rgba(255,255,255,.25); font-size:.9rem; }
    .topbar-title { font-size:.84rem; font-weight:600; color:rgba(255,255,255,.75); white-space:nowrap; }
    .topbar-spacer { flex: 1 1 auto; }
    /* Sync status inline */
    .sync-pill {
      display: flex; align-items: center; gap: 6px;
      background: rgba(0,0,0,.22); border: 1px solid rgba(255,255,255,.12);
      border-radius: 20px; padding: 4px 12px; white-space: nowrap;
      transition: background .3s, border-color .3s;
    }
    .sync-pill:has(.dot.ready)  { background: rgba(5,150,105,.25); border-color: rgba(5,150,105,.4); }
    .sync-pill:has(.dot.error)  { background: rgba(220,38,38,.3); border-color: rgba(220,38,38,.5); }
    .sync-pill:has(.dot.pending){ background: rgba(217,119,6,.25); border-color: rgba(217,119,6,.4); }
    .sync-pill #sMsg { font-size: .70rem; font-weight: 700; color: rgba(224,231,255,.72); }
    .sync-pill:has(.dot.ready) #sMsg  { color: #6ee7b7; }
    .sync-pill:has(.dot.error) #sMsg  { color: #fca5a5; }
    .sync-pill:has(.dot.pending) #sMsg { color: #fcd34d; }
    /* Save & Close button */
    .btn-save-close {
      background: linear-gradient(135deg, #059669, #0d9488);
      border: 0; border-radius: 8px; color: #fff;
      font: inherit; font-size: .80rem; font-weight: 700;
      padding: 7px 18px; cursor: pointer;
      box-shadow: 0 2px 10px rgba(5,150,105,.30);
      transition: opacity .14s, transform .12s, box-shadow .14s;
      display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
    }
    .btn-save-close:hover { opacity:.88; transform:translateY(-1px); box-shadow:0 4px 16px rgba(5,150,105,.44); }
    .btn-save {
      background: linear-gradient(135deg, #059669, #0d9488) !important;
      color: #fff !important; border: 0 !important;
      font-weight: 700 !important;
      box-shadow: 0 2px 10px rgba(5,150,105,.30);
      transition: opacity .14s, transform .12s;
      padding: 6px 14px !important;
    }
    .btn-save:hover { opacity:.88; transform:translateY(-1px); }
    .btn-save:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .btn-save-close:active { transform:translateY(0); }
    .btn-save-close:disabled { opacity:.4; cursor:not-allowed; transform:none; }

    /* ── Page layout ────────────────────────────────────────────────────── */
    .page-wrap {
      max-width: 100%; padding: 16px 16px 80px;
      display: flex; flex-direction: column; gap: 14px;
    }

    /* ── Cards ──────────────────────────────────────────────────────────── */
    .card {
      background: var(--bg-raised); border: 1px solid var(--line-strong);
      border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-sm);
    }
    .card-head {
      padding: 11px 18px;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
      border-bottom: none;
      display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap;
    }
    .card-head-title { font-family:'Noto Serif',serif; font-size:.95rem; font-weight:700; color:#e0e7ff; }
    .card-head * { color: rgba(224,231,255,.85) !important; -webkit-text-fill-color: unset !important; }
    .card-head .card-head-title { color: #e0e7ff !important; }
    .qnav { background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.18); border-radius:6px;
      padding:3px 9px; font-size:.78rem; font-weight:700; color:#e0e7ff !important; cursor:pointer;
      transition:background .15s; line-height:1.2; font-family:inherit; }
    .qnav:hover { background:rgba(255,255,255,.22); }
    .qnav-group { display:flex; align-items:center; gap:6px; }
    .qnav-label { font-size:.74rem; font-weight:600; color:rgba(224,231,255,.7) !important; white-space:nowrap; }
    .card-body { padding: 16px 18px; }



    /* ── Controls ───────────────────────────────────────────────────────── */
    .controls { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:13px; }
    label.lbl {
      display:block; font-size:.69rem; letter-spacing:.07em; text-transform:uppercase;
      color:var(--ink-muted); font-weight:700; margin-bottom:5px;
    }
    .fw { background:var(--bg-raised); border:1.5px solid var(--line-strong); border-radius:9px; transition:border-color .14s, box-shadow .14s; }
    .fw:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
    .fi, .fs {
      width:100%; background:transparent; border:0; outline:none;
      color:var(--ink); font:inherit; font-size:.84rem; padding:8px 11px; min-height:36px;
    }
    .fi::placeholder { color:var(--ink-faint); }
    .fs option { background:var(--bg-raised); color:var(--ink); }

    /* ── Buttons ────────────────────────────────────────────────────────── */
    .btn {
      display:inline-flex; align-items:center; gap:4px;
      padding:6px 11px; border-radius:7px; border:0;
      font:inherit; font-size:.74rem; font-weight:700; cursor:pointer;
      transition:opacity .14s, transform .12s, box-shadow .14s; white-space:nowrap;
      line-height:1.1;
    }
    .btn:hover:not(:disabled) { opacity:.86; transform:translateY(-1px); }
    .btn:active { transform:translateY(0); }
    .btn:disabled { opacity:.38; cursor:not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, #4f46e5, #4338ca);
      color:#fff; box-shadow:0 2px 10px rgba(79,70,229,.30);
    }
    .btn-primary:hover:not(:disabled) { opacity:1; box-shadow:0 4px 16px rgba(79,70,229,.45); }

    .btn-secondary { background:var(--bg-raised); border:1.5px solid var(--line-strong); color:var(--ink-muted); }
    .btn-secondary:hover:not(:disabled) { background:var(--bg-hover); border-color:var(--accent); color:var(--accent); }

    .btn-success { background:linear-gradient(135deg,#059669,#0d9488); color:#fff; box-shadow:0 2px 8px rgba(5,150,105,.24); }
    .btn-success:hover:not(:disabled) { opacity:1; box-shadow:0 4px 14px rgba(5,150,105,.40); }

    .btn-danger {
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      color:#fff; box-shadow:0 2px 8px rgba(220,38,38,.24);
    }
    .btn-danger:hover:not(:disabled) { opacity:1; box-shadow:0 4px 14px rgba(220,38,38,.40); }

    .btn-gold {
      background: linear-gradient(135deg, #b45309, #d97706);
      color:#fff; box-shadow:0 2px 10px rgba(217,119,6,.28);
    }
    .btn-gold:hover:not(:disabled) { opacity:1; box-shadow:0 4px 16px rgba(217,119,6,.44); }

    /* ── Action row ─────────────────────────────────────────────────────── */
    .action-row {
      display:flex; flex-wrap:nowrap; gap:6px; align-items:center;
      padding:9px 16px; border-top:1px solid var(--line); background:var(--bg-sunken);
      overflow-x:auto; overflow-y:hidden;
    }
    .action-row::-webkit-scrollbar { height:0; }
    .action-row .divider {
      width:1px; height:22px; background:var(--line-strong); margin:0 4px; flex-shrink:0;
    }
    .action-row-r { margin-left:auto; display:flex; gap:6px; flex-shrink:0; }

    /* ── Table ──────────────────────────────────────────────────────────── */
    /* ── Day-of-week filter tickers ──────────────────────────────────── */
    .dow-filters {
      display:flex; gap:4px; flex-wrap:nowrap; margin-left:auto;
    }
    .dow-tick {
      padding:3px 8px; border-radius:6px; border:1.5px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.10); color:rgba(224,231,255,.75) !important; font:inherit;
      font-size:.68rem; font-weight:700; cursor:pointer; transition:all .15s;
      letter-spacing:.04em; min-width:34px; text-align:center;
    }
    .dow-tick:hover { background:rgba(255,255,255,.20); border-color:rgba(255,255,255,.35); color:#e0e7ff !important; }
    .dow-tick.active {
      background:rgba(255,255,255,.22); color:#fff !important;
      border-color:rgba(255,255,255,.45); box-shadow:0 1px 6px rgba(79,70,229,.30);
    }

    .tscroll { overflow-x:auto; overflow-y:auto; max-height:calc(100vh - 290px); }
    .tscroll::-webkit-scrollbar { width:7px; height:7px; }
    .tscroll::-webkit-scrollbar-thumb { background:rgba(79,70,229,.30); border-radius:999px; }
    .tscroll::-webkit-scrollbar-track { background:transparent; }
    table { width:100%; border-collapse:separate; border-spacing:0; min-width:1060px; }
    thead th {
      position:sticky; top:0; z-index:5;
      background: #1e1b4b;
      color: #e0e7ff;
      font-size:.67rem; letter-spacing:.09em; text-transform:uppercase;
      font-weight:800; padding:11px 9px; text-align:left; white-space:nowrap;
      border-bottom: 2px solid rgba(79,70,229,.40);
    }
    tbody tr td { background:var(--bg-raised); }
    tbody tr:nth-child(even) td { background:#f5f0fe; }
    tbody tr:hover td { background:#ece8ff; }
    tbody td { padding:4px 4px; border-bottom:1px solid var(--line); vertical-align:middle; }
    tbody tr:last-child td { border-bottom:0; }

    /* cell input */
    .cw {
      background:var(--bg-raised); border:1.5px solid var(--line-strong);
      border-radius:7px; transition:border-color .11s, box-shadow .11s;
    }
    .cw:focus-within { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-soft); }
    .ci {
      width:100%; background:transparent; border:0; outline:none;
      color:var(--ink); font:inherit; font-size:.8rem; padding:6px 7px; min-height:32px;
    }
    .ci::placeholder { color:var(--ink-faint); }
    .ci.date-ci { font-weight:700; color:var(--accent); font-size:.78rem; }

    /* row action btns */
    .row-btns { display:flex; gap:3px; justify-content:flex-end; padding:1px 4px; }
    .ib {
      width:27px; height:27px; border-radius:6px; border:1.5px solid var(--line-strong);
      background:var(--bg-raised); color:var(--ink-muted);
      cursor:pointer; font-size:.74rem; display:flex; align-items:center; justify-content:center;
      transition:background .11s, color .11s, border-color .11s;
    }
    .ib:hover { background:var(--bg-hover); color:var(--accent); border-color:var(--accent); }
    .ib.del:hover { background:var(--danger-soft); color:var(--danger); border-color:var(--danger); }
    .ib.imp { color:var(--success); border-color:var(--success); background:var(--success-soft); cursor:default; font-size:.68rem; }
    /* push-select checkbox */
    .push-ck { width:16px; height:16px; accent-color:var(--accent); cursor:pointer; margin:0; }
    th .push-ck { vertical-align:middle; }

    /* ── Sidebar ────────────────────────────────────────────────────────── */
    .sidebar { display:flex; flex-direction:column; gap:16px; }
    .stat-row {
      display:flex; justify-content:space-between; align-items:center;
      font-size:.83rem; padding:6px 0; border-bottom:1px solid var(--line);
    }
    .stat-row:last-child { border-bottom:0; }
    .stat-row span:first-child { color:var(--ink-muted); font-size:.8rem; }
    .stat-row strong { color:var(--ink); font-weight:800; font-size:.9rem; }
    .stat-row strong.hi { color:var(--success); }
    .dot { width:9px; height:9px; border-radius:50%; background:var(--ink-muted); flex-shrink:0; }
    .dot.ready   { background:#10b981; box-shadow:0 0 0 3px rgba(16,185,129,.22); }
    .dot.pending { background:var(--warn); animation:dpulse .85s ease-in-out infinite; }
    .dot.error   { background:var(--danger); box-shadow:0 0 0 3px rgba(220,38,38,.22); }
    @keyframes dpulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* ── Toast ──────────────────────────────────────────────────────────── */
    #toast {
      position:fixed; bottom:26px; right:22px; z-index:9999;
      max-width:330px; padding:12px 18px; border-radius:12px;
      font-size:.84rem; font-weight:700; line-height:1.4; display:none;
      animation:tin .2s ease; box-shadow:var(--shadow-md);
    }
    @keyframes tin { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
    #toast.success { background:#d1fae5; border:1.5px solid #10b981; color:#065f46; }
    #toast.error   { background:#fee2e2; border:1.5px solid #dc2626; color:#991b1b; }
    #toast.info    { background:#ede9fe; border:1.5px solid #7c3aed; color:#4c1d95; }

    /* ── Push overlay ───────────────────────────────────────────────────── */
    #push-overlay {
      display:none; position:fixed; inset:0; z-index:500;
      background:rgba(17,7,46,.75); align-items:center; justify-content:center;
      backdrop-filter:blur(6px);
    }
    #push-overlay.open { display:flex; }
    .push-box {
      background: linear-gradient(160deg, #1e1b4b 0%, #312e81 100%);
      border:1px solid rgba(79,70,229,.35);
      border-radius:18px; padding:30px 28px; min-width:350px; max-width:480px;
      text-align:center; box-shadow:0 0 50px rgba(79,70,229,.25);
    }
    .push-box h3 { font-family:'Noto Serif',serif; font-size:1.05rem; margin-bottom:10px; color:#e0e7ff; }
    .push-box p  { color:rgba(255,255,255,.72); font-size:.84rem; line-height:1.5; }
    .prog-track  { background:rgba(255,255,255,.12); border-radius:999px; height:6px; margin:18px 0; overflow:hidden; }
    .prog-fill   { height:100%; background:linear-gradient(90deg,#4f46e5,#7c3aed); border-radius:999px; transition:width .28s; }
    .push-log    { text-align:left; max-height:175px; overflow-y:auto; font-size:.75rem; color:rgba(255,255,255,.60); margin-top:10px; }
    .push-log div { padding:2px 0; }
    .push-log .ok   { color:#6ee7b7; }
    .push-log .skip { color:#fbbf24; }
    .push-log .fail { color:#fca5a5; }

    /* ── Matrix toggle button ───────────────────────────────────────────── */
    .matrix-toggle {
      background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.25);
      border-radius:20px; color:rgba(255,255,255,.78);
      font:inherit; font-size:.72rem; font-weight:700;
      padding:5px 13px; cursor:pointer; letter-spacing:.06em;
      display:inline-flex; align-items:center; gap:6px;
      transition:all .2s; white-space:nowrap; flex-shrink:0;
    }
    .matrix-toggle:hover { background:rgba(255,255,255,.20); border-color:rgba(255,255,255,.5); color:#fff; }
    .mt-dot {
      width:7px; height:7px; border-radius:50%;
      background:rgba(255,255,255,.5); flex-shrink:0;
      transition:background .2s, box-shadow .2s;
    }

    /* ── Matrix mode — full override ────────────────────────────────────── */
    html[data-matrix="1"] {
      --bg:            #000000;
      --bg-raised:     #030d03;
      --bg-sunken:     #000800;
      --bg-hover:      #001400;
      --bg-card:       #000800;
      --ink:           #00ff41;
      --ink-muted:     #00aa2a;
      --ink-faint:     #005512;
      --ink-inverse:   #000000;
      --accent:        #00ff41;
      --accent-hover:  #00dd33;
      --accent-soft:   rgba(0,255,65,0.12);
      --gold:          #39ff14;
      --gold-soft:     rgba(57,255,20,0.12);
      --line:          rgba(0,255,65,0.18);
      --line-strong:   rgba(0,255,65,0.35);
      --success:       #00ff41;
      --success-soft:  rgba(0,255,65,0.10);
      --danger:        #ff2244;
      --danger-soft:   rgba(255,34,68,0.12);
      --warning:       #ffcc00;
      --warning-soft:  rgba(255,204,0,0.12);
      --shadow-sm:     0 0 8px rgba(0,255,65,0.12);
      --shadow-md:     0 0 18px rgba(0,255,65,0.18);
    }
    html[data-matrix="1"] body { font-family:'Share Tech Mono','Courier New',monospace; text-shadow:0 0 5px rgba(0,255,65,0.35); }
    html[data-matrix="1"] #rainbowBar { display:none; }
    html[data-matrix="1"] body::after {
      content:''; position:fixed; top:0; left:0; width:100%; height:100%;
      z-index:1; pointer-events:none;
      background:repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
    }
    html[data-matrix="1"] .topbar {
      background:rgba(0,8,0,0.94) !important; box-shadow:none !important;
      border-bottom:1px solid rgba(0,255,65,0.25) !important; backdrop-filter:blur(4px);
    }
    html[data-matrix="1"] .topbar-brand {
      font-family:'VT323',monospace; font-size:1.35rem;
      background:none !important; animation:none !important;
      -webkit-background-clip:unset !important; background-clip:unset !important;
      -webkit-text-fill-color:#00ff41 !important; color:#00ff41 !important;
      text-shadow:0 0 14px rgba(0,255,65,0.9),0 0 28px rgba(0,255,65,0.4) !important;
    }
    html[data-matrix="1"] .topbar-brand span { -webkit-text-fill-color:#00aa2a !important; color:#00aa2a !important; }
    html[data-matrix="1"] .topbar-title,
    html[data-matrix="1"] .topbar-sep { color:#00aa2a !important; text-shadow:0 0 6px rgba(0,255,65,0.5) !important; }
    html[data-matrix="1"] .sync-pill { background:rgba(0,8,0,.7) !important; border-color:rgba(0,255,65,.18) !important; }
    html[data-matrix="1"] .sync-pill #sMsg { color:#00aa2a !important; }
    html[data-matrix="1"] .btn-save-close { background:linear-gradient(135deg,#003310,#00ff41) !important; color:#000 !important; box-shadow:0 0 10px rgba(0,255,65,.35) !important; }
    html[data-matrix="1"] .bottom-bar { background:rgba(0,8,0,.94) !important; border-top-color:rgba(0,255,65,.25) !important; }
    html[data-matrix="1"] .card { border-color:rgba(0,255,65,0.22) !important; box-shadow:0 0 14px rgba(0,255,65,.07) !important; }
    html[data-matrix="1"] .card-head,
    html[data-matrix="1"] .c-setup .card-head, html[data-matrix="1"] .c-grid .card-head,
    html[data-matrix="1"] .c-summary .card-head, html[data-matrix="1"] .c-push .card-head,
    html[data-matrix="1"] .c-pull .card-head {
      background:#000d00 !important; border-bottom:1px solid rgba(0,255,65,.2) !important;
    }
    html[data-matrix="1"] .card-head * { color:#00ff41 !important; -webkit-text-fill-color:#00ff41 !important; }
    html[data-matrix="1"] .card-head-title { text-shadow:0 0 8px rgba(0,255,65,.55); }
    html[data-matrix="1"] .fw { background:#000800; border-color:rgba(0,255,65,.28); }
    html[data-matrix="1"] .fw:focus-within { border-color:#00ff41; box-shadow:0 0 0 3px rgba(0,255,65,.15); }
    html[data-matrix="1"] .cw { background:#000800; border-color:rgba(0,255,65,.18); }
    html[data-matrix="1"] .cw:focus-within { border-color:#00ff41; box-shadow:0 0 0 2px rgba(0,255,65,.15); }
    html[data-matrix="1"] thead th {
      background:#000d00 !important; color:#39ff14 !important;
      border-bottom:1px solid rgba(0,255,65,.3) !important; text-shadow:0 0 6px rgba(0,255,65,.5);
    }
    html[data-matrix="1"] tbody tr td { background:#000000 !important; }
    html[data-matrix="1"] tbody tr:nth-child(even) td { background:#000800 !important; }
    html[data-matrix="1"] tbody tr:hover td { background:#001400 !important; }
    html[data-matrix="1"] .action-row { background:#000800 !important; border-top-color:rgba(0,255,65,.2) !important; }
    html[data-matrix="1"] .btn-primary,
    html[data-matrix="1"] #btnAdd, html[data-matrix="1"] #btnDup,
    html[data-matrix="1"] #btnImport, html[data-matrix="1"] #btnPull {
      background:linear-gradient(135deg,#003310,#00ff41) !important; color:#000 !important;
      box-shadow:0 0 10px rgba(0,255,65,.35) !important;
    }
    html[data-matrix="1"] .btn-gold { background:linear-gradient(135deg,#225500,#39ff14) !important; color:#000 !important; box-shadow:0 0 10px rgba(57,255,20,.4) !important; animation:none !important; }
    html[data-matrix="1"] .btn-secondary { border-color:rgba(0,255,65,.3) !important; color:#00aa2a !important; background:rgba(0,20,0,.4) !important; }
    html[data-matrix="1"] .btn-danger { background:linear-gradient(135deg,#330011,#ff2244) !important; box-shadow:none !important; animation:none !important; }
    html[data-matrix="1"] .btn-success { background:linear-gradient(135deg,#003310,#00ff41) !important; color:#000 !important; }
    html[data-matrix="1"] .stat-row { border-bottom-color:rgba(0,255,65,.12) !important; }
    html[data-matrix="1"] .dot.ready { background:#00ff41 !important; box-shadow:0 0 7px rgba(0,255,65,.95) !important; }
    html[data-matrix="1"] .push-box { background:rgba(0,8,0,.97) !important; border-color:rgba(0,255,65,.35) !important; box-shadow:0 0 30px rgba(0,255,65,.2) !important; }
    html[data-matrix="1"] .push-box h3 { color:#00ff41 !important; }
    html[data-matrix="1"] .push-box p { color:#00aa2a !important; }
    html[data-matrix="1"] #push-overlay { background:rgba(0,0,0,.88) !important; }
    html[data-matrix="1"] .prog-fill { background:linear-gradient(90deg,#00ff41,#39ff14) !important; }
    html[data-matrix="1"] #toast.success { background:rgba(0,25,8,.95) !important; border-color:#00ff41 !important; color:#00ff41 !important; }
    html[data-matrix="1"] #toast.error   { background:rgba(25,0,8,.95) !important; border-color:#ff2244 !important; color:#ff2244 !important; }
    html[data-matrix="1"] #toast.info    { background:rgba(0,15,5,.95) !important; border-color:#00aa2a !important; color:#00aa2a !important; }
    html[data-matrix="1"] .matrix-toggle { background:rgba(0,20,0,.6) !important; border-color:rgba(0,255,65,.6) !important; color:#00ff41 !important; text-shadow:0 0 7px rgba(0,255,65,.8); box-shadow:0 0 10px rgba(0,255,65,.2) !important; }
    html[data-matrix="1"] .mt-dot { background:#00ff41 !important; box-shadow:0 0 7px rgba(0,255,65,.95) !important; }
    html[data-matrix="1"] .lbl { color:var(--ink-muted); text-shadow:0 0 4px rgba(0,255,65,.4); }
    html[data-matrix="1"] #matrixCanvas { display:block !important; }
    html[data-matrix="1"] #matrixCanvas { display:block !important; }

    /* ── Mobile card layout ────────────────────────────────────────────── */
    @media (max-width: 680px) {
      .tscroll { overflow-x:hidden; max-height:none; }
      table { min-width:0 !important; width:100%; }
      thead { display:none; }
      tbody tr {
        display:block;
        background:var(--bg-raised);
        border-radius:12px;
        border:1px solid var(--line-strong);
        margin-bottom:12px;
        padding:10px 10px 6px;
        box-shadow:var(--shadow-sm);
      }
      tbody tr td { display:block; width:100%; border:none; padding:4px 0; background:transparent !important; }
      tbody tr td[data-label]::before {
        content: attr(data-label);
        display:block;
        font-size:.63rem;
        font-weight:700;
        text-transform:uppercase;
        letter-spacing:.07em;
        color:var(--ink-faint);
        margin-bottom:3px;
      }
      tbody tr td[data-label=""] { display:flex; gap:8px; align-items:center; justify-content:space-between; padding-top:6px; }
      .ci { font-size:max(1rem,16px) !important; padding:9px 10px; min-height:40px; }
      .ci.date-ci { font-size:max(1rem,16px) !important; }
      .row-btns { justify-content:flex-start; }
      .ib { width:36px; height:36px; font-size:.85rem; }
      .push-ck { width:20px; height:20px; }
    }

    /* ── Bottom bar ────────────────────────────────────────────────────── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 90;
      background: var(--bg-raised);
      border-top: 1px solid var(--line-strong);
      padding: 12px 20px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 -2px 14px rgba(30,27,75,.10);
    }
    #matrixCanvas {
      display:none; position:fixed; top:0; left:0; width:100%; height:100%;
      z-index:0; opacity:0.15; pointer-events:none;
    }
    html[data-matrix="1"] #matrixCanvas { display:block !important; }
    .topbar, .page-wrap, #push-overlay, #toast, .bottom-bar { position:relative; z-index:2; }
    .topbar { position:sticky; z-index:100; }
    #rainbowBar { position:relative; z-index:2; }
    /* add padding so last row of table isn't hidden behind bottom-bar */
    .page-wrap { padding-bottom: 80px; }

    /* ══════════════════════════════════════════════════════════════════
       CALENDAR VIEW
       ══════════════════════════════════════════════════════════════════ */
    /* View-mode tabs in grid card-head */
    .cal-mode-bar { display:flex; gap:3px; flex-shrink:0; margin-left:4px; }
    .cal-tab {
      background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.18);
      border-radius:6px; color:rgba(224,231,255,.75); font:inherit;
      font-size:.66rem; font-weight:700; padding:3px 9px; cursor:pointer;
      transition:all .15s; letter-spacing:.04em; white-space:nowrap;
    }
    .cal-tab:hover { background:rgba(255,255,255,.20); color:#e0e7ff; }
    .cal-tab.active {
      background:rgba(255,255,255,.22); color:#fff;
      border-color:rgba(255,255,255,.50); box-shadow:0 1px 6px rgba(79,70,229,.30);
    }
    /* Calendar nav toolbar */
    .cal-toolbar {
      display:flex; align-items:center; gap:10px;
      padding:10px 16px; border-bottom:1px solid var(--line);
      background:var(--bg-sunken); flex-wrap:wrap;
    }
    .cal-nav {
      background:var(--bg-raised); border:1.5px solid var(--line-strong);
      border-radius:7px; color:var(--ink-muted); font:inherit;
      font-size:.78rem; font-weight:700; padding:5px 11px; cursor:pointer;
      transition:all .15s;
    }
    .cal-nav:hover { border-color:var(--accent); color:var(--accent); }
    .cal-today-btn {
      background:var(--accent-soft); border:1.5px solid var(--accent);
      border-radius:7px; color:var(--accent); font:inherit;
      font-size:.74rem; font-weight:700; padding:4px 10px; cursor:pointer;
    }
    .cal-period-label { font-weight:700; color:var(--ink); font-size:.9rem; min-width:170px; text-align:center; }

    /* Month view */
    .cal-month { overflow:auto; }
    .cal-month-header { display:grid; grid-template-columns:repeat(7,1fr); border-bottom:2px solid var(--line); }
    .cal-dow-hdr {
      text-align:center; font-size:.63rem; font-weight:800;
      text-transform:uppercase; letter-spacing:.08em;
      color:var(--ink-muted); padding:7px 0;
    }
    .cal-month-body { display:grid; grid-template-columns:repeat(7,1fr); }
    .cal-cell {
      min-height:78px; padding:5px 5px 3px;
      border-right:1px solid var(--line); border-bottom:1px solid var(--line);
      background:var(--bg-raised); overflow:hidden;
    }
    .cal-cell.other-month { background:var(--bg-sunken); opacity:.65; }
    .cal-cell.cal-today { background:rgba(79,70,229,.05); }
    .cal-month-body .cal-cell:nth-child(7n) { border-right:none; }
    .cal-day-num {
      display:inline-flex; align-items:center; justify-content:center;
      width:22px; height:22px; border-radius:50%;
      font-size:.72rem; font-weight:700; color:var(--ink-muted); margin-bottom:3px;
    }
    .cal-today .cal-day-num { background:var(--accent); color:#fff; }
    .cal-chip {
      display:block; padding:2px 5px; border-radius:4px;
      font-size:.63rem; font-weight:700; margin-bottom:2px;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
      cursor:pointer; background:var(--accent-soft); color:var(--accent);
      border:1px solid rgba(79,70,229,.20); transition:background .12s;
    }
    .cal-chip:hover { background:rgba(79,70,229,.20); }
    .cal-chip.has-preacher { background:rgba(5,150,105,.12); color:var(--success); border-color:rgba(5,150,105,.20); }
    .cal-chip.is-full { background:rgba(79,70,229,.15); color:var(--accent); border-color:var(--accent); }

    /* Week view */
    .cal-week { overflow-x:auto; }
    .cal-week-grid { display:grid; grid-template-columns:repeat(7,1fr); min-width:540px; }
    .cal-week-col-hdr {
      text-align:center; padding:8px 4px; font-size:.72rem; font-weight:700;
      border-bottom:2px solid var(--line); border-right:1px solid var(--line);
      background:var(--bg-sunken);
    }
    .cal-week-col-hdr:last-child { border-right:none; }
    .cal-week-col-hdr.cal-wk-today { background:rgba(79,70,229,.08); color:var(--accent); }
    .cal-week-body { display:grid; grid-template-columns:repeat(7,1fr); min-width:540px; }
    .cal-week-cell {
      min-height:110px; padding:6px; border-right:1px solid var(--line);
      border-bottom:1px solid var(--line); background:var(--bg-raised);
    }
    .cal-week-cell:last-child { border-right:none; }
    .cal-week-cell.cal-wk-today { background:rgba(79,70,229,.04); }

    /* Day view */
    .cal-day-body { padding:16px; }
    .cal-service-card {
      background:var(--bg-raised); border:1.5px solid var(--line-strong);
      border-radius:12px; padding:14px 16px; margin-bottom:12px;
      border-left:4px solid var(--accent);
    }
    .cal-service-card.is-full { border-left-color:var(--success); }
    .cal-service-card .sc-time { font-size:.74rem; font-weight:700; color:var(--accent); margin-bottom:6px; }
    .cal-service-card .sc-row { display:flex; gap:8px; margin-bottom:4px; font-size:.82rem; flex-wrap:wrap; }
    .cal-service-card .sc-label { color:var(--ink-muted); font-weight:700; min-width:80px; font-size:.74rem; flex-shrink:0; }
    .cal-empty { text-align:center; padding:40px 20px; color:var(--ink-muted); font-size:.84rem; }

    /* Agenda view */
    .cal-agenda { padding:12px 16px; }
    .cal-agenda-group { margin-bottom:18px; }
    .cal-agenda-month-lbl {
      font-size:.70rem; font-weight:800; text-transform:uppercase; letter-spacing:.1em;
      color:var(--ink-muted); margin-bottom:8px; padding-bottom:4px;
      border-bottom:2px solid var(--line);
    }
    .cal-agenda-item {
      display:flex; gap:12px; align-items:flex-start; padding:10px 12px;
      border-radius:10px; border:1px solid var(--line-strong);
      background:var(--bg-raised); margin-bottom:6px; cursor:pointer;
      transition:all .14s;
    }
    .cal-agenda-item:hover { border-color:var(--accent); background:var(--accent-soft); }
    .cal-agenda-item.is-full { border-left:3px solid var(--success); }
    .cal-agenda-date { text-align:center; min-width:42px; flex-shrink:0; }
    .cal-agenda-date .ad-dow { font-size:.62rem; font-weight:800; text-transform:uppercase; color:var(--accent); }
    .cal-agenda-date .ad-day { font-size:1.3rem; font-weight:800; color:var(--ink); line-height:1; }
    .cal-agenda-date .ad-mon { font-size:.62rem; font-weight:700; color:var(--ink-muted); }
    .cal-agenda-info { flex:1; min-width:0; }
    .cal-agenda-info .ai-time { font-size:.72rem; font-weight:700; color:var(--accent); }
    .cal-agenda-info .ai-title { font-size:.84rem; font-weight:700; color:var(--ink); }
    .cal-agenda-info .ai-sub { font-size:.75rem; color:var(--ink-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* Matrix overrides for calendar */
    html[data-matrix="1"] .cal-nav { background:rgba(0,20,0,.5) !important; border-color:rgba(0,255,65,.3) !important; color:#00aa2a !important; }
    html[data-matrix="1"] .cal-nav:hover { border-color:#00ff41 !important; color:#00ff41 !important; }
    html[data-matrix="1"] .cal-today-btn { background:rgba(0,255,65,.12) !important; border-color:#00ff41 !important; color:#00ff41 !important; }
    html[data-matrix="1"] .cal-cell, html[data-matrix="1"] .cal-week-cell { background:var(--bg-raised) !important; }
    html[data-matrix="1"] .cal-cell.other-month, html[data-matrix="1"] .cal-week-cell { background:var(--bg-sunken) !important; }
    html[data-matrix="1"] .cal-chip { background:rgba(0,255,65,.12) !important; color:#00ff41 !important; border-color:rgba(0,255,65,.25) !important; }
    html[data-matrix="1"] .cal-service-card { border-color:rgba(0,255,65,.25) !important; border-left-color:#00ff41 !important; background:var(--bg-raised) !important; }
    html[data-matrix="1"] .cal-agenda-item { border-color:rgba(0,255,65,.18) !important; background:var(--bg-raised) !important; }
    html[data-matrix="1"] .cal-agenda-item:hover { background:rgba(0,255,65,.07) !important; border-color:#00ff41 !important; }
    html[data-matrix="1"] .cal-toolbar { background:var(--bg-sunken) !important; border-color:rgba(0,255,65,.18) !important; }
    html[data-matrix="1"] .cal-dow-hdr, html[data-matrix="1"] .cal-week-col-hdr { background:var(--bg-sunken) !important; }
  </style>
</head>
<body>

  <!-- Matrix rain canvas (hidden until matrix mode activated) -->
  <canvas id="matrixCanvas"></canvas>

  <!-- Animated rainbow bar (disappears on scroll) -->
  <div id="rainbowBar"></div>

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-brand">FlockOS <span>Worship Planning</span></div>
    <span class="topbar-sep">›</span>
    <span class="topbar-title">Quarterly Planner</span>
    <div class="topbar-spacer"></div>
    <div class="sync-pill">
      <span class="dot" id="sDot"></span>
      <span id="sMsg">Loading…</span>
    </div>
    <button class="btn-save-close" id="btnSaveCloseTop">✓ Save &amp; Close</button>
    <button class="matrix-toggle" id="matrixToggle" title="Toggle matrix mode"><span class="mt-dot"></span>MATRIX</button>
  </div>

  <!-- Page layout -->
  <div class="page-wrap">

      <!-- Setup card -->
      <div class="card c-setup">
        <div class="card-head">
          <div class="qnav-group">
            <button class="qnav" id="btnPrevQ" title="Previous quarter">◀</button>
            <span class="card-head-title">⛪ Quarterly Worship Schedule</span>
            <button class="qnav" id="btnNextQ" title="Next quarter">▶</button>
            <span class="qnav-label" id="qNavLabel"></span>
          </div>
          <div style="display:flex;align-items:center;gap:12px;font-size:.72rem;color:rgba(224,231,255,.7);">
            <span><strong id="smTotal" style="color:#e0e7ff;">0</strong> Sun</span>
            <span><strong id="smPreach" style="color:#e0e7ff;">0</strong> Preach</span>
            <span><strong id="smWorship" style="color:#e0e7ff;">0</strong> Worship</span>
            <span><strong id="smFull" style="color:#a5f3ae;">0</strong> Full</span>
            <span><strong id="smPushed" style="color:#fde68a;">0</strong> Synced</span>
          </div>
        </div>
        <div class="card-body">
          <div class="controls">
            <div>
              <label class="lbl" for="qQ">Quarter</label>
              <div class="fw"><select id="qQ" class="fs">
                <option value="Q1">Q1 — Jan / Feb / Mar</option>
                <option value="Q2">Q2 — Apr / May / Jun</option>
                <option value="Q3">Q3 — Jul / Aug / Sep</option>
                <option value="Q4">Q4 — Oct / Nov / Dec</option>
              </select></div>
            </div>
            <div>
              <label class="lbl" for="qY">Year</label>
              <div class="fw"><input id="qY" class="fi" type="number" min="2020" max="2100" value="2026"></div>
            </div>
            <div>
              <label class="lbl" for="qFS">First Sunday</label>
              <div class="fw"><input id="qFS" class="fi" type="date" title="Pick the first Sunday of your quarter — all other Sundays auto-populate weekly from this date"></div>
            </div>
            <div>
              <label class="lbl" for="qST">Service Type</label>
              <div class="fw"><select id="qST" class="fs">
                <option value="Sunday AM">Sunday AM</option>
                <option value="Sunday PM">Sunday PM</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Special">Special</option>
                <option value="Good Friday">Good Friday</option>
                <option value="Easter">Easter</option>
                <option value="Christmas">Christmas</option>
              </select></div>
            </div>
          </div>
        </div>
        <div class="action-row">
          <button class="btn btn-primary" id="btnGen" title="Generate Sunday dates for the selected quarter">⟳ Generate</button>
          <button class="btn btn-secondary" id="btnAdd" title="Add a blank row">+ Row</button>
          <button class="btn btn-secondary" id="btnDup" title="Duplicate the last row">⧉ Dup</button>
          <button class="btn btn-danger" id="btnReset" title="Clear all rows">✕</button>
          <span class="divider"></span>
          <button class="btn btn-save" id="btnSave" title="Save to cloud">💾 Save</button>
          <button class="btn btn-secondary" id="btnImport" title="Import from CSV/XLSX file">📥 Import</button>
          <button class="btn btn-secondary" id="btnExportDrive" title="Export as CSV or to Google Drive">📤 Export</button>
          <span class="divider"></span>
          <button class="btn btn-secondary" id="btnPull" title="Pull service plans into this grid">⬇ Pull</button>
          <button class="btn btn-primary" id="btnPush" title="Push selected rows to service plans">⬆ Push</button>
          <input type="file" id="importFile" accept=".csv,.tsv,.txt,.xlsx,.xls" style="display:none">
          <!-- hidden controls preserved for JS -->
          <select id="optDup" style="display:none;"><option value="update">Update existing</option><option value="skip">Skip</option></select>
          <select id="optPullMerge" style="display:none;"><option value="fill">Fill blanks only</option><option value="overwrite">Overwrite all fields</option><option value="skip">Skip</option></select>
          <p id="fbNote" style="display:none;"></p>
          <p id="pullNote" style="display:none;"></p>
        </div>
      </div>

      <!-- Grid card -->
      <div class="card c-grid">
        <div class="card-head" style="flex-direction:column;align-items:flex-start;gap:8px;">
          <!-- Row 1: title + row count + calendar tabs -->
          <div style="display:flex;align-items:center;gap:8px;width:100%;flex-wrap:wrap;">
            <span class="card-head-title">Schedule Grid</span>
            <span style="font-size:.78rem;color:rgba(224,231,255,.6);"><span id="rowCt">0</span> Sundays</span>
            <div style="margin-left:auto;">
              <!-- Calendar view mode tabs -->
              <div class="cal-mode-bar" id="calModeBar">
                <button class="cal-tab active" data-mode="grid" title="Spreadsheet grid view">≡ Grid</button>
                <button class="cal-tab" data-mode="month" title="Month calendar">Month</button>
                <button class="cal-tab" data-mode="week" title="Week calendar">Week</button>
                <button class="cal-tab" data-mode="day" title="Day view">Day</button>
                <button class="cal-tab" data-mode="agenda" title="Agenda list">Agenda</button>
              </div>
            </div>
          </div>
          <!-- Row 2: day-of-week filters (only shown in grid mode) -->
          <div class="dow-filters" id="dowFilters" style="margin-left:0;">
            <button type="button" class="dow-tick active" data-dow="-1">All</button>
            <button type="button" class="dow-tick" data-dow="0">Sun</button>
            <button type="button" class="dow-tick" data-dow="1">Mon</button>
            <button type="button" class="dow-tick" data-dow="2">Tue</button>
            <button type="button" class="dow-tick" data-dow="3">Wed</button>
            <button type="button" class="dow-tick" data-dow="4">Thu</button>
            <button type="button" class="dow-tick" data-dow="5">Fri</button>
            <button type="button" class="dow-tick" data-dow="6">Sat</button>
          </div>
        </div>
        <div class="tscroll" id="gridTscroll">
          <table>
            <thead><tr>
              <th style="min-width:130px;width:130px;">Date</th>
              <th style="min-width:100px;width:100px;">Time</th>
              <th style="min-width:110px;">Psalm</th>
              <th style="min-width:130px;">Worship</th>
              <th style="min-width:130px;">Announce</th>
              <th style="min-width:130px;">Prayer</th>
              <th style="min-width:130px;">Preacher</th>
              <th style="min-width:150px;">Scripture</th>
              <th style="min-width:100px;">Proverb</th>
              <th style="min-width:150px;">Theme</th>
              <th style="min-width:36px;width:36px;text-align:center;"><input type="checkbox" class="push-ck" id="ckAll" title="Select / deselect all for push"></th>
              <th style="min-width:50px;width:50px;"></th>
            </tr></thead>
            <tbody id="gridBody"></tbody>
          </table>
        </div>
        <!-- Calendar View container (hidden when grid is active) -->
        <div id="calView" style="display:none;"></div>
      </div>

  </div><!-- /page-wrap -->

  <!-- Push overlay -->
  <div id="push-overlay">
    <div class="push-box">
      <h3 id="po-title">Pushing to Service Plans…</h3>
      <p id="po-sub">Writing records to Firestore.</p>
      <div class="prog-track"><div class="prog-fill" id="po-prog" style="width:0%"></div></div>
      <div class="push-log" id="po-log"></div>
      <button class="btn btn-secondary" id="po-close" style="margin-top:16px;display:none;">Done</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Bottom save bar -->
  <div class="bottom-bar">
    <button class="btn-save-close" id="btnSaveCloseBot" style="padding:10px 32px;font-size:.88rem;">✓ Save &amp; Close</button>
  </div>

  <script>
  /* ============================================================
     QuarterlyWorship — FlockOS Quarterly Worship Planner
     Builds per-Sunday rows; auto-generates dates from first Sunday or
     standard quarter; pushes to UpperRoom.createServicePlan / updateServicePlan.
  ============================================================ */
  if (typeof Adornment !== 'undefined') Adornment.init();
  if (typeof Nehemiah !== 'undefined') Nehemiah.guard();
  (function () {
    'use strict';

    /* ── Firebase — use dashboard session (promise-based) ────────────── */
    var _fbReady = false;
    function isFB() {
      return _fbReady || (typeof UpperRoom !== 'undefined' &&
             typeof UpperRoom.isReady === 'function' && UpperRoom.isReady());
    }
    function ensureFB() {
      if (isFB()) { _fbReady = true; return Promise.resolve(); }
      if (typeof UpperRoom === 'undefined') return Promise.reject(new Error('UpperRoom not loaded'));
      return UpperRoom.authenticate().then(function() { _fbReady = true; });
    }

    /* ── UI helpers ──────────────────────────────────────────────────── */
    function toast(msg, type, dur) {
      var el = document.getElementById('toast');
      el.textContent = msg; el.className = type || 'info'; el.style.display = 'block';
      clearTimeout(el._t); el._t = setTimeout(function () { el.style.display = 'none'; }, dur || 3200);
    }
    function setStatus(cls, msg) {
      document.getElementById('sDot').className = 'dot ' + (cls || '');
      document.getElementById('sMsg').textContent = msg || 'Ready';
    }
    function uid() {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
      return 'r' + Date.now() + '_' + Math.random().toString(36).slice(2);
    }
    function isoDate(d) {
      var m = d.getMonth() + 1, day = d.getDate();
      return d.getFullYear() + '-' + (m < 10 ? '0' : '') + m + '-' + (day < 10 ? '0' : '') + day;
    }
    function friendlyDate(iso) {
      if (!iso) return '';
      var p = iso.split('-').map(Number);
      return new Date(p[0], p[1] - 1, p[2]).toLocaleDateString(undefined,
        { weekday:'short', month:'short', day:'numeric', year:'numeric' });
    }

    /* ── State ───────────────────────────────────────────────────────── */
    var S = { rows: [], importedIds: {}, dirty: false, saveTimer: null };
    var FIELDS = ['serviceTime','psalm','worship','announce','prayer','preacher','scripture','proverb','notes'];

    function mkRow(date) {
      var r = { id: uid(), date: date || '' };
      FIELDS.forEach(function (f) { r[f] = ''; });
      return r;
    }

    /* ── Sunday generation ───────────────────────────────────────────── */
    function qMonths(q) {
      return { Q1:[0,1,2], Q2:[3,4,5], Q3:[6,7,8], Q4:[9,10,11] }[q] || [0,1,2];
    }
    function quarterSundays(year, q) {
      var months = qMonths(q), dates = [];
      months.forEach(function (m) {
        var d = new Date(year, m, 1);
        while (d.getDay() !== 0) d.setDate(d.getDate() + 1);
        while (d.getMonth() === m) { dates.push(isoDate(d)); d.setDate(d.getDate() + 7); }
      });
      return dates;
    }
    function sundaysFromFirst(firstIso, year, q) {
      // Build weekly Sundays starting from firstIso through end of last month in quarter
      var p = firstIso.split('-').map(Number);
      var cursor = new Date(p[0], p[1] - 1, p[2]);
      var months = qMonths(q);
      var endM = months[months.length - 1];
      var endDate = new Date(year, endM + 1, 0); // last day of last quarter month
      var dates = [];
      while (cursor <= endDate) { dates.push(isoDate(cursor)); cursor.setDate(cursor.getDate() + 7); }
      return dates;
    }

    /* ── Render ──────────────────────────────────────────────────────── */
    var PLACEHOLDERS = {
      serviceTime:'', psalm:'Psalm 95…', worship:'Volunteer name', announce:'Volunteer name',
      prayer:'Volunteer name', preacher:'Volunteer name', scripture:'John 3:16',
      proverb:'Proverbs 3…', notes:'Theme / notes'
    };
    var FIELD_TYPES = { serviceTime: 'time' };

    /* ── Day-of-week filter ────────────────────────────────────────── */
    var _dowFilter = -1; // -1 = All
    (function initDowFilters() {
      document.getElementById('dowFilters').addEventListener('click', function(e) {
        var btn = e.target.closest('.dow-tick');
        if (!btn) return;
        _dowFilter = parseInt(btn.dataset.dow, 10);
        document.querySelectorAll('#dowFilters .dow-tick').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        render();
      });
    })();

    function render() {
      var tbody = document.getElementById('gridBody');
      tbody.innerHTML = '';

      var visibleCount = 0;
      S.rows.forEach(function (row) {
        /* Day-of-week filter */
        if (_dowFilter !== -1 && row.date) {
          var dp = row.date.split('-').map(Number);
          var dayOfWeek = new Date(dp[0], dp[1] - 1, dp[2]).getDay();
          if (dayOfWeek !== _dowFilter) return;
        }
        if (_dowFilter !== -1 && !row.date) return; /* hide dateless rows when filtering */
        visibleCount++;
        var tr = document.createElement('tr');
        tr.dataset.id = row.id;

        /* Date cell */
        var dtd = document.createElement('td');
        dtd.dataset.label = 'Date';
        var dw  = document.createElement('div'); dw.className = 'cw';
        var di  = document.createElement('input');
        di.type = 'date'; di.className = 'ci date-ci'; di.value = row.date || '';
        di.addEventListener('change', function (e) {
          var r = rowById(e.target.closest('tr').dataset.id);
          if (r) { r.date = e.target.value; updateSummary(); markDirty(); }
        });
        dw.appendChild(di); dtd.appendChild(dw); tr.appendChild(dtd);

        /* Data field cells */
        var FIELD_LABELS = { serviceTime:'Time', psalm:'Psalm', worship:'Worship Leader', announce:'Announcements', prayer:'Prayer', preacher:'Preacher', scripture:'Scripture', proverb:'Proverb', notes:'Theme / Notes' };
        FIELDS.forEach(function (key) {
          var td = document.createElement('td');
          td.dataset.label = FIELD_LABELS[key] || key;
          var w  = document.createElement('div'); w.className = 'cw';
          var inp = document.createElement('input');
          inp.type = FIELD_TYPES[key] || 'text'; inp.className = 'ci'; inp.placeholder = PLACEHOLDERS[key] || '';
          inp.value = row[key] || '';
          inp.addEventListener('input', function (e) {
            var r = rowById(e.target.closest('tr').dataset.id);
            if (r) {
              /* Sanitize: strip HTML tags to prevent XSS */
              r[key] = e.target.value.replace(/<[^>]*>/g, '');
              updateSummary(); markDirty();
            }
          });
          w.appendChild(inp); td.appendChild(w); tr.appendChild(td);
        });

        /* Actions */
        var atd = document.createElement('td');
        atd.dataset.label = '';
        var rb  = document.createElement('div'); rb.className = 'row-btns';

        /* imported check */
        if (S.importedIds[row.id]) {
          var ck = document.createElement('button');
          ck.className = 'ib imp'; ck.title = 'Pushed — plan ' + S.importedIds[row.id]; ck.textContent = '✓';
          rb.appendChild(ck);
        }

        var db = document.createElement('button');
        db.type = 'button'; db.className = 'ib'; db.title = 'Duplicate'; db.textContent = '⧉';
        db.addEventListener('click', function () { dupRow(row.id); });
        rb.appendChild(db);

        var xb = document.createElement('button');
        xb.type = 'button'; xb.className = 'ib del'; xb.title = 'Delete'; xb.textContent = '✕';
        xb.addEventListener('click', function () { delRow(row.id); });
        rb.appendChild(xb);

        /* Push checkbox */
        var pktd = document.createElement('td'); pktd.style.textAlign = 'center';
        pktd.dataset.label = '';
        var pk = document.createElement('input');
        pk.type = 'checkbox'; pk.className = 'push-ck'; pk.dataset.id = row.id;
        pk.title = 'Select for push';
        if (row.date) pk.checked = true; /* default: check rows that have dates */
        pktd.appendChild(pk);
        tr.appendChild(pktd);

        atd.appendChild(rb); tr.appendChild(atd);
        tbody.appendChild(tr);
      });

      document.getElementById('rowCt').textContent = _dowFilter === -1 ? S.rows.length : visibleCount + '/' + S.rows.length;
      updateSummary();
    }

    /* ══════════════════════════════════════════════════════════════════
       CALENDAR VIEW  — Month / Week / Day / Agenda
       ══════════════════════════════════════════════════════════════════ */
    var _calMode = 'grid';  // 'grid'|'month'|'week'|'day'|'agenda'
    var _calDate = new Date();

    var _CAL_MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var _CAL_MONTHS_LONG  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    var _CAL_DAYS_SHORT   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    function _calIso(d) {
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }
    function _calTodayIso() { return _calIso(new Date()); }
    function _calRowsByDate() {
      var m = {};
      S.rows.forEach(function(r) { if (r.date) { if (!m[r.date]) m[r.date]=[]; m[r.date].push(r); } });
      return m;
    }
    function _calSortedRows() {
      return S.rows.filter(function(r){ return r.date; }).sort(function(a,b){ return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; });
    }
    function _calEsc(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function switchCalMode(mode) {
      _calMode = mode;
      document.querySelectorAll('.cal-tab').forEach(function(b){ b.classList.toggle('active', b.dataset.mode === mode); });
      var tscroll  = document.getElementById('gridTscroll');
      var actionRow = document.querySelector('.c-grid .action-row');
      var dowFilters = document.getElementById('dowFilters');
      var calView  = document.getElementById('calView');
      var isGrid   = (mode === 'grid');
      tscroll.style.display   = isGrid ? '' : 'none';
      if (actionRow) actionRow.style.display = isGrid ? '' : 'none';
      dowFilters.style.display = isGrid ? '' : 'none';
      calView.style.display   = isGrid ? 'none' : '';
      if (isGrid) { render(); } else { renderCalView(); }
    }

    function renderCalView() {
      var el = document.getElementById('calView');
      if (!el || _calMode === 'grid') return;
      if      (_calMode === 'month')  _calRenderMonth(el);
      else if (_calMode === 'week')   _calRenderWeek(el);
      else if (_calMode === 'day')    _calRenderDay(el);
      else if (_calMode === 'agenda') _calRenderAgenda(el);
    }

    function _calNavBar(label, prevFn, nextFn) {
      var bar = document.createElement('div'); bar.className = 'cal-toolbar';
      var prev = document.createElement('button'); prev.className = 'cal-nav'; prev.textContent = '◀'; prev.title = 'Previous';
      prev.addEventListener('click', function(){ prevFn(); renderCalView(); });
      var today = document.createElement('button'); today.className = 'cal-today-btn'; today.textContent = 'Today';
      today.addEventListener('click', function(){ _calDate = new Date(); renderCalView(); });
      var lbl = document.createElement('span'); lbl.className = 'cal-period-label'; lbl.textContent = label;
      var next = document.createElement('button'); next.className = 'cal-nav'; next.textContent = '▶'; next.title = 'Next';
      next.addEventListener('click', function(){ nextFn(); renderCalView(); });
      bar.appendChild(prev); bar.appendChild(today); bar.appendChild(lbl); bar.appendChild(next);
      return bar;
    }

    /* ── MONTH ───────────────────────────────────────────────────────── */
    function _calRenderMonth(el) {
      el.innerHTML = '';
      var y = _calDate.getFullYear(), m = _calDate.getMonth();
      el.appendChild(_calNavBar(
        _CAL_MONTHS_LONG[m] + ' ' + y,
        function(){ _calDate = new Date(y, m-1, 1); },
        function(){ _calDate = new Date(y, m+1, 1); }
      ));

      var wrap = document.createElement('div'); wrap.className = 'cal-month';
      var hdrRow = document.createElement('div'); hdrRow.className = 'cal-month-header';
      _CAL_DAYS_SHORT.forEach(function(d){ var h = document.createElement('div'); h.className='cal-dow-hdr'; h.textContent=d; hdrRow.appendChild(h); });
      wrap.appendChild(hdrRow);

      var body = document.createElement('div'); body.className = 'cal-month-body';
      var firstDow    = new Date(y, m, 1).getDay();
      var daysInMonth = new Date(y, m+1, 0).getDate();
      var daysInPrev  = new Date(y, m, 0).getDate();
      var byDate      = _calRowsByDate();
      var todayIso    = _calTodayIso();

      // Leading filler (prev month)
      for (var i = firstDow-1; i >= 0; i--) {
        var c = document.createElement('div'); c.className = 'cal-cell other-month';
        var n = document.createElement('span'); n.className = 'cal-day-num'; n.textContent = daysInPrev - i;
        c.appendChild(n); body.appendChild(c);
      }
      // Current month days
      for (var d = 1; d <= daysInMonth; d++) {
        var iso = y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
        var c = document.createElement('div');
        c.className = 'cal-cell' + (iso === todayIso ? ' cal-today' : '');
        var n = document.createElement('span'); n.className = 'cal-day-num'; n.textContent = d;
        c.appendChild(n);
        if (byDate[iso]) {
          byDate[iso].forEach(function(row) {
            var isFull = row.worship.trim() && row.preacher.trim() && row.scripture.trim();
            var chip = document.createElement('span');
            chip.className = 'cal-chip' + (isFull ? ' is-full' : row.preacher.trim() ? ' has-preacher' : '');
            var label = row.preacher || row.worship || row.notes || row.serviceTime || 'Service';
            chip.textContent = label.length > 14 ? label.slice(0,13)+'…' : label;
            chip.title = [row.serviceTime, row.preacher, row.worship, row.scripture].filter(Boolean).join(' · ');
            (function(cellIso){ chip.addEventListener('click', function(e){ e.stopPropagation(); _calDate = new Date(cellIso+'T00:00:00'); switchCalMode('day'); }); })(iso);
            c.appendChild(chip);
          });
        }
        body.appendChild(c);
      }
      // Trailing filler
      var total = firstDow + daysInMonth;
      var trail = total % 7 === 0 ? 0 : 7 - (total % 7);
      for (var t = 1; t <= trail; t++) {
        var c = document.createElement('div'); c.className = 'cal-cell other-month';
        var n = document.createElement('span'); n.className = 'cal-day-num'; n.textContent = t;
        c.appendChild(n); body.appendChild(c);
      }
      wrap.appendChild(body); el.appendChild(wrap);
    }

    /* ── WEEK ────────────────────────────────────────────────────────── */
    function _calRenderWeek(el) {
      el.innerHTML = '';
      var sow = new Date(_calDate);
      sow.setDate(_calDate.getDate() - _calDate.getDay()); sow.setHours(0,0,0,0);
      var eow = new Date(sow); eow.setDate(sow.getDate()+6);
      var lbl = _CAL_MONTHS_SHORT[sow.getMonth()] + ' ' + sow.getDate() + ' – ' +
                (sow.getMonth()!==eow.getMonth() ? _CAL_MONTHS_SHORT[eow.getMonth()]+' ' : '') +
                eow.getDate() + ', ' + eow.getFullYear();
      el.appendChild(_calNavBar(lbl,
        function(){ _calDate = new Date(_calDate); _calDate.setDate(_calDate.getDate()-7); },
        function(){ _calDate = new Date(_calDate); _calDate.setDate(_calDate.getDate()+7); }
      ));

      var byDate   = _calRowsByDate();
      var todayIso = _calTodayIso();
      var wrap     = document.createElement('div'); wrap.className = 'cal-week';
      var hdrGrid  = document.createElement('div'); hdrGrid.className = 'cal-week-grid';
      var bodyGrid = document.createElement('div'); bodyGrid.className = 'cal-week-body';

      for (var i = 0; i < 7; i++) {
        var day = new Date(sow); day.setDate(sow.getDate()+i);
        var iso = _calIso(day);
        var isToday = (iso === todayIso);

        var hdr = document.createElement('div');
        hdr.className = 'cal-week-col-hdr' + (isToday ? ' cal-wk-today' : '');
        hdr.innerHTML = '<div style="font-size:.60rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);">' + _CAL_DAYS_SHORT[day.getDay()] + '</div>' +
                        '<div style="font-size:1.05rem;font-weight:800;line-height:1.1;">' + day.getDate() + '</div>' +
                        '<div style="font-size:.60rem;color:var(--ink-faint);">' + _CAL_MONTHS_SHORT[day.getMonth()] + '</div>';
        hdrGrid.appendChild(hdr);

        var cell = document.createElement('div');
        cell.className = 'cal-week-cell' + (isToday ? ' cal-wk-today' : '');
        if (byDate[iso]) {
          byDate[iso].forEach(function(row){ cell.appendChild(_calServiceCard(row, true)); });
        }
        bodyGrid.appendChild(cell);
      }
      wrap.appendChild(hdrGrid); wrap.appendChild(bodyGrid); el.appendChild(wrap);
    }

    /* ── DAY ─────────────────────────────────────────────────────────── */
    function _calRenderDay(el) {
      el.innerHTML = '';
      var iso     = _calIso(_calDate);
      var dayLbl  = _calDate.toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric', year:'numeric' });
      el.appendChild(_calNavBar(dayLbl,
        function(){ _calDate = new Date(_calDate); _calDate.setDate(_calDate.getDate()-1); },
        function(){ _calDate = new Date(_calDate); _calDate.setDate(_calDate.getDate()+1); }
      ));
      var body   = document.createElement('div'); body.className = 'cal-day-body';
      var rows   = (_calRowsByDate()[iso] || []);
      if (!rows.length) {
        var empty = document.createElement('div'); empty.className = 'cal-empty';
        empty.innerHTML = '<div style="font-size:2rem;margin-bottom:8px;">📅</div>No services scheduled for this day.';
        body.appendChild(empty);
      } else {
        rows.forEach(function(row){ body.appendChild(_calServiceCard(row, false)); });
      }
      el.appendChild(body);
    }

    /* ── AGENDA ──────────────────────────────────────────────────────── */
    function _calRenderAgenda(el) {
      el.innerHTML = '';
      var bar = document.createElement('div'); bar.className = 'cal-toolbar';
      bar.innerHTML = '<span style="font-weight:700;color:var(--ink);">All Services — Agenda</span>' +
        '<span style="font-size:.76rem;color:var(--ink-muted);margin-left:auto;">' +
        S.rows.filter(function(r){return r.date;}).length + ' scheduled</span>';
      el.appendChild(bar);

      var sorted = _calSortedRows();
      if (!sorted.length) {
        var empty = document.createElement('div'); empty.className = 'cal-empty'; empty.style.padding = '40px';
        empty.innerHTML = '<div style="font-size:2rem;margin-bottom:8px;">📋</div>No services with dates yet. Generate or add rows in Grid view.';
        el.appendChild(empty); return;
      }

      var wrap = document.createElement('div'); wrap.className = 'cal-agenda';
      var byMonth = {};
      sorted.forEach(function(row){
        var key = row.date.slice(0,7);
        if (!byMonth[key]) byMonth[key] = [];
        byMonth[key].push(row);
      });

      Object.keys(byMonth).sort().forEach(function(key){
        var parts = key.split('-');
        var group = document.createElement('div'); group.className = 'cal-agenda-group';
        var lbl = document.createElement('div'); lbl.className = 'cal-agenda-month-lbl';
        lbl.textContent = _CAL_MONTHS_LONG[parseInt(parts[1],10)-1] + ' ' + parts[0];
        group.appendChild(lbl);

        byMonth[key].forEach(function(row){
          var dp = row.date.split('-').map(Number);
          var d  = new Date(dp[0], dp[1]-1, dp[2]);
          var isFull = row.worship.trim() && row.preacher.trim() && row.scripture.trim();
          var item = document.createElement('div');
          item.className = 'cal-agenda-item' + (isFull ? ' is-full' : '');
          item.title = 'Click to view day';
          (function(r){ item.addEventListener('click', function(){ _calDate = new Date(r.date+'T00:00:00'); switchCalMode('day'); }); })(row);

          var dateDiv = document.createElement('div'); dateDiv.className = 'cal-agenda-date';
          dateDiv.innerHTML = '<div class="ad-dow">' + _CAL_DAYS_SHORT[d.getDay()] + '</div>' +
                              '<div class="ad-day">' + dp[2] + '</div>' +
                              '<div class="ad-mon">' + _CAL_MONTHS_SHORT[dp[1]-1] + '</div>';
          var infoDiv = document.createElement('div'); infoDiv.className = 'cal-agenda-info';
          var title   = row.notes || (row.preacher ? 'Message by ' + row.preacher : row.worship ? 'Worship: ' + row.worship : 'Service');
          var sub     = [row.preacher && ('🎤 '+row.preacher), row.worship && ('🎵 '+row.worship), row.scripture && ('📖 '+row.scripture)].filter(Boolean).join('  ·  ');
          infoDiv.innerHTML = (row.serviceTime ? '<div class="ai-time">⏰ ' + _calEsc(row.serviceTime) + '</div>' : '') +
                              '<div class="ai-title">' + _calEsc(title) + '</div>' +
                              (sub ? '<div class="ai-sub">' + _calEsc(sub) + '</div>' : '');
          item.appendChild(dateDiv); item.appendChild(infoDiv);
          group.appendChild(item);
        });
        wrap.appendChild(group);
      });
      el.appendChild(wrap);
    }

    /* ── Service card (week & day views) ─────────────────────────────── */
    function _calServiceCard(row, compact) {
      var isFull = row.worship.trim() && row.preacher.trim() && row.scripture.trim();
      var card = document.createElement('div');
      card.className = 'cal-service-card' + (isFull ? ' is-full' : '');
      if (row.serviceTime) {
        var td = document.createElement('div'); td.className = 'sc-time'; td.textContent = '⏰ ' + row.serviceTime;
        card.appendChild(td);
      }
      if (compact) {
        var p = document.createElement('div');
        p.style.cssText = 'font-size:.72rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink);';
        p.textContent = [row.preacher, row.worship, row.scripture||row.notes].filter(Boolean).join(' · ') || 'Service';
        card.appendChild(p);
      } else {
        var fields = [
          {l:'Preacher',  v:row.preacher},  {l:'Scripture', v:row.scripture},
          {l:'Worship',   v:row.worship},   {l:'Prayer',    v:row.prayer},
          {l:'Psalm',     v:row.psalm},     {l:'Proverb',   v:row.proverb},
          {l:'Announce',  v:row.announce},  {l:'Theme',     v:row.notes}
        ];
        fields.forEach(function(f){
          if (!f.v || !f.v.trim()) return;
          var r = document.createElement('div'); r.className = 'sc-row';
          r.innerHTML = '<span class="sc-label">' + f.l + '</span><span>' + _calEsc(f.v) + '</span>';
          card.appendChild(r);
        });
      }
      return card;
    }

    /* ── Wire up view-mode tab bar ───────────────────────────────────── */
    document.getElementById('calModeBar').addEventListener('click', function(e){
      var btn = e.target.closest('.cal-tab');
      if (!btn) return;
      // Seed cal date from first data row if calDate is still "today" and rows exist
      if (_calMode === 'grid' && S.rows.length && S.rows[0].date) {
        var fp = S.rows[0].date.split('-').map(Number);
        _calDate = new Date(fp[0], fp[1]-1, fp[2]);
      }
      switchCalMode(btn.dataset.mode);
    });

    function rowById(id) { return S.rows.find(function (r) { return r.id === id; }) || null; }

    /* ── Row ops ─────────────────────────────────────────────────────── */
    function addRow(date) { S.rows.push(mkRow(date || '')); render(); markDirty(); }
    function delRow(id) {
      if (!confirm('Remove this row?')) return;
      S.rows = S.rows.filter(function (r) { return r.id !== id; });
      render(); markDirty();
    }
    function dupRow(id) {
      var src = rowById(id); if (!src) return;
      var copy = mkRow(src.date);
      FIELDS.forEach(function (f) { copy[f] = src[f]; });
      S.rows.splice(S.rows.indexOf(src) + 1, 0, copy);
      render(); markDirty();
    }
    function dupLast() {
      if (!S.rows.length) { addRow(); return; }
      dupRow(S.rows[S.rows.length - 1].id);
    }

    /* ── Generate ────────────────────────────────────────────────────── */
    function generate(silent) {
      var q    = document.getElementById('qQ').value;
      var year = parseInt(document.getElementById('qY').value, 10) || new Date().getFullYear();
      var first = document.getElementById('qFS').value;

      var sundays;
      if (first) {
        var d = new Date(first + 'T00:00:00');
        if (d.getDay() !== 0) {
          toast('That date is not a Sunday (' + ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()] + '). Pick a Sunday.', 'error');
          return;
        }
        sundays = sundaysFromFirst(first, year, q);
      } else {
        sundays = quarterSundays(year, q);
      }

      S.rows = sundays.map(function (iso) { return mkRow(iso); });
      S.importedIds = {};
      render();
      if (!silent) {
        markDirty();
        toast('Generated ' + S.rows.length + ' Sundays for ' + q + ' ' + year, 'success');
      }
    }

    /* ── Quarter navigation ──────────────────────────────────────────── */
    var QLIST = ['Q1','Q2','Q3','Q4'];
    function updateQNavLabel() {
      var el = document.getElementById('qNavLabel');
      if (el) el.textContent = document.getElementById('qQ').value + ' ' + document.getElementById('qY').value;
    }
    async function navigateQuarter(dir) {
      /* 1 — auto-save current quarter if dirty */
      if (S.dirty) {
        _saveLocal();
        try { await saveToFirestore(true); } catch(e) { /* local backup is safe */ }
      }
      /* 2 — compute new quarter + year */
      var qi = QLIST.indexOf(document.getElementById('qQ').value);
      var yr = parseInt(document.getElementById('qY').value, 10) || new Date().getFullYear();
      qi += dir;
      if (qi > 3) { qi = 0; yr++; }
      if (qi < 0) { qi = 3; yr--; }
      document.getElementById('qQ').value = QLIST[qi];
      document.getElementById('qY').value = yr;
      document.getElementById('qFS').value = '';
      updateQNavLabel();

      /* 3 — try to load saved data for this quarter */
      var loaded = false;
      if (isFB()) {
        try {
          var snap = await planRef().get();
          if (snap.exists) { applyPlanData(snap.data()); loaded = true; setStatus('ready', '✓ Loaded ' + QLIST[qi] + ' ' + yr); }
        } catch(e) { /* fall through */ }
      }
      if (!loaded) {
        var local = _loadLocal();
        if (local && local.rows && local.rows.length) {
          applyPlanData(local); loaded = true;
          setStatus('ready', 'Loaded from local backup');
        }
      }
      /* 4 — no saved data → generate blank Sundays for the quarter */
      if (!loaded) {
        generate(true);
        S.dirty = false;
        setStatus('ready', 'Generated ' + QLIST[qi] + ' ' + yr + ' — no saved data');
        toast('No saved plan for ' + QLIST[qi] + ' ' + yr + ' — generated blank Sundays', 'info');
      }
    }

    /* ── Summary ─────────────────────────────────────────────────────── */
    function updateSummary() {
      document.getElementById('smTotal').textContent  = S.rows.length;
      document.getElementById('smPreach').textContent = S.rows.filter(function(r){return r.preacher.trim();}).length;
      document.getElementById('smWorship').textContent= S.rows.filter(function(r){return r.worship.trim();}).length;
      document.getElementById('smFull').textContent   = S.rows.filter(function(r){
        return r.date && r.worship.trim() && r.preacher.trim() && r.scripture.trim();
